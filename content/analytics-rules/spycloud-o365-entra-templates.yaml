name: SpyCloud + O365 — Exposed User eDiscovery Export
description: |
  Detects eDiscovery or compliance search export activity by users with SpyCloud credential exposure.
  Attackers with compromised admin credentials may use eDiscovery to exfiltrate mailbox content.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Collection
  - Exfiltration
techniques:
  - T1114
  - T1048
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  OfficeActivity
  | where TimeGenerated > ago(1h)
  | where Operation has_any ("SearchStarted", "SearchExported", "New-ComplianceSearch", "Start-ComplianceSearch")
  | where UserId in (exposedUsers)
  | project TimeGenerated, UserId, Operation, ClientIP
  | extend AccountName = tostring(split(UserId, "@")[0]), AccountDomain = tostring(split(UserId, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain

---
id: sc-029-exposed-user-sharepoint-mass-download
name: SpyCloud + O365 — Exposed User SharePoint Mass Download
description: |
  Detects bulk file downloads from SharePoint/OneDrive by users with SpyCloud credential exposure.
  May indicate data exfiltration using compromised credentials.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Exfiltration
  - Collection
techniques:
  - T1530
  - T1213.002
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  OfficeActivity
  | where TimeGenerated > ago(1h)
  | where Operation in ("FileDownloaded", "FileSyncDownloadedFull")
  | where UserId in (exposedUsers)
  | summarize DownloadCount = count(), Files = make_set(OfficeObjectId, 10) by UserId, ClientIP
  | where DownloadCount >= 50
  | extend AccountName = tostring(split(UserId, "@")[0]), AccountDomain = tostring(split(UserId, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: ClientIP
