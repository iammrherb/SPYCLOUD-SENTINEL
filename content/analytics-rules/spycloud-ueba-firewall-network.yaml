id: sc-042-user-reexposed-after-reset
name: SpyCloud — User Re-exposed After Password Reset
description: |
  Detects users who appear in new SpyCloud exposure data after a password reset was performed.
  May indicate persistent device infection or new breach affecting the user.
severity: High
enabled: false
queryFrequency: 12h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Persistence
  - CredentialAccess
techniques:
  - T1078
  - T1547
query: |
  let resetUsers = SpyCloud_ConditionalAccessLogs_CL
  | where TimeGenerated > ago(30d)
  | where PasswordReset == true and ActionStatus == "Success"
  | summarize ResetTime = max(TimeGenerated) by Email;
  SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(12h)
  | where severity >= 20
  | join kind=inner resetUsers on $left.email == $right.Email
  | where TimeGenerated > ResetTime
  | project TimeGenerated, email, severity, ResetTime, DaysSinceReset = datetime_diff('day', TimeGenerated, ResetTime), infected_machine_id
  | extend AccountName = tostring(split(email, "@")[0]), AccountDomain = tostring(split(email, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain

