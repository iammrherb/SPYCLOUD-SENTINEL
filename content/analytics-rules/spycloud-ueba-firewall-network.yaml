id: sc-036-vpn-exposed-user-new-location
name: SpyCloud + Network — Exposed User VPN from New Location
description: |
  Detects VPN connections from new geographic locations for users with SpyCloud credential exposure.
  Attackers may use stolen VPN credentials to access the corporate network.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - CommandAndControl
techniques:
  - T1133
  - T1071
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  let historicalVPN = SigninLogs
  | where TimeGenerated between (ago(30d) .. ago(7d))
  | where AppDisplayName has_any ("VPN", "Cisco AnyConnect", "GlobalProtect", "Pulse Secure", "FortiClient", "Zscaler")
  | extend Country = tostring(LocationDetails.countryOrRegion)
  | summarize KnownCountries = make_set(Country) by UserPrincipalName;
  SigninLogs
  | where TimeGenerated > ago(1h)
  | where AppDisplayName has_any ("VPN", "Cisco AnyConnect", "GlobalProtect", "Pulse Secure", "FortiClient", "Zscaler")
  | where UserPrincipalName in (exposedUsers)
  | extend Country = tostring(LocationDetails.countryOrRegion)
  | join kind=leftouter historicalVPN on UserPrincipalName
  | where Country !in (KnownCountries) or isnull(KnownCountries)
  | project TimeGenerated, UserPrincipalName, IPAddress, Country, AppDisplayName
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress

