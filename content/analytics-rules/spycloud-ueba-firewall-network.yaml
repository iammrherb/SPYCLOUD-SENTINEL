id: sc-032-firewall-exposed-ip-deny
name: SpyCloud + Firewall — Exposed Credential IP in Firewall Deny Logs
description: |
  Correlates SpyCloud infected device IP addresses with firewall deny events.
  Infected devices attempting blocked connections may indicate active C2 communication.
severity: Medium
enabled: false
queryFrequency: 1h
queryPeriod: 24h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CommandAndControl
techniques:
  - T1071
query: |
  let exposedIPs = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(30d) and severity >= 20
  | mv-expand ip = ip_addresses
  | project ExposedIP = tostring(ip), email;
  CommonSecurityLog
  | where TimeGenerated > ago(1h)
  | where DeviceAction has_any ("Deny", "Drop", "Block", "Reject")
  | join kind=inner exposedIPs on $left.SourceIP == $right.ExposedIP
  | project TimeGenerated, SourceIP, DestinationIP, DeviceVendor, DeviceProduct, DeviceAction, email, Activity
  | extend IPAddress = SourceIP
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress

