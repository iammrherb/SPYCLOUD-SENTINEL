id: sc-046-first-time-domain-exposure
name: SpyCloud — First-Time Domain Exposure Detected
description: |
  Detects when a new email domain appears in SpyCloud exposure data for the first time.
  May indicate a new organizational domain or subsidiary being targeted.
severity: Medium
enabled: false
