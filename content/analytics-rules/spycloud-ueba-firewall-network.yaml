  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  SigninLogs
  | where TimeGenerated > ago(1h)
  | where UserPrincipalName in (exposedUsers)
  | where ResultType == 0
  | where ConditionalAccessStatus == "notApplied" or ConditionalAccessStatus == "success"
  | extend CAPolicies = tostring(ConditionalAccessPolicies)
  | project TimeGenerated, UserPrincipalName, IPAddress, AppDisplayName, ConditionalAccessStatus, AuthenticationRequirement, CAPolicies
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
