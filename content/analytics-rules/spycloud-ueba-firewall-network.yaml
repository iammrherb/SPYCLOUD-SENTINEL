id: sc-047-credential-theft-tool-on-device
name: SpyCloud + MDE — Credential Theft Tool on Exposed Device
description: |
  Detects execution of known credential theft tools (Mimikatz, LaZagne, etc.) on devices
  identified by SpyCloud as infected by infostealer malware.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
  - Execution
techniques:
  - T1003
  - T1059
query: |
  let infectedHosts = SpyCloudCompassDevices_CL
  | where TimeGenerated > ago(30d)
  | distinct user_hostname;
  DeviceEvents
  | where TimeGenerated > ago(1h)
  | where DeviceName in (infectedHosts)
  | where FileName has_any ("mimikatz", "lazagne", "pypykatz", "secretsdump", "procdump", "ntdsutil", "vaultcmd")
