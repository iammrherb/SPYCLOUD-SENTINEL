id: sc-041-ca-policy-bypass
name: SpyCloud + CA — Exposed User Bypassing Conditional Access
description: |
  Detects exposed users who are successfully authenticating despite Conditional Access
  policies that should be blocking or restricting access. May indicate CA gap.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
  - InitialAccess
techniques:
