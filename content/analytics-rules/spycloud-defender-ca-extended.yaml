id: sc-053-ca-policy-failure-exposed-user
name: SpyCloud + Conditional Access — Policy Evaluation Failures for Exposed Users
description: |
  Detects Conditional Access policy evaluation failures (reportOnlyFailure, failure) for
  users with SpyCloud credential exposure. These may represent attempted access that
  should have been blocked, or CA policy gaps allowing compromised access.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
  - InitialAccess
techniques:
  - T1078
  - T1550
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  SigninLogs
  | where TimeGenerated > ago(1h)
  | where UserPrincipalName in (exposedUsers)
  | mv-expand ConditionalAccessPolicies
  | extend PolicyName = tostring(ConditionalAccessPolicies.displayName),
           PolicyResult = tostring(ConditionalAccessPolicies.result),
           GrantControls = tostring(ConditionalAccessPolicies.enforcedGrantControls),
           SessionControls = tostring(ConditionalAccessPolicies.enforcedSessionControls)
  | where PolicyResult in ("failure", "reportOnlyFailure", "reportOnlyNotApplied")
  | summarize FailedPolicies = make_set(PolicyName), PolicyResults = make_set(PolicyResult) by UserPrincipalName, IPAddress, AppDisplayName, ResultType
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress

