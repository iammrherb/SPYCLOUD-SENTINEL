id: sc-052-defender-xdr-multi-stage-incident
name: SpyCloud + Defender XDR — Exposed User Multi-Stage Incident Correlation
description: |
  Correlates SpyCloud credential exposure with Microsoft 365 Defender XDR incidents.
  Identifies multi-stage attack chains (initial access → persistence → exfiltration)
  involving users whose credentials were found in infostealer data.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - Persistence
  - Exfiltration
techniques:
  - T1078
  - T1114
  - T1530
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  SecurityIncident
  | where TimeGenerated > ago(1h)
  | mv-expand AlertIds
  | join kind=inner (
    SecurityAlert
    | extend UserPrincipalName = tostring(parse_json(ExtendedProperties).["User Principal Name"])
    | where UserPrincipalName in (exposedUsers)
  ) on $left.AlertIds == $right.SystemAlertId
  | summarize AlertCount = dcount(AlertName), Alerts = make_set(AlertName), Tactics = make_set(Tactics) by IncidentNumber, Title, Severity, UserPrincipalName
  | where AlertCount >= 2
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain

