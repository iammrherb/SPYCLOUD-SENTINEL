id: sc-068-defender-risky-user-exposed
name: SpyCloud + Entra ID Protection — Exposed User Marked as Risky
description: |
  Correlates SpyCloud credential exposure with Entra ID Protection risky user state.
  Users flagged by both SpyCloud (external threat intel) and Identity Protection (behavioral)
  represent the highest confidence compromised accounts.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - CredentialAccess
techniques:
  - T1078
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | summarize MaxSev = max(severity), Sources = dcount(source_id) by email;
  AADRiskyUsers
  | where TimeGenerated > ago(1h)
  | where RiskLevel in ("high", "medium")
  | where RiskState == "atRisk" or RiskState == "confirmedCompromised"
  | join kind=inner exposedUsers on $left.UserPrincipalName == $right.email
  | project TimeGenerated, UserPrincipalName, RiskLevel, RiskState, RiskDetail, MaxSev, Sources
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain

---
id: sc-069-remediation-action-audit
name: SpyCloud — Remediation Action Audit Trail
description: |
  Tracks all automated remediation actions taken by SpyCloud playbooks, including password resets,
  session revocations, CA group additions, MFA enforcements, and device isolations. Provides a
  complete audit trail for compliance and post-incident review.
severity: Informational
enabled: false
queryFrequency: 6h
queryPeriod: 24h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Impact
techniques:
  - T1531
query: |
  let passwordResets = AuditLogs
  | where TimeGenerated > ago(24h)
  | where OperationName has_any ("Reset user password", "Change user password")
  | where InitiatedBy has "SpyCloud"
  | extend ActionType = "PasswordReset", UPN = tostring(TargetResources[0].userPrincipalName);
  let sessionRevocations = AuditLogs
  | where TimeGenerated > ago(24h)
  | where OperationName == "Revoke sign in sessions"
  | extend ActionType = "SessionRevocation", UPN = tostring(TargetResources[0].userPrincipalName);
  let groupAdditions = AuditLogs
  | where TimeGenerated > ago(24h)
  | where OperationName == "Add member to group"
  | where TargetResources[0].displayName has_any ("SpyCloud", "Blocked", "Restricted", "Compromised")
  | extend ActionType = "SecurityGroupAddition", UPN = tostring(TargetResources[0].userPrincipalName);
  union passwordResets, sessionRevocations, groupAdditions
  | project TimeGenerated, ActionType, UPN, OperationName, InitiatedBy
  | extend AccountName = tostring(split(UPN, "@")[0]), AccountDomain = tostring(split(UPN, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain
