id: sc-058-dns-tunneling-exposed-device
name: SpyCloud + DNS — DNS Tunneling Detection from Exposed Device
description: |
  Detects DNS tunneling patterns (high-entropy, long subdomains, high query volume) from
  devices identified by SpyCloud as infected. Indicates potential data exfiltration or C2.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CommandAndControl
  - Exfiltration
techniques:
  - T1071.004
  - T1048.003
query: |
  let infectedHosts = SpyCloudCompassDevices_CL
  | where TimeGenerated > ago(30d)
  | distinct user_hostname;
  DnsEvents
  | where TimeGenerated > ago(1h)
  | where Computer in (infectedHosts)
  | extend SubdomainLength = strlen(tostring(split(Name, ".")[0]))
  | where SubdomainLength > 30 or QueryType in ("TXT", "NULL", "CNAME")
  | summarize QueryCount = count(), UniqueQueries = dcount(Name), AvgSubdomainLen = avg(SubdomainLength), SampleQueries = make_set(Name, 5) by Computer
  | where QueryCount > 50 or AvgSubdomainLen > 25
  | extend HostName = Computer
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: HostName

