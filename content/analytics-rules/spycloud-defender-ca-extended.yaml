id: sc-054-ca-token-replay-exposed-user
name: SpyCloud + Entra ID — Token Replay or Refresh Token Abuse from Exposed User
description: |
  Detects token replay attacks and suspicious refresh token usage from users with
  SpyCloud credential exposure. Attackers with stolen cookies/tokens may replay
  them from different IPs to bypass authentication.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
  - DefenseEvasion
techniques:
  - T1550.001
  - T1539
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 25
  | distinct email;
  AADNonInteractiveUserSignInLogs
  | where TimeGenerated > ago(1h)
  | where UserPrincipalName in (exposedUsers)
  | where ResultType == 0
  | summarize IPCount = dcount(IPAddress), IPs = make_set(IPAddress, 10), AppCount = dcount(AppDisplayName), Apps = make_set(AppDisplayName) by UserPrincipalName, bin(TimeGenerated, 15m)
  | where IPCount >= 2
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain

