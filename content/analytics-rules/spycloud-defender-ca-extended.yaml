id: sc-057-mde-suspicious-process-exposed-device
name: SpyCloud + Defender for Endpoint — Suspicious Process on Exposed Device
description: |
  Detects suspicious process execution (LOLBins, encoded PowerShell, credential dumping)
  on devices identified by SpyCloud as infected by infostealer malware. Indicates ongoing
  compromise or secondary tooling deployment.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Execution
  - DefenseEvasion
techniques:
  - T1059.001
  - T1218
query: |
  let infectedHosts = SpyCloudCompassDevices_CL
  | where TimeGenerated > ago(30d)
  | distinct user_hostname;
  DeviceProcessEvents
  | where TimeGenerated > ago(1h)
  | where DeviceName in (infectedHosts)
  | where FileName has_any ("powershell.exe", "cmd.exe", "wscript.exe", "cscript.exe", "mshta.exe", "regsvr32.exe", "certutil.exe", "bitsadmin.exe", "rundll32.exe")
     or ProcessCommandLine has_any ("-enc", "-encoded", "downloadstring", "invoke-expression", "iex", "bypass", "hidden", "FromBase64")
  | project TimeGenerated, DeviceName, FileName, ProcessCommandLine, AccountName, InitiatingProcessFileName, FolderPath
  | extend HostName = DeviceName
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: HostName
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName

