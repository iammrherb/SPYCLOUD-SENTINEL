id: sc-050-defender-cloud-apps-exposed-user
name: SpyCloud + Defender for Cloud Apps — Exposed User Suspicious Activity
description: |
  Correlates SpyCloud credential exposure with Microsoft Defender for Cloud Apps alerts.
  Detects suspicious cloud app usage by users with compromised credentials, including
  impossible travel, mass downloads, suspicious inbox rules, and anomalous admin activity.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - Collection
techniques:
  - T1078
  - T1114
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  SecurityAlert
  | where TimeGenerated > ago(1h)
  | where ProviderName == "MCAS" or ProviderName == "Microsoft Cloud App Security"
  | extend UserPrincipalName = tostring(parse_json(ExtendedProperties).["User Principal Name"])
  | where UserPrincipalName in (exposedUsers)
  | project TimeGenerated, AlertName, AlertSeverity, UserPrincipalName, Description, RemediationSteps, ProviderName
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain

