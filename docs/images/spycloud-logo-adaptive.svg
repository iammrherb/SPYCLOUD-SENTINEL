<?xml version="1.0" encoding="UTF-8"?>
<!-- SpyCloud Logo - Adaptive for both Light and Dark backgrounds -->
<!-- Uses prefers-color-scheme media query supported by Chromium-based Azure/Defender portals -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48">
  <style>
    .sc-wordmark { fill: #000000; }
    @media (prefers-color-scheme: dark) {
      .sc-wordmark { fill: #FFFFFF; }
    }
  </style>
  <!-- SpyCloud Wordmark - bold rounded sans-serif matching official branding -->
  <text x="0" y="38" font-family="'Nunito Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="40" font-weight="900" letter-spacing="-0.5" class="sc-wordmark">SpyCloud</text>
</svg>
