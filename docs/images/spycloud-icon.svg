<?xml version="1.0" encoding="UTF-8"?>
<!-- SpyCloud Shield Icon - Works on both dark and light backgrounds -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M32 4 L56 14 L56 32 C56 48 46 56 32 60 C18 56 8 48 8 32 L8 14 Z"
        fill="url(#shieldGrad)" opacity="0.95"/>
  <!-- Eye/Spy element -->
  <ellipse cx="32" cy="30" rx="14" ry="9" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="32" cy="30" r="5" fill="#FFFFFF"/>
  <circle cx="32" cy="30" r="2" fill="#0B1929"/>
</svg>
