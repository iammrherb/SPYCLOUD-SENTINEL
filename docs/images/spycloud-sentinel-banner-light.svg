<?xml version="1.0" encoding="UTF-8"?>
<!-- SpyCloud Sentinel Banner - For Light Mode Deployment Portal -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <defs>
    <linearGradient id="bannerGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldBannerL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLineL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B894;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00B894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077CC;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="120" fill="url(#bannerGradL)" rx="8" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Accent line top -->
  <rect x="100" y="0" width="600" height="2" fill="url(#accentLineL)" rx="1"/>
  <!-- Shield Icon -->
  <path d="M70 20 L98 28 L98 50 C98 66 90 74 70 78 C50 74 42 66 42 50 L42 28 Z"
        fill="url(#shieldBannerL)" opacity="0.9"/>
  <ellipse cx="70" cy="46" rx="16" ry="10" fill="none" stroke="#FFFFFF" stroke-width="1.8"/>
  <circle cx="70" cy="46" r="5.5" fill="#FFFFFF"/>
  <circle cx="70" cy="46" r="2" fill="#0B1929"/>
  <!-- Title -->
  <text x="130" y="45" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="700" fill="#1A2332" letter-spacing="0.5">
    <tspan fill="#00B894">SpyCloud</tspan><tspan fill="#1A2332"> for Microsoft Sentinel</tspan>
  </text>
  <!-- Subtitle -->
  <text x="130" y="72" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="400" fill="#556677" letter-spacing="1">
    Darknet Identity Threat Protection &amp; Automated Remediation Platform
  </text>
  <!-- Version badge -->
  <rect x="130" y="82" width="52" height="20" rx="10" fill="#00B894" opacity="0.12"/>
  <text x="140" y="96" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="600" fill="#00B894">
    v11.0
  </text>
  <!-- Accent line bottom -->
  <rect x="100" y="118" width="600" height="2" fill="url(#accentLineL)" rx="1"/>
</svg>
