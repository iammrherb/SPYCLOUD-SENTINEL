---
id: sc-035-dns-c2-infected-device
name: SpyCloud + DNS — C2 DNS Queries from Infected Device
description: |
  Correlates SpyCloud infected device hostnames with suspicious DNS queries.
  Detects potential command-and-control callbacks from infostealer-infected devices.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CommandAndControl
techniques:
  - T1071.004
  - T1568
query: |
  let infectedHosts = SpyCloudCompassDevices_CL
  | where TimeGenerated > ago(30d)
  | distinct user_hostname;
  DnsEvents
  | where TimeGenerated > ago(1h)
  | where Computer in (infectedHosts)
  | where Name has_any (".duckdns.org", ".no-ip.com", ".ddns.net", ".hopto.org", ".zapto.org", ".serveftp.com", ".sytes.net")
     or Name matches regex @"^[a-z0-9]{20,}\."
  | project TimeGenerated, Computer, Name, IPAddresses, QueryType
  | extend HostName = Computer, DnsQuery = Name
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: HostName
  - entityType: DNS
    fieldMappings:
      - identifier: DomainName
        columnName: DnsQuery

---
id: sc-036-vpn-exposed-user-new-location
name: SpyCloud + Network — Exposed User VPN from New Location
description: |
  Detects VPN connections from new geographic locations for users with SpyCloud credential exposure.
  Attackers may use stolen VPN credentials to access the corporate network.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - CommandAndControl
techniques:
  - T1133
  - T1071
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  let historicalVPN = SigninLogs
  | where TimeGenerated between (ago(30d) .. ago(7d))
  | where AppDisplayName has_any ("VPN", "Cisco AnyConnect", "GlobalProtect", "Pulse Secure", "FortiClient", "Zscaler")
  | extend Country = tostring(LocationDetails.countryOrRegion)
  | summarize KnownCountries = make_set(Country) by UserPrincipalName;
  SigninLogs
  | where TimeGenerated > ago(1h)
  | where AppDisplayName has_any ("VPN", "Cisco AnyConnect", "GlobalProtect", "Pulse Secure", "FortiClient", "Zscaler")
  | where UserPrincipalName in (exposedUsers)
  | extend Country = tostring(LocationDetails.countryOrRegion)
  | join kind=leftouter historicalVPN on UserPrincipalName
  | where Country !in (KnownCountries) or isnull(KnownCountries)
  | project TimeGenerated, UserPrincipalName, IPAddress, Country, AppDisplayName
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress

---
id: sc-037-firewall-allow-after-exposure
name: SpyCloud + Firewall — Allowed Traffic After Credential Exposure
description: |
  Detects allowed firewall traffic from SpyCloud exposed IPs, indicating potentially
  compromised sessions passing through the network perimeter.
severity: Medium
enabled: false
queryFrequency: 1h
queryPeriod: 24h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - LateralMovement
  - CommandAndControl
techniques:
  - T1071
  - T1021
query: |
  let exposedIPs = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(30d) and severity >= 20
  | mv-expand ip = ip_addresses
  | project ExposedIP = tostring(ip), email, severity;
  CommonSecurityLog
  | where TimeGenerated > ago(1h)
  | where DeviceAction has_any ("Allow", "Accept", "Permit")
  | join kind=inner exposedIPs on $left.SourceIP == $right.ExposedIP
  | summarize ConnectionCount = count(), DestIPs = make_set(DestinationIP, 10), Vendors = make_set(DeviceVendor) by SourceIP, email, severity
  | where ConnectionCount > 10
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SourceIP

---
id: sc-038-mde-infected-machine-active
name: SpyCloud + MDE — Infected Machine Still Active in Endpoint Inventory
description: |
  Detects SpyCloud-identified infected machines that are still active and communicating
  in the MDE device inventory. These devices need immediate isolation.
severity: High
enabled: false
queryFrequency: 6h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Persistence
  - CommandAndControl
techniques:
  - T1547
  - T1071
query: |
  let infectedMachines = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(30d) and severity >= 20
  | where isnotempty(infected_machine_id)
  | summarize MaxSeverity = max(severity), Users = make_set(email) by infected_machine_id, user_hostname;
  DeviceInfo
  | where TimeGenerated > ago(6h)
  | where isnotempty(DeviceName)
  | join kind=inner infectedMachines on $left.DeviceName == $right.user_hostname
  | project TimeGenerated, DeviceName, DeviceId, OSPlatform, infected_machine_id, MaxSeverity, Users, PublicIP
  | extend HostName = DeviceName
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: HostName

---
id: sc-039-lateral-movement-compromised-device
name: SpyCloud + MDE — Lateral Movement from Compromised Device
description: |
  Detects remote logon events originating from SpyCloud-identified infected devices.
  Indicates potential lateral movement using credentials stolen by infostealer malware.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 30d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - LateralMovement
techniques:
  - T1021
  - T1021.001
  - T1021.002
query: |
  let infectedHosts = SpyCloudCompassDevices_CL
  | where TimeGenerated > ago(30d)
  | distinct user_hostname;
  DeviceLogonEvents
  | where TimeGenerated > ago(1h)
  | where LogonType in ("RemoteInteractive", "Network", "NetworkCleartext")
  | where RemoteDeviceName in (infectedHosts) or DeviceName in (infectedHosts)
  | project TimeGenerated, DeviceName, RemoteDeviceName, AccountName, AccountDomain, LogonType, RemoteIP
  | extend HostName = DeviceName
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: HostName
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: NTDomain
        columnName: AccountDomain
