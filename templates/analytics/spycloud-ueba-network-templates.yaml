# SpyCloud UEBA/Firewall/Network Correlation Rule Templates
# These templates correlate SpyCloud exposure data with UEBA, firewall, and network signals.
# All rules deploy as templates (disabled). Enable selectively in Sentinel > Analytics after reviewing each rule.

templateVersion: "1.0.0"
templateId: spycloud-ueba-network-templates
category: SpyCloud UEBA and Network Correlation
deployAsTemplate: true
requiredDataSources:
  - SpyCloud Breach Watchlist
  - SpyCloud Compass Devices
  - Microsoft Sentinel UEBA
  - Common Security Log (CEF)
  - DNS Events
  - Microsoft Defender for Endpoint
requiredTables:
  - SpyCloudBreachWatchlist_CL
  - SpyCloudCompassDevices_CL
  - BehaviorAnalytics
  - CommonSecurityLog
  - DnsEvents
  - DeviceInfo
  - DeviceLogonEvents
  - DeviceEvents
  - SigninLogs
connectorAssociation:
  - SpyCloud Enterprise Protection API
  - SpyCloud Compass API
  - Microsoft Sentinel UEBA
  - Common Event Format (CEF)

---
id: sc-030-ueba-anomalous-exposed-user
name: SpyCloud + UEBA — Anomalous Behavior from Exposed User
description: |
  Correlates SpyCloud credential exposure with UEBA behavioral anomalies.
  When an exposed user exhibits anomalous behavior, it strongly indicates active exploitation.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - DefenseEvasion
techniques:
  - T1078
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  BehaviorAnalytics
  | where TimeGenerated > ago(1h)
  | where UserPrincipalName in (exposedUsers)
  | where ActivityInsights has_any ("FirstTimeUser", "InvestigationPriorityScore", "AnomalousActivity")
  | project TimeGenerated, UserPrincipalName, ActivityType, ActivityInsights, SourceIPAddress, InvestigationPriority
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SourceIPAddress

---
id: sc-031-ueba-first-time-access
name: SpyCloud + UEBA — Exposed User First-Time Access to Resource
description: |
  Detects first-time access to resources by users with SpyCloud credential exposure.
  Attackers using stolen credentials often access resources the legitimate user never accessed.
severity: Medium
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - LateralMovement
  - Collection
techniques:
  - T1021
  - T1213
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  BehaviorAnalytics
  | where TimeGenerated > ago(1h)
  | where UserPrincipalName in (exposedUsers)
  | where ActivityInsights has "FirstTimeUser"
  | project TimeGenerated, UserPrincipalName, ActivityType, SourceIPAddress, DestinationIPAddress, ResourceId = tostring(ActivityInsights)
  | extend AccountName = tostring(split(UserPrincipalName, "@")[0]), AccountDomain = tostring(split(UserPrincipalName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain

---
id: sc-032-firewall-exposed-ip-deny
name: SpyCloud + Firewall — Exposed Credential IP in Firewall Deny Logs
description: |
  Correlates SpyCloud infected device IP addresses with firewall deny events.
  Infected devices attempting blocked connections may indicate active C2 communication.
severity: Medium
enabled: false
queryFrequency: 1h
queryPeriod: 24h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CommandAndControl
techniques:
  - T1071
query: |
  let exposedIPs = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(30d) and severity >= 20
  | mv-expand ip = ip_addresses
  | project ExposedIP = tostring(ip), email;
  CommonSecurityLog
  | where TimeGenerated > ago(1h)
  | where DeviceAction has_any ("Deny", "Drop", "Block", "Reject")
  | join kind=inner exposedIPs on $left.SourceIP == $right.ExposedIP
  | project TimeGenerated, SourceIP, DestinationIP, DeviceVendor, DeviceProduct, DeviceAction, email, Activity
  | extend IPAddress = SourceIP
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress

---
id: sc-033-fortinet-fsso-compromised-user
name: SpyCloud + Fortinet — FSSO Session from Compromised User
description: |
  Detects Fortinet FSSO (Single Sign-On) sessions from users with SpyCloud credential exposure.
  Compromised users authenticated through FortiGate represent network-level risk.
severity: High
enabled: false
queryFrequency: 1h
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - LateralMovement
techniques:
  - T1078
  - T1133
query: |
  let exposedUsers = SpyCloudBreachWatchlist_CL
  | where TimeGenerated > ago(7d) and severity >= 20
  | distinct email;
  CommonSecurityLog
  | where TimeGenerated > ago(1h)
  | where DeviceVendor == "Fortinet"
  | where isnotempty(SourceUserName)
  | where SourceUserName in (exposedUsers) or SourceUserName has_any (exposedUsers)
  | project TimeGenerated, SourceUserName, SourceIP, DestinationIP, DeviceProduct, Activity, DeviceAction
  | extend AccountName = tostring(split(SourceUserName, "@")[0]), AccountDomain = tostring(split(SourceUserName, "@")[1])
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SourceIP

