name: "🛡️ Deploy SpyCloud Sentinel Integration"

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure Resource Group'
        required: true
        default: 'spycloud-sentinel'
      workspace:
        description: 'Log Analytics Workspace name'
        required: true
        default: 'spycloud-ws'
      location:
        description: 'Azure region'
        required: true
        default: 'eastus'
        type: choice
        options: [eastus, eastus2, westus2, centralus, northeurope, westeurope, uksouth, australiaeast]
      create_workspace:
        description: 'Create new workspace (true) or use existing (false)'
        type: boolean
        default: true
      enable_mde_playbook:
        description: 'Deploy MDE device isolation playbook'
        type: boolean
        default: true
      enable_ca_playbook:
        description: 'Deploy CA identity protection playbook'
        type: boolean
        default: true
      enable_key_vault:
        description: 'Create Key Vault for API key'
        type: boolean
        default: true
      enable_rules_library:
        description: 'Deploy full analytics rules library (all disabled by default)'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: "✅ Validate Template"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Create Resource Group
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create --name ${{ inputs.resource_group }} --location ${{ inputs.location }}
      - name: Validate
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ inputs.resource_group }}
          template: ./azuredeploy.json
          parameters: >-
            workspace=${{ inputs.workspace }}
            createNewWorkspace=${{ inputs.create_workspace }}
            spycloudApiKey=${{ secrets.SPYCLOUD_API_KEY }}
            deploymentRegion=${{ inputs.location }}
          deploymentMode: Validate

  deploy:
    name: "🚀 Deploy Infrastructure"
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy ARM Template
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ inputs.resource_group }}
          template: ./azuredeploy.json
          parameters: >-
            workspace=${{ inputs.workspace }}
            createNewWorkspace=${{ inputs.create_workspace }}
            spycloudApiKey=${{ secrets.SPYCLOUD_API_KEY }}
            deploymentRegion=${{ inputs.location }}
            resourceGroupName=${{ inputs.resource_group }}
            enableMdePlaybook=${{ inputs.enable_mde_playbook }}
            enableCaPlaybook=${{ inputs.enable_ca_playbook }}
            enableKeyVault=${{ inputs.enable_key_vault }}
            enableAnalyticsRule=true
            enableAutomationRule=true
            enableAnalyticsRulesLibrary=${{ inputs.enable_rules_library }}
          deploymentName: spycloud-${{ github.run_number }}
          failOnStdErr: false

  configure:
    name: "⚙️ Post-Deploy Configuration"
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve DCE/DCR and Assign Permissions
        uses: azure/cli@v2
        with:
          inlineScript: |
            RG="${{ inputs.resource_group }}"
            WS="${{ inputs.workspace }}"
            
            echo "⏳ Waiting 90s for content template resources to finalize..."
            sleep 90
            
            # Resolve DCE
            DCE_URI=$(az monitor data-collection endpoint show \
              --name "dce-spycloud-${WS}" --resource-group "$RG" \
              --query "logsIngestion.endpoint" -o tsv 2>/dev/null || echo "pending")
            echo "📡 DCE URI: $DCE_URI"
            
            # Resolve DCR
            DCR_ID=$(az monitor data-collection rule show \
              --name "dcr-spycloud-${WS}" --resource-group "$RG" \
              --query "immutableId" -o tsv 2>/dev/null || echo "pending")
            echo "📋 DCR ID: $DCR_ID"
            
            # Get DCR resource ID for RBAC
            DCR_RID=$(az monitor data-collection rule show \
              --name "dcr-spycloud-${WS}" --resource-group "$RG" \
              --query "id" -o tsv 2>/dev/null || echo "")
            
            # Assign Monitoring Metrics Publisher (3913510d-...)
            ROLE="3913510d-42f4-4e42-8a64-420c390055eb"
            for LA in "SpyCloud-MDE-Remediation-${WS}" "SpyCloud-CA-Remediation-${WS}"; do
              PID=$(az logic workflow show --name "$LA" -g "$RG" \
                --query "identity.principalId" -o tsv 2>/dev/null || echo "")
              if [ -n "$PID" ] && [ -n "$DCR_RID" ]; then
                az role assignment create --assignee-object-id "$PID" \
                  --assignee-principal-type ServicePrincipal \
                  --role "$ROLE" --scope "$DCR_RID" 2>/dev/null \
                  && echo "✅ RBAC assigned: $LA" \
                  || echo "ℹ️  RBAC may already exist: $LA"
              fi
            done

      - name: Deployment Summary
        uses: azure/cli@v2
        with:
          inlineScript: |
            echo ""
            echo "╔═══════════════════════════════════════════════╗"
            echo "║  🛡️  SpyCloud Sentinel — Deploy Complete     ║"
            echo "╠═══════════════════════════════════════════════╣"
            echo "║  RG: ${{ inputs.resource_group }}"
            echo "║  WS: ${{ inputs.workspace }}"
            echo "║  Region: ${{ inputs.location }}"
            echo "╠═══════════════════════════════════════════════╣"
            echo "║  Next: Review rules in Sentinel → Analytics   ║"
            echo "║  Next: Upload Copilot files from copilot/     ║"
            echo "╚═══════════════════════════════════════════════╝"
            echo ""
            az resource list -g "${{ inputs.resource_group }}" \
              --query "[].{Type:type,Name:name}" -o table
