###############################################################################
# SpyCloud Sentinel - CI/CD Pipeline
# Validates, tests, packages, and deploys the SpyCloud Sentinel solution
# across staging and production environments with rollback on failure.
###############################################################################

name: SpyCloud Sentinel Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip ARM-TTK tests'
        required: false
        default: false
        type: boolean
      cloud:
        description: 'Azure cloud environment'
        required: true
        default: 'AzureCloud'
        type: choice
        options:
          - AzureCloud
          - AzureUSGovernment
      rollback_on_failure:
        description: 'Auto-rollback failed deployment (delete resources + report errors)'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  SOLUTION_VERSION: '2.0.0'
  SOLUTION_NAME: 'SpyCloud Identity Exposure Intelligence for Sentinel'

jobs:
  validate-templates:
    name: Validate ARM Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all JSON files
        run: |
          errors=0
          for f in $(find . -name '*.json' -not -path '*/node_modules/*' -not -path '*/.git/*'); do
            if ! python3 -c "import json; json.load(open(\"$f\"))" 2>/dev/null; then
              echo "FAIL: $f"; errors=$((errors + 1))
            fi
          done
          [ $errors -gt 0 ] && exit 1
          echo "All JSON files valid"
      - name: Validate ARM template structure
        run: |
          python3 << 'EOF'
          import json, sys
          for fname in ['azuredeploy.json', 'mainTemplate.json']:
              with open(fname) as f:
                  tpl = json.load(f)
              for key in ['$schema', 'contentVersion', 'parameters', 'resources']:
                  if key not in tpl:
                      print(f'ERROR: {fname} missing {key}')
                      sys.exit(1)
              print(f'{fname}: {len(tpl["resources"])} resources')
          EOF
      - name: Validate createUiDefinition.json
        run: |
          python3 -c "
          import json, sys
          ui = json.load(open('createUiDefinition.json'))
          assert '\$schema' in ui, 'Missing schema'
          print(f'UI Definition: {len(ui.get(\"parameters\",{}).get(\"steps\",[]))} steps')
          "

  arm-ttk-tests:
    name: ARM-TTK Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - name: Run ARM-TTK
        shell: pwsh
        run: |
          git clone https://github.com/Azure/arm-ttk.git /tmp/arm-ttk
          Import-Module /tmp/arm-ttk/arm-ttk/arm-ttk.psd1
          $results = Test-AzTemplate -TemplatePath ./azuredeploy.json
          $failed = $results | Where-Object { -not $_.Passed }
          if ($failed.Count -gt 0) {
            $failed | ForEach-Object { Write-Host "FAIL: $($_.Name) - $($_.Message)" }
            exit 1
          }
          Write-Host "ARM-TTK: All tests passed"

  validate-function-app:
    name: Validate Function App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r functions/SpyCloudEnrichment/requirements.txt
      - run: python3 -m py_compile functions/SpyCloudEnrichment/function_app.py
      - name: Validate imports
        run: |
          python3 -c "
          import azure.functions, requests, msal, azure.identity
          import azure.keyvault.secrets, azure.monitor.ingestion, azure.data.tables
          print('All Function App imports successful')
          "

  validate-mcp-server:
    name: Validate MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Validate MCP server
        working-directory: mcp-server
        run: npm install && node --check src/index.js

  package-solution:
    name: Package Solution
    runs-on: ubuntu-latest
    needs: [validate-templates, arm-ttk-tests, validate-function-app, validate-mcp-server]
    if: always() && needs.validate-templates.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Build package
        run: |
          PKG="dist/spycloud-sentinel-${SOLUTION_VERSION}"
          mkdir -p "${PKG}"
          cp azuredeploy.json mainTemplate.json createUiDefinition.json solutionMetadata.json "${PKG}/"
          cp -r playbooks workbooks analytics-rules "${PKG}/" 2>/dev/null || true
          cp hunting-queries.json "${PKG}/" 2>/dev/null || true
          cd dist && zip -r "spycloud-sentinel-${SOLUTION_VERSION}.zip" "spycloud-sentinel-${SOLUTION_VERSION}/"
      - uses: actions/upload-artifact@v4
        with:
          name: spycloud-sentinel-solution-${{ env.SOLUTION_VERSION }}
          path: dist/spycloud-sentinel-${{ env.SOLUTION_VERSION }}.zip
          retention-days: 90

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [package-solution]
    if: github.ref == 'refs/heads/main'
    environment:
      name: ${{ inputs.environment }}
    outputs:
      deployment_name: ${{ steps.deploy.outputs.deployment_name }}
      resource_group: ${{ steps.vars.outputs.rg }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "rg=${{ secrets.PRODUCTION_RESOURCE_GROUP }}" >> $GITHUB_OUTPUT
            echo "ws=${{ secrets.PRODUCTION_WORKSPACE }}" >> $GITHUB_OUTPUT
          else
            echo "rg=${{ secrets.STAGING_RESOURCE_GROUP }}" >> $GITHUB_OUTPUT
            echo "ws=${{ secrets.STAGING_WORKSPACE }}" >> $GITHUB_OUTPUT
          fi
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          environment: ${{ inputs.cloud }}
      - name: Set cloud environment
        if: inputs.cloud == 'AzureUSGovernment'
        run: az cloud set --name AzureUSGovernment
      - name: Pre-deployment snapshot
        run: |
          az resource list -g "${{ steps.vars.outputs.rg }}" --query "[].{name:name,type:type}" -o json > /tmp/pre-deploy.json 2>/dev/null || echo "[]" > /tmp/pre-deploy.json
      - name: Validate deployment
        run: |
          az deployment group validate --resource-group "${{ steps.vars.outputs.rg }}" --template-file ./azuredeploy.json --parameters workspace="${{ steps.vars.outputs.ws }}" --no-prompt
      - name: Deploy ARM template
        id: deploy
        run: |
          DNAME="spycloud-${{ inputs.environment }}-${{ github.run_number }}"
          echo "deployment_name=${DNAME}" >> $GITHUB_OUTPUT
          az deployment group create --name "${DNAME}" --resource-group "${{ steps.vars.outputs.rg }}" --template-file ./azuredeploy.json --parameters workspace="${{ steps.vars.outputs.ws }}" --mode Incremental --no-prompt 2>&1 | tee /tmp/deploy.log
          STATE=$(az deployment group show --name "${DNAME}" -g "${{ steps.vars.outputs.rg }}" --query "properties.provisioningState" -o tsv)
          [ "${STATE}" != "Succeeded" ] && { echo "::error::Deployment state: ${STATE}"; exit 1; }
      - name: Post-deploy verification
        if: success()
        run: |
          echo "## Deployment Verification" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ env.SOLUTION_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud | ${{ inputs.cloud }} |" >> $GITHUB_STEP_SUMMARY

  rollback:
    name: Rollback Failed Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure() && inputs.rollback_on_failure
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          environment: ${{ inputs.cloud }}
      - name: Collect errors and rollback
        run: |
          DNAME="${{ needs.deploy.outputs.deployment_name }}"
          RG="${{ needs.deploy.outputs.resource_group }}"
          echo "## Deployment Failure Report" >> $GITHUB_STEP_SUMMARY
          echo "### Error Details" >> $GITHUB_STEP_SUMMARY
          az deployment group show --name "${DNAME}" -g "${RG}" --query "properties.error" -o json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not retrieve errors"
          echo "### Failed Operations" >> $GITHUB_STEP_SUMMARY
          az deployment operation group list --name "${DNAME}" -g "${RG}" --query "[?properties.provisioningState=='"'"'Failed'"'"'].{Resource:properties.targetResource.resourceName,Type:properties.targetResource.resourceType,Error:properties.statusMessage.error.message}" -o table >> $GITHUB_STEP_SUMMARY 2>/dev/null
          echo "### Rollback" >> $GITHUB_STEP_SUMMARY
          az deployment group delete --name "${DNAME}" -g "${RG}" --no-wait 2>/dev/null && echo "Rolled back ${DNAME}" >> $GITHUB_STEP_SUMMARY || echo "Manual cleanup may be required" >> $GITHUB_STEP_SUMMARY
