###############################################################################
# SpyCloud Sentinel - CI/CD Pipeline
# Validates, tests, packages, and deploys the SpyCloud Sentinel solution
# across staging and production environments.
###############################################################################

name: SpyCloud Sentinel Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip ARM-TTK tests'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  SOLUTION_VERSION: '13.12.0'
  SOLUTION_NAME: 'SpyCloud Identity Threat Protection'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate ARM Templates
  # ---------------------------------------------------------------------------
  validate-templates:
    name: Validate ARM Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate azuredeploy.json schema
        run: |
          echo "Validating azuredeploy.json against ARM schema..."
          python3 -c "
          import json, sys
          with open('azuredeploy.json') as f:
              tpl = json.load(f)
          required = ['\$schema', 'contentVersion', 'parameters', 'resources']
          for key in required:
              if key not in tpl:
                  print(f'ERROR: Missing required key: {key}')
                  sys.exit(1)
          print(f'azuredeploy.json validated: {len(tpl.get(\"resources\", []))} resources found')
          "

      - name: Validate mainTemplate.json schema
        run: |
          echo "Validating mainTemplate.json against Content Hub schema..."
          python3 -c "
          import json, sys
          with open('mainTemplate.json') as f:
              tpl = json.load(f)
          required = ['\$schema', 'contentVersion', 'parameters', 'variables', 'resources']
          for key in required:
              if key not in tpl:
                  print(f'ERROR: Missing required key: {key}')
                  sys.exit(1)
          resources = tpl.get('resources', [])
          content_templates = [r for r in resources if 'contentTemplates' in r.get('type', '')]
          content_packages = [r for r in resources if 'contentPackages' in r.get('type', '')]
          print(f'mainTemplate.json validated: {len(content_templates)} content templates, {len(content_packages)} content packages')
          "

      - name: Validate createUiDefinition.json
        run: |
          echo "Validating createUiDefinition.json..."
          python3 -c "
          import json, sys
          with open('createUiDefinition.json') as f:
              ui = json.load(f)
          if '\$schema' not in ui:
              print('ERROR: Missing \$schema in createUiDefinition.json')
              sys.exit(1)
          steps = ui.get('parameters', {}).get('steps', [])
          print(f'createUiDefinition.json validated: {len(steps)} wizard steps')
          "

      - name: Validate playbook templates
        run: |
          echo "Validating playbook ARM templates..."
          for f in playbooks/*.json; do
            if [ -f "$f" ]; then
              python3 -c "
          import json, sys
          with open('$f') as fp:
              tpl = json.load(fp)
          if '\$schema' not in tpl:
              print(f'ERROR: Missing \$schema in $f')
              sys.exit(1)
          print(f'  OK: $f')
          "
            fi
          done

      - name: Validate solutionMetadata.json
        run: |
          echo "Validating solutionMetadata.json..."
          python3 -c "
          import json, sys
          with open('solutionMetadata.json') as f:
              meta = json.load(f)
          required = ['publisherId', 'offerId', 'version', 'support', 'categories']
          for key in required:
              if key not in meta:
                  print(f'ERROR: Missing required key: {key}')
                  sys.exit(1)
          print(f'solutionMetadata.json validated: v{meta[\"version\"]}')
          "

      - name: Check JSON syntax across all templates
        run: |
          echo "Checking JSON syntax for all template files..."
          errors=0
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*'); do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "  FAIL: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "ERROR: $errors files have JSON syntax errors"
            exit 1
          fi
          echo "All JSON files have valid syntax"

  # ---------------------------------------------------------------------------
  # Job 2: ARM Template Toolkit (ARM-TTK) Tests
  # ---------------------------------------------------------------------------
  arm-ttk-tests:
    name: Run ARM-TTK Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM-TTK
        run: |
          git clone https://github.com/Azure/arm-ttk.git /tmp/arm-ttk
          echo "ARM-TTK installed"

      - name: Run ARM-TTK on azuredeploy.json
        shell: pwsh
        run: |
          Import-Module /tmp/arm-ttk/arm-ttk/arm-ttk.psd1
          $results = Test-AzTemplate -TemplatePath ./azuredeploy.json -Skip "URIs-Should-Be-Properly-Constructed"
          $failed = $results | Where-Object { -not $_.Passed }
          if ($failed.Count -gt 0) {
            Write-Host "ARM-TTK found $($failed.Count) issues:"
            $failed | ForEach-Object { Write-Host "  FAIL: $($_.Name) - $($_.Message)" }
            exit 1
          }
          Write-Host "ARM-TTK: All tests passed for azuredeploy.json"

      - name: Run ARM-TTK on mainTemplate.json
        shell: pwsh
        run: |
          Import-Module /tmp/arm-ttk/arm-ttk/arm-ttk.psd1
          $results = Test-AzTemplate -TemplatePath ./mainTemplate.json -Skip "URIs-Should-Be-Properly-Constructed"
          $failed = $results | Where-Object { -not $_.Passed }
          if ($failed.Count -gt 0) {
            Write-Host "ARM-TTK found $($failed.Count) issues:"
            $failed | ForEach-Object { Write-Host "  FAIL: $($_.Name) - $($_.Message)" }
            exit 1
          }
          Write-Host "ARM-TTK: All tests passed for mainTemplate.json"

      - name: Run ARM-TTK on playbooks
        shell: pwsh
        run: |
          Import-Module /tmp/arm-ttk/arm-ttk/arm-ttk.psd1
          $playbooks = Get-ChildItem -Path ./playbooks -Filter *.json -ErrorAction SilentlyContinue
          foreach ($pb in $playbooks) {
            Write-Host "Testing $($pb.Name)..."
            $results = Test-AzTemplate -TemplatePath $pb.FullName -Skip "URIs-Should-Be-Properly-Constructed"
            $failed = $results | Where-Object { -not $_.Passed }
            if ($failed.Count -gt 0) {
              Write-Host "  WARN: $($failed.Count) issues in $($pb.Name)"
            } else {
              Write-Host "  OK: $($pb.Name)"
            }
          }

  # ---------------------------------------------------------------------------
  # Job 3: Package Solution
  # ---------------------------------------------------------------------------
  package-solution:
    name: Package Solution Artifacts
    runs-on: ubuntu-latest
    needs: [validate-templates, arm-ttk-tests]
    if: always() && needs.validate-templates.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create solution package
        run: |
          PACKAGE_DIR="dist/spycloud-sentinel-solution-${SOLUTION_VERSION}"
          mkdir -p "${PACKAGE_DIR}"

          cp azuredeploy.json "${PACKAGE_DIR}/"
          cp mainTemplate.json "${PACKAGE_DIR}/"
          cp createUiDefinition.json "${PACKAGE_DIR}/"
          cp solutionMetadata.json "${PACKAGE_DIR}/"

          cp -r playbooks "${PACKAGE_DIR}/" 2>/dev/null || true
          cp -r workbooks "${PACKAGE_DIR}/" 2>/dev/null || true
          cp -r analytics-rules "${PACKAGE_DIR}/" 2>/dev/null || true
          cp hunting-queries.json "${PACKAGE_DIR}/" 2>/dev/null || true

          cd dist
          zip -r "spycloud-sentinel-solution-${SOLUTION_VERSION}.zip" \
            "spycloud-sentinel-solution-${SOLUTION_VERSION}/"

          echo "Package created: spycloud-sentinel-solution-${SOLUTION_VERSION}.zip"
          ls -lh "spycloud-sentinel-solution-${SOLUTION_VERSION}.zip"

      - name: Generate package manifest
        run: |
          python3 -c "
          import json, hashlib, os

          version = '${SOLUTION_VERSION}'
          package_dir = f'dist/spycloud-sentinel-solution-{version}'
          manifest = {
            'name': 'SpyCloud Identity Threat Protection',
            'version': version,
            'built': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
            'files': []
          }
          for root, dirs, files in os.walk(package_dir):
            for fname in sorted(files):
              fpath = os.path.join(root, fname)
              relpath = os.path.relpath(fpath, package_dir)
              with open(fpath, 'rb') as f:
                sha256 = hashlib.sha256(f.read()).hexdigest()
              manifest['files'].append({
                'path': relpath,
                'sha256': sha256,
                'size': os.path.getsize(fpath)
              })

          with open(f'{package_dir}/manifest.json', 'w') as f:
            json.dump(manifest, f, indent=2)
          print(f'Manifest generated: {len(manifest[\"files\"])} files')
          "

      - name: Upload solution package
        uses: actions/upload-artifact@v4
        with:
          name: spycloud-sentinel-solution-${{ env.SOLUTION_VERSION }}
          path: dist/spycloud-sentinel-solution-${{ env.SOLUTION_VERSION }}.zip
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Job 4: Deploy to Staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [package-solution]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://portal.azure.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate deployment against staging
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.STAGING_RESOURCE_GROUP }}
          template: ./azuredeploy.json
          parameters: >
            workspace=${{ secrets.STAGING_WORKSPACE }}
          deploymentMode: Validate
          deploymentName: spycloud-staging-validate-${{ github.run_number }}

      - name: Deploy to staging environment
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.STAGING_RESOURCE_GROUP }}
          template: ./azuredeploy.json
          parameters: >
            workspace=${{ secrets.STAGING_WORKSPACE }}
          deploymentMode: Incremental
          deploymentName: spycloud-staging-${{ github.run_number }}

      - name: Verify staging deployment
        run: |
          echo "Verifying staging deployment..."
          az monitor log-analytics workspace table list \
            --resource-group ${{ secrets.STAGING_RESOURCE_GROUP }} \
            --workspace-name ${{ secrets.STAGING_WORKSPACE }} \
            --query "[?contains(name, 'SpyCloud')].name" \
            --output table

  # ---------------------------------------------------------------------------
  # Job 5: Deploy to Production
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://portal.azure.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate deployment against production
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.PRODUCTION_RESOURCE_GROUP }}
          template: ./azuredeploy.json
          parameters: >
            workspace=${{ secrets.PRODUCTION_WORKSPACE }}
          deploymentMode: Validate
          deploymentName: spycloud-prod-validate-${{ github.run_number }}

      - name: Deploy to production environment
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.PRODUCTION_RESOURCE_GROUP }}
          template: ./azuredeploy.json
          parameters: >
            workspace=${{ secrets.PRODUCTION_WORKSPACE }}
          deploymentMode: Incremental
          deploymentName: spycloud-prod-${{ github.run_number }}

      - name: Verify production deployment
        run: |
          echo "Verifying production deployment..."
          az monitor log-analytics workspace table list \
            --resource-group ${{ secrets.PRODUCTION_RESOURCE_GROUP }} \
            --workspace-name ${{ secrets.PRODUCTION_WORKSPACE }} \
            --query "[?contains(name, 'SpyCloud')].name" \
            --output table

      - name: Create deployment summary
        run: |
          echo "## SpyCloud Sentinel Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Solution | ${{ env.SOLUTION_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ env.SOLUTION_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
