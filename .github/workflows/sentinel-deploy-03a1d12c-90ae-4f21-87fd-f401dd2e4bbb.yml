name: Deploy Content to spylogwatch [03a1d12c-90ae-4f21-87fd-f401dd2e4bbb]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-03a1d12c-90ae-4f21-87fd-f401dd2e4bbb.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-03a1d12c-90ae-4f21-87fd-f401dd2e4bbb.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'Spydev-QA'
      workspaceName: 'spylogwatch'
      workspaceId: '335c9559-c665-432c-9ce7-c7e16440040f'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule,AutomationRule,HuntingQuery,Playbook,Workbook'
      branch: 'main'
      sourceControlId: '03a1d12c-90ae-4f21-87fd-f401dd2e4bbb'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_03a1d12c90ae4f2187fdf401dd2e4bbb }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_03a1d12c90ae4f2187fdf401dd2e4bbb }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_03a1d12c90ae4f2187fdf401dd2e4bbb }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_03a1d12c90ae4f2187fdf401dd2e4bbb }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_03a1d12c90ae4f2187fdf401dd2e4bbb }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_03a1d12c90ae4f2187fdf401dd2e4bbb }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_03a1d12c90ae4f2187fdf401dd2e4bbb }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_03a1d12c90ae4f2187fdf401dd2e4bbb }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_03a1d12c90ae4f2187fdf401dd2e4bbb }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-03a1d12c-90ae-4f21-87fd-f401dd2e4bbb.ps1