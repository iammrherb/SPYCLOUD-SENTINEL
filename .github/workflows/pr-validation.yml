###############################################################################
# SpyCloud Sentinel - PR Validation Pipeline
# Runs on every pull request to validate templates, code quality, and syntax.
# Supports both Solutions/ and deploy/ directory structure.
###############################################################################

name: PR Validation

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read
  pull-requests: write

env:
  SOLUTION_VERSION: "2.0.0"
  SOLUTION_NAME: "SpyCloud Identity Exposure Intelligence"

jobs:
  json-syntax:
    name: JSON Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all JSON files
        run: |
          errors=0
          checked=0
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" -not -path "./mcp-server/node_modules/*"); do
            checked=$((checked + 1))
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "FAIL: $f"
              errors=$((errors + 1))
            fi
          done
          echo "Checked $checked files, $errors errors"
          if [ $errors -gt 0 ]; then exit 1; fi

  arm-validation:
    name: ARM Template Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate ARM templates
        run: |
          python3 << 'EOF'
          import json, sys, os, glob
          errors = []
          schema_key = '$' + 'schema'
          for fpath in ['deploy/azuredeploy.json', 'azuredeploy.json']:
              if not os.path.exists(fpath): continue
              with open(fpath) as f: tpl = json.load(f)
              for key in [schema_key, 'contentVersion', 'parameters', 'resources']:
                  if key not in tpl: errors.append(f'{fpath}: Missing {key}')
              print(f'{fpath}: {len(tpl.get("resources", []))} resources')
          for fpath in glob.glob('Solutions/*/Package/mainTemplate.json') + (['mainTemplate.json'] if os.path.exists('mainTemplate.json') else []):
              with open(fpath) as f: tpl = json.load(f)
              for key in [schema_key, 'contentVersion', 'parameters', 'resources']:
                  if key not in tpl: errors.append(f'{fpath}: Missing {key}')
              resources = tpl.get('resources', [])
              ct = sum(1 for r in resources if 'contentTemplates' in r.get('type', ''))
              print(f'{fpath}: {len(resources)} resources, {ct} content templates')
          for fpath in glob.glob('Solutions/*/Package/createUiDefinition.json') + ([p for p in ['createUiDefinition.json', 'deploy/createUiDefinition.json'] if os.path.exists(p)]):
              with open(fpath) as f: ui = json.load(f)
              if schema_key not in ui: errors.append(f'{fpath}: Missing {schema_key}')
          for fpath in glob.glob('Solutions/*/SolutionMetadata.json') + (['solutionMetadata.json'] if os.path.exists('solutionMetadata.json') else []):
              with open(fpath) as f: meta = json.load(f)
              for key in ['publisherId', 'offerId', 'support', 'categories']:
                  if key not in meta: errors.append(f'{fpath}: Missing {key}')
          if errors:
              for e in errors: print(f'ERROR: {e}')
              sys.exit(1)
          print('All ARM template validations passed')
          EOF

  solutions-structure:
    name: Solutions Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Solutions directory structure
        run: |
          python3 << 'EOF'
          import os, sys, glob
          errors = []
          sol_dirs = glob.glob('Solutions/*/')
          if not sol_dirs:
              print('No Solutions/ directory - skipping')
              sys.exit(0)
          for sol_dir in sol_dirs:
              name = os.path.basename(sol_dir.rstrip('/'))
              print(f'Solution: {name}')
              for d in ['Package', 'Playbooks']:
                  if not os.path.isdir(os.path.join(sol_dir, d)):
                      errors.append(f'Missing: {sol_dir}{d}/')
              for f in ['SolutionMetadata.json', 'readme.md']:
                  if not os.path.isfile(os.path.join(sol_dir, f)):
                      errors.append(f'Missing: {sol_dir}{f}')
              mt = os.path.join(sol_dir, 'Package', 'mainTemplate.json')
              if not os.path.isfile(mt):
                  errors.append(f'Missing: {mt}')
              pb_dir = os.path.join(sol_dir, 'Playbooks')
              if os.path.isdir(pb_dir):
                  total = sum(1 for d in os.listdir(pb_dir) if os.path.isdir(os.path.join(pb_dir, d)))
                  print(f'  Playbooks: {total}')
          if errors:
              for e in errors: print(f'ERROR: {e}')
              sys.exit(1)
          print('Solutions structure check passed')
          EOF

  playbook-validation:
    name: Validate Playbooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all playbook JSONs
        run: |
          python3 << 'EOF'
          import json, os, sys, glob
          errors = []
          checked = 0
          schema_key = '$' + 'schema'
          for directory in ['playbooks', 'templates/playbooks']:
              if not os.path.isdir(directory): continue
              for fname in sorted(os.listdir(directory)):
                  if not fname.endswith('.json'): continue
                  fpath = os.path.join(directory, fname)
                  checked += 1
                  try:
                      with open(fpath) as f: tpl = json.load(f)
                      if schema_key not in tpl: errors.append(f'{fpath}: missing {schema_key}')
                      print(f'OK: {fpath}')
                  except json.JSONDecodeError as e:
                      errors.append(f'{fpath}: invalid JSON')
          for fpath in sorted(glob.glob('Solutions/*/Playbooks/*/azuredeploy.json')):
              checked += 1
              try:
                  with open(fpath) as f: tpl = json.load(f)
                  if schema_key not in tpl: errors.append(f'{fpath}: missing {schema_key}')
                  print(f'OK: {fpath}')
              except json.JSONDecodeError as e:
                  errors.append(f'{fpath}: invalid JSON')
          print(f'Checked {checked} playbooks, {len(errors)} errors')
          if errors:
              for e in errors: print(f'ERROR: {e}')
              sys.exit(1)
          EOF

  python-validation:
    name: Python Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and validate
        run: |
          for dir in deploy/functions/SpyCloudEnrichment functions/SpyCloudEnrichment; do
            if [ -f "$dir/requirements.txt" ]; then pip install -r "$dir/requirements.txt"; break; fi
          done
          for dir in deploy/functions functions; do
            if [ -d "$dir/SpyCloudEnrichment" ]; then
              python3 -m py_compile "$dir/SpyCloudEnrichment/function_app.py" && echo "OK: $dir"
            fi
          done
          for f in scripts/*.py; do
            if [ -f "$f" ]; then python3 -m py_compile "$f" && echo "OK: $f"; fi
          done

  node-validation:
    name: Node.js Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm install
      - name: Syntax check
        working-directory: mcp-server
        run: node --check src/index.js

  terraform-validation:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Terraform validate
        run: |
          for dir in deploy/terraform terraform; do
            if [ -d "$dir" ]; then
              cd "$dir"
              terraform fmt -check -recursive
              terraform init -backend=false
              terraform validate
              cd "$GITHUB_WORKSPACE"
            fi
          done

  inventory-report:
    name: Resource Inventory
    runs-on: ubuntu-latest
    needs: [json-syntax, arm-validation, solutions-structure]
    steps:
      - uses: actions/checkout@v4
      - name: Generate inventory report
        run: |
          python3 << 'EOF'
          import json, os, glob
          print('## SpyCloud Sentinel - Resource Inventory')
          for path in ['deploy/azuredeploy.json', 'azuredeploy.json']:
              if os.path.exists(path):
                  with open(path) as f: arm = json.load(f)
                  print(f'{path}: {len(arm.get("resources", []))} resources')
                  break
          for sol_dir in sorted(glob.glob('Solutions/*/')):
              name = os.path.basename(sol_dir.rstrip('/'))
              print(f'Solution: {name}')
              for subdir in ['Playbooks', 'Analytic Rules', 'Workbooks']:
                  d = os.path.join(sol_dir, subdir)
                  if os.path.isdir(d): print(f'  {subdir}: {len(os.listdir(d))}')
          EOF
