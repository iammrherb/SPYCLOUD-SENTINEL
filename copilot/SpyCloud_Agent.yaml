      Template: 'SpyCloudCAP_CL

        | where TimeGenerated > ago(30d)

        | summarize total = count(), completed = countif(action_status_s =~ "completed"), pending = countif(action_status_s =~ "pending"), failed = countif(action_status_s =~ "failed"),
        avg_completion_hours = avg(case(action_status_s =~ "completed", datetime_diff("hour", completed_t, initiated_t), real(null)))
        by severity_tier = case(severity_d >= 25, "Critical", severity_d >= 20, "Urgent", severity_d >= 5, "High", "Standard")

        | extend completion_rate = round(100.0 * completed / total, 1), failure_rate = round(100.0 * failed / total, 1),
        sla_target_hours = case(severity_tier == "Critical", 4, severity_tier == "Urgent", 8, severity_tier == "High", 24, 72),
        sla_compliant = iff(avg_completion_hours <= case(severity_tier == "Critical", real(4), severity_tier == "Urgent", real(8), severity_tier == "High", real(24), real(72)), "YES", "NO")

        | order by severity_tier desc'
  - Name: GetCAPActionTimeline
    DisplayName: '[Data] Get CAP action timeline'
    Description: Internal data retrieval skill. Returns a chronological timeline of CAP actions showing action volume, status distribution, and operational trends.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudCAP_CL

        | where TimeGenerated > ago(90d)

        | summarize total_actions = count(), completed = countif(action_status_s =~ "completed"), pending = countif(action_status_s =~ "pending"), failed = countif(action_status_s =~ "failed"),
        unique_emails = dcount(email_s)
        by bin(TimeGenerated, 7d)

        | extend completion_rate = round(100.0 * completed / total_actions, 1)

        | order by TimeGenerated asc'
  - Name: GetCAPSummaryDashboard
    DisplayName: '[Data] Generate CAP summary dashboard'
    Description: Internal data retrieval skill. Generates a comprehensive CAP operations summary dashboard with key metrics, status distribution, SLA compliance, and operational health indicators.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'union isfuzzy=true
        (SpyCloudCAP_CL | where TimeGenerated > ago(30d) | summarize total = count(), unique_emails = dcount(email_s), unique_policies = dcount(policy_name_s)
        | extend Metric = "Overview", Detail = strcat("Total: ", total, " actions | ", unique_emails, " users | ", unique_policies, " policies")),
        (SpyCloudCAP_CL | where TimeGenerated > ago(30d) | summarize count() by action_status_s
        | extend Metric = "By Status", Detail = strcat(action_status_s, ": ", count_)),
        (SpyCloudCAP_CL | where TimeGenerated > ago(30d) | where action_status_s =~ "completed" | summarize avg_hours = round(avg(datetime_diff("hour", completed_t, initiated_t)), 1)
        | extend Metric = "MTTR", Detail = strcat("Average completion time: ", avg_hours, " hours")),
        (SpyCloudCAP_CL | where action_status_s =~ "pending" | summarize pending_count = count(), max_hours = max(datetime_diff("hour", now(), initiated_t))
        | extend Metric = "Pending Alert", Detail = strcat(pending_count, " pending actions, oldest: ", max_hours, " hours"))
        | project Metric, Detail'
  - Name: GetInvestigationsDeepDive
    DisplayName: '[Data] Investigations API deep dive for a user'
    Description: "Internal data retrieval skill. Queries the SpyCloudInvestigations_CL table (populated by SpyCloud's Investigations API) which contains the BROADEST dataset including breaches, infostealers, phishing-sourced credentials, paste site exposures, combo lists, and dark web forum dumps. This is DISTINCT from Enterprise/Compass data."
    Inputs:
    - Name: targetEmail
      Description: The email address to investigate across ALL Investigations API source types.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudInvestigations_CL
        | where TimeGenerated > ago(90d)
        | where email =~ "{{targetEmail}}"
        | summarize
            TotalRecords = count(),
            UniqueSources = dcount(source_id),
            UniqueBreachCategories = dcount(breach_category),
            MaxSeverity = max(severity),
            AvgSeverity = round(avg(severity), 1),
            UniquePasswords = dcount(password),
            PlaintextPasswords = countif(password_type == "plaintext"),
            UniqueTargetDomains = dcount(target_domain),
            UniqueDevices = dcount(infected_machine_id),
            UniqueMalware = dcount(malware_family),
            EarliestExposure = min(TimeGenerated),
            LatestExposure = max(TimeGenerated),
            Categories = make_set(breach_category),
            MalwareFamilies = make_set(malware_family),
            TopTargetDomains = make_set(target_domain, 10)
        | extend DataSource = "SpyCloud Investigations API (broadest dataset)",
          Note = "Includes phishing, paste sites, combo lists, and forum dumps NOT available in Enterprise/Compass"'
  - Name: GetInvestigationsVsEnterprise
    DisplayName: '[Data] Compare Investigations API vs Enterprise for a user'
    Description: "Internal data retrieval skill. Side-by-side comparison of SpyCloud Investigations API data vs Enterprise breach data for the same user, highlighting the additional coverage and unique findings that Investigations provides beyond standard Enterprise lookups."
    Inputs:
    - Name: targetEmail
      Description: The email address to compare across Investigations and Enterprise data.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'let inv = SpyCloudInvestigations_CL
        | where TimeGenerated > ago(90d) and email =~ "{{targetEmail}}"
        | summarize Inv_Records = count(), Inv_Categories = make_set(breach_category), Inv_MaxSev = max(severity), Inv_Passwords = dcount(password), Inv_Plaintext = countif(password_type == "plaintext"), Inv_Targets = dcount(target_domain), Inv_Malware = make_set(malware_family);
        let ent = SpyCloudBreachWatchlist_CL
        | where TimeGenerated > ago(90d) and email_s =~ "{{targetEmail}}"
        | summarize Ent_Records = count(), Ent_MaxSev = max(severity_d), Ent_Passwords = dcount(password_s), Ent_Plaintext = countif(password_type_s == "plaintext"), Ent_Targets = dcount(target_domain_s), Ent_Malware = make_set(malware_family_s);
        inv | join kind=fullouter ent on $left.Inv_Records == $right.Ent_Records
        | project-away Inv_Records1
        | extend InvestigationsOnlyRecords = Inv_Records - Ent_Records,
          CoverageGapPct = iff(Inv_Records > 0, round(100.0 * (Inv_Records - Ent_Records) / Inv_Records, 1), 0.0),
          Comparison = "Investigations API provides the broadest dataset. Records found ONLY in Investigations (not Enterprise) typically include phishing, paste sites, combo lists, and forum dumps."'
  - Name: GetInvestigationsByCategory
    DisplayName: '[Data] Investigations API data by breach category'
    Description: "Internal data retrieval skill. Breaks down SpyCloud Investigations API data by breach category (standard breaches, infostealers, phishing, paste sites, combo lists, forum dumps) showing record counts, severity distribution, and unique findings per category."
    Inputs:
    - Name: targetEntity
      Description: Email address, domain, or username to search in Investigations data.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudInvestigations_CL
        | where TimeGenerated > ago(90d)
        | where email =~ "{{targetEntity}}" or email_domain =~ "{{targetEntity}}" or username =~ "{{targetEntity}}"
        | summarize
            Records = count(),
            UniqueEmails = dcount(email),
            MaxSeverity = max(severity),
            AvgSeverity = round(avg(severity), 1),
            PlaintextPasswords = countif(password_type == "plaintext"),
            UniqueTargetDomains = dcount(target_domain),
            UniqueMalware = dcount(malware_family),
            LatestExposure = max(TimeGenerated)
          by breach_category
        | extend IsInvestigationsOnly = iff(breach_category in ("phishing", "paste_site", "combo_list", "forum_dump"), "✅ UNIQUE to Investigations API", "Also in Enterprise")
        | order by Records desc'
  # === AI Engine Integration Skills ===
  # These skills call the SpyCloud AI Investigation Engine (Azure Function App)
  # for deep AI-powered analysis using OpenAI or Azure OpenAI.
  # Requires AIEngineUrl setting to be configured.

  - Name: AIEngineInvestigation
    DisplayName: AI Engine — Deep Investigation
    Description: "Triggers the SpyCloud AI Investigation Engine to perform a comprehensive AI-powered investigation of an exposed identity. The engine queries SpyCloud APIs, Sentinel logs, and Microsoft Graph, then uses GPT-4o to synthesize findings into a detailed analyst report with MITRE ATT&CK mapping, severity assessment, and remediation recommendations."
    Inputs:
    - Name: email
      Description: "Email address or UPN to investigate"
      Required: true
    - Name: depth
      Description: "Investigation depth: quick, standard, or deep"
      Required: false
      DefaultValue: "standard"
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: AIEngineInvestigation
        Type: WebRequest
        Url: "{{AIEngineUrl}}/api/ai/investigate"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"email": "{{email}}", "depth": "{{depth}}"}'

  - Name: AIEngineThreatResearch
    DisplayName: AI Engine — Threat Research
    Description: "Deep threat research using AI across dark web forums, blogs, social media, whitepapers, threat intelligence platforms, IOC databases, and APT tracking. Researches malware families, threat actors, CVEs, TTPs, and attack campaigns relevant to the organization's exposure data."
    Inputs:
    - Name: query
      Description: "Threat research query — malware family, APT group, CVE, IOC, or threat topic"
      Required: true
    - Name: context
      Description: "Additional context such as incident ID, affected systems, or timeframe"
      Required: false
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: AIEngineThreatResearch
        Type: WebRequest
        Url: "{{AIEngineUrl}}/api/ai/threat-research"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"query": "{{query}}", "context": "{{context}}"}'

  - Name: AIEngineExecutiveReport
    DisplayName: AI Engine — Executive Report
    Description: "Generates a board-ready executive summary of the organization's dark web exposure posture. Includes risk metrics, trend analysis, severity distribution, top exposures, remediation status, and strategic recommendations formatted for C-suite and board presentations."
    Inputs:
    - Name: domain
      Description: "Organization domain to generate report for (e.g., company.com)"
      Required: true
    - Name: periodDays
      Description: "Reporting period in days (1-365, default 30)"
      Required: false
      DefaultValue: "30"
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: AIEngineExecutiveReport
        Type: WebRequest
        Url: "{{AIEngineUrl}}/api/ai/executive-report"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"domain": "{{domain}}", "periodDays": {{periodDays}}}'

  - Name: AIEngineRemediationPlan
    DisplayName: AI Engine — Remediation Plan
    Description: "Creates a prioritized, step-by-step remediation plan for an exposed user. Includes password resets, session revocation, device isolation, Conditional Access updates, user notification templates, and timeline with responsible parties."
    Inputs:
    - Name: email
      Description: "Email address of the exposed user to generate remediation plan for"
      Required: true
    - Name: includePrevention
      Description: "Whether to include long-term prevention recommendations"
      Required: false
      DefaultValue: "true"
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: AIEngineRemediationPlan
        Type: WebRequest
        Url: "{{AIEngineUrl}}/api/ai/remediation-plan"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"email": "{{email}}", "includePrevention": {{includePrevention}}}'

  - Name: AIEngineIncidentReport
    DisplayName: AI Engine — Incident Report
    Description: "Generates a detailed incident report for a Sentinel incident including timeline reconstruction, affected entities, evidence chain, MITRE ATT&CK mapping, blast radius assessment, and remediation steps. Suitable for compliance documentation and post-incident review."
    Inputs:
    - Name: incidentId
      Description: "Sentinel incident number (numeric ID)"
      Required: true
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: AIEngineIncidentReport
        Type: WebRequest
        Url: "{{AIEngineUrl}}/api/ai/incident-report"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"incidentId": "{{incidentId}}"}'

  # === Sentinel Graph MCP Skills ===
  # These skills use the MCP server's Sentinel Graph tools for
  # blast radius, attack path, and exposure perimeter analysis.

  - Name: SentinelGraphBlastRadius
    DisplayName: Sentinel Graph — Blast Radius Analysis
    Description: "Analyzes the blast radius of a compromised entity using Microsoft Sentinel Graph (GA since Dec 2025). Maps all reachable assets, downstream dependencies, and lateral movement possibilities from the compromised account or device. Uses GQL (Graph Query Language) with KQL fallback."
    Inputs:
    - Name: entity_id
      Description: "Entity identifier — email, hostname, or IP address"
      Required: true
    - Name: entity_type
      Description: "Entity type: account, host, ip"
      Required: false
      DefaultValue: "account"
    - Name: max_depth
      Description: "Maximum traversal depth for graph walk (1-5)"
      Required: false
      DefaultValue: "3"
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: SentinelGraphBlastRadius
        Type: WebRequest
        Url: "{{MCPServerUrl}}/api/tools/find_blast_radius"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"entity_id": "{{entity_id}}", "entity_type": "{{entity_type}}", "max_depth": {{max_depth}}}'

  - Name: SentinelGraphAttackPaths
    DisplayName: Sentinel Graph — Attack Path Discovery
    Description: "Discovers walkable attack paths between two entities in the Sentinel Graph. Identifies how an attacker could move from a compromised account to a target asset through relationships like sign-ins, group memberships, device usage, and application access."
    Inputs:
    - Name: source_entity
      Description: "Source entity (compromised account or device)"
      Required: true
    - Name: target_entity
      Description: "Target entity (high-value asset to protect)"
      Required: true
    - Name: max_hops
      Description: "Maximum hops between source and target (1-10)"
      Required: false
      DefaultValue: "5"
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: SentinelGraphAttackPaths
        Type: WebRequest
        Url: "{{MCPServerUrl}}/api/tools/find_walkable_paths"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"source_entity": "{{source_entity}}", "target_entity": "{{target_entity}}", "max_hops": {{max_hops}}}'

  - Name: SentinelGraphExposurePerimeter
    DisplayName: Sentinel Graph — Exposure Perimeter
    Description: "Maps the external-facing attack surface and entry points related to SpyCloud exposure data. Identifies internet-facing assets, externally accessible applications, VPN endpoints, and other entry points that could be exploited using compromised credentials."
    Inputs:
    - Name: domain
      Description: "Domain to map exposure perimeter for"
      Required: true
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: SentinelGraphExposurePerimeter
        Type: WebRequest
        Url: "{{MCPServerUrl}}/api/tools/exposure_perimeter"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"domain": "{{domain}}"}'

  # === Purview Compliance & Data Classification Skills ===
  # These skills use the AI Engine's Purview integration for
  # compliance assessment, PII classification, and DLP monitoring.

  - Name: AIEnginePurviewComplianceAssessment
    DisplayName: AI Engine — Purview Compliance Assessment
    Description: "Generates a comprehensive regulatory compliance assessment (GDPR, CCPA, HIPAA, PCI-DSS, SOC 2) for SpyCloud exposure data. Includes breach notification timelines, Purview sensitivity label recommendations, DLP policy actions, fine estimates, and notification templates. Integrates with Microsoft Purview Information Protection and Compliance Manager."
    Inputs:
    - Name: domain
      Description: "Organization domain to assess compliance for (e.g., company.com)"
      Required: true
    - Name: frameworks
      Description: "Comma-separated regulatory frameworks to assess: gdpr,ccpa,hipaa,pci_dss,soc2 (default: all)"
      Required: false
      DefaultValue: "gdpr,ccpa,hipaa,pci_dss,soc2"
    - Name: periodDays
      Description: "Assessment period in days (1-365, default 30)"
      Required: false
      DefaultValue: "30"
    - Name: includeNotificationTemplates
      Description: "Include draft breach notification templates (true/false)"
      Required: false
      DefaultValue: "true"
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: AIEnginePurviewComplianceAssessment
        Type: WebRequest
        Url: "{{AIEngineUrl}}/api/ai/compliance-assessment"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"domain": "{{domain}}", "frameworks": ["{{frameworks}}"], "periodDays": {{periodDays}}, "includeNotificationTemplates": {{includeNotificationTemplates}}}'

  - Name: AIEnginePurviewClassify
    DisplayName: AI Engine — Purview PII Classification
    Description: "Classifies SpyCloud exposure data for an email address against PII categories and regulatory frameworks. Maps exposed fields (credentials, financial data, government IDs, contact info) to GDPR, CCPA, HIPAA, and PCI-DSS requirements. Optionally applies Purview sensitivity labels to associated Sentinel incidents."
    Inputs:
    - Name: email
      Description: "Email address to classify exposure data for"
      Required: true
    - Name: incidentId
      Description: "Optional Sentinel incident ID to apply Purview labels to"
      Required: false
    - Name: applyLabel
      Description: "Whether to apply Purview sensitivity labels (true/false)"
      Required: false
      DefaultValue: "false"
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: AIEnginePurviewClassify
        Type: WebRequest
        Url: "{{AIEngineUrl}}/api/ai/purview/classify"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"email": "{{email}}", "incidentId": "{{incidentId}}", "applyLabel": {{applyLabel}}}'

  - Name: AIEnginePurviewDLPStatus
    DisplayName: AI Engine — Purview DLP Status
    Description: "Checks Microsoft Purview DLP policy status for SpyCloud breach data protection. Queries unified audit logs for DLP rule matches, sensitivity label events, and policy violations. Provides AI-powered recommendations for DLP policy improvements and gap analysis."
    Inputs:
    - Name: domain
      Description: "Domain to check DLP status for"
      Required: true
    - Name: periodDays
      Description: "Period to analyze in days (1-365, default 30)"
      Required: false
      DefaultValue: "30"
    Settings:
      OpenApiAuthType: None
      Definition:
        Name: AIEnginePurviewDLPStatus
        Type: WebRequest
        Url: "{{AIEngineUrl}}/api/ai/purview/dlp-status"
        Method: POST
        Headers:
          Content-Type: application/json
        Body: '{"domain": "{{domain}}", "periodDays": {{periodDays}}}'

