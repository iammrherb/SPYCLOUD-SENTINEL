      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudExposure_CL

        | where TimeGenerated > ago(30d)

        | summarize total = count(), remediated = countif(remediation_status_s =~ "remediated"), unremediated = countif(remediation_status_s =~ "unremediated" or isempty(remediation_status_s)),
        in_progress = countif(remediation_status_s =~ "in_progress"), avg_risk = avg(risk_score_d)
        by severity_bucket = case(severity_d >= 25, "Critical (25)", severity_d >= 20, "Urgent (20)", severity_d >= 5, "High (5+)", "Standard (2)")

        | extend remediation_rate = round(100.0 * remediated / total, 1), gap_count = unremediated

        | order by severity_bucket desc'
