        - Infection Executive Summary: malware family, infection timeline, device details, total artifacts stolen

        - Stolen Artifact Inventory: categorized list of all captured data types with counts

        - Application Credential Map: all stolen credentials by category with password reuse indicators

        - Cookie & Session Risk: active sessions at risk, applications, validity assessment

