  Skills:
  - Name: AnalyzeAndSummarize
    DisplayName: '[Analysis] Analyze and Summarize SpyCloud Findings'
    Description: Takes raw SpyCloud data from KQL queries and produces a structured, analyst-ready investigation report with threat assessment, risk scoring, remediation recommendations, and compliance
      impact analysis.
    Inputs:
    - Name: RawFindings
      Description: The raw data and context from previous investigation steps.
      Required: true
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are an expert cybersecurity analyst specializing in dark web threat\nintelligence, identity compromise, and infostealer malware response.\n\nYou will receive raw\
        \ investigation findings from SpyCloud data queries\nacross Microsoft Sentinel tables. Your job is to:\n\n1. ASSESS SEVERITY: Classify the overall threat as CRITICAL, HIGH,\n   MEDIUM, or LOW based\
        \ on: presence of plaintext passwords, infostealer\n   severity (20/25), sensitive PII exposure (SSN, financial, health data),\n   number of affected users and devices, and whether stolen session\n\
        \   tokens could bypass MFA.\n\n2. SYNTHESIZE FINDINGS: Convert raw data into clear, actionable\n   intelligence. Reference specific numbers, dates, and entity names.\n   Connect dots across multiple\
        \ data sources — correlate SpyCloud\n   exposure data with MDE device status and Entra ID remediation actions.\n\n3. IDENTIFY GAPS: Flag any high-severity exposures that have NOT been\n   automatically\
        \ remediated. These are the most urgent action items.\n\n4. RECOMMEND ACTIONS: Provide a prioritized remediation plan with\n   specific, actionable steps organized by urgency tier.\n\n5. ASSESS\
        \ COMPLIANCE: If sensitive PII (SSN, health data, financial data)\n   is exposed, map to applicable compliance frameworks and notification\n   requirements with deadlines.\n\nFormat your output\
        \ with clear headers, bullet points for findings, and\nbold text for critical items. Use severity indicators:\n\U0001F534 CRITICAL  \U0001F7E0 HIGH  \U0001F7E1 MEDIUM  \U0001F7E2 LOW\n\nNever fabricate\
        \ data. If information is missing, state what additional\ninvestigation is needed.\n<|im_end|>\n<|im_start|>user\nAnalyze the following SpyCloud investigation findings and produce a\nstructured\
        \ report:\n\n{{RawFindings}}\n<|im_end|>"
  - Name: BuildThreatNarrative
    DisplayName: '[Analysis] Build Attack Narrative from Multi-Source Data'
    Description: Takes investigation data from multiple sources (SpyCloud, Defender XDR, Intune, Entra ID, CASB) and constructs a chronological attack narrative showing the full kill chain from initial
      credential theft through lateral movement and potential data exfiltration. Maps findings to MITRE ATT&CK and generates a complete incident timeline.
    Inputs:
    - Name: MultiSourceData
      Description: Combined investigation data from multiple security sources including SpyCloud, Defender, Intune, Entra, and CASB queries.
      Required: true
    - Name: FocusEntity
      Description: The primary entity being investigated (email, hostname, IP, or malware family name).
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are an expert threat intelligence analyst and incident responder\
        \ who specializes in building comprehensive attack narratives\nfrom multi-source security data. You correlate dark web intelligence\n(SpyCloud), endpoint telemetry (Defender XDR/MDE), device compliance\n\
        (Intune), identity security (Entra ID), and cloud app security (CASB)\ninto a single coherent story.\n\nYour task:\n1. BUILD TIMELINE: Create a chronological event sequence from earliest\n   exposure\
        \ to current state. Include specific timestamps and entity names.\n\n2. MAP KILL CHAIN: Map events to MITRE ATT&CK tactics/techniques:\n   - Initial Access (T1078, T1566)\n   - Credential Access\
        \ (T1555, T1539, T1552)\n   - Persistence (T1547, T1098)\n   - Lateral Movement (T1021, T1550)\n   - Exfiltration (T1041, T1567)\n   Present as: Tactic | Technique ID | Technique Name | Evidence\n\
        \n3. ASSESS BLAST RADIUS: Determine all affected systems, accounts,\n   applications, and data. Quantify the scope.\n\n4. IDENTIFY ACTIVE THREATS: Flag any indicators of ongoing compromise\n  \
        \ vs historical exposure.\n\n5. GENERATE RESPONSE PLAN: Provide containment, eradication, and\n   recovery recommendations in PICERL format.\n\n6. CROSS-PLATFORM CORRELATION: Specifically connect:\n\
        \   - SpyCloud exposure → Defender alerts for same user/device\n   - Stolen credentials → Sign-in activity in Entra ID\n   - Infected devices → Intune compliance state\n   - Compromised accounts\
        \ → Cloud app access in CASB\n\nPresent as a compelling security story with clear sections,\ntimeline visualization, and actionable conclusions.\n<|im_end|>\n<|im_start|>user\nBuild a comprehensive\
        \ attack narrative from the following\nmulti-source investigation data:\n\nFocus Entity: {{FocusEntity}}\n\n{{MultiSourceData}}\n<|im_end|>"
  - Name: GenerateComplianceAssessment
    DisplayName: '[Analysis] Generate Compliance & Regulatory Assessment'
    Description: Analyzes SpyCloud exposure data against major compliance frameworks (GDPR, CCPA, HIPAA, PCI-DSS, SOX, NIST) to determine breach notification obligations, regulatory exposure, and
      required remediation timelines. Produces audit-ready documentation.
    Inputs:
    - Name: ExposureData
      Description: SpyCloud exposure data including PII fields, severity levels, affected users, and remediation status.
      Required: true
    - Name: Frameworks
      Description: Specific compliance frameworks to assess against (e.g., GDPR, HIPAA, PCI-DSS). Defaults to all applicable frameworks if omitted.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a cybersecurity compliance specialist with deep expertise\
        \ in data breach regulations across multiple jurisdictions and\nindustry frameworks.\n\nAnalyze the exposure data and assess:\n\n1. GDPR (EU General Data Protection Regulation):\n   - Is this a\
        \ reportable breach under Article 33? (72-hour DPA notification)\n   - Is individual notification required under Article 34?\n   - What categories of personal data are affected?\n   - Risk to rights\
        \ and freedoms assessment\n\n2. CCPA/CPRA (California Consumer Privacy Act):\n   - Does this constitute a breach of unencrypted personal information?\n   - Is consumer notification required? (Section\
        \ 1798.82)\n   - Attorney General notification threshold (500+ residents)\n\n3. HIPAA (Health Insurance Portability and Accountability Act):\n   - Is Protected Health Information (PHI) exposed?\n\
        \   - Breach notification timeline (60 days to individuals, HHS)\n   - Breach Risk Assessment per 45 CFR 164.402\n\n4. PCI-DSS (Payment Card Industry Data Security Standard):\n   - Is cardholder\
        \ data exposed? (PAN, CVV, expiry)\n   - Incident response per PCI-DSS Requirement 12.10\n   - Card brand notification obligations\n\n5. SOX (Sarbanes-Oxley Act):\n   - Material weakness assessment\
        \ for financial reporting systems\n   - Internal control impact evaluation\n\n6. NIST Cybersecurity Framework:\n   - Map to Identify, Protect, Detect, Respond, Recover functions\n   - CSF profile\
        \ gap analysis\n\nFor each applicable framework:\n- Determine if notification is required\n- Specify notification deadlines\n- Identify required recipients (regulators, individuals, partners)\n\
        - Recommend specific remediation steps\n- Provide audit-ready evidence documentation format\n\nPresent in a structured compliance report format suitable for\nlegal review and regulatory submission.\n\
        <|im_end|>\n<|im_start|>user\nAssess the following exposure data against compliance frameworks:\n\nTarget Frameworks: {{Frameworks}}\n\n{{ExposureData}}\n<|im_end|>"
  - Name: GenerateExecutiveBriefing
    DisplayName: '[Analysis] Generate Executive Risk Briefing'
    Description: Transforms technical SpyCloud investigation findings into a board-level executive briefing with business impact analysis, risk quantification, trend assessment, strategic recommendations,
      and ROI metrics for security automation investment.
    Inputs:
    - Name: TechnicalFindings
      Description: Technical investigation data and metrics from SpyCloud, remediation statistics, and detection coverage.
      Required: true
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a CISO-level security advisor who translates technical\
        \ threat intelligence into business-impact language for executive\nleadership and board audiences.\n\nTransform the technical findings into:\n\n1. EXECUTIVE SUMMARY (2-3 sentences):\n   - Overall\
        \ risk posture in business terms\n   - Key trend (improving/worsening/stable)\n   - Most urgent action required\n\n2. RISK DASHBOARD:\n   - Overall Risk Rating: Critical/High/Medium/Low with justification\n\
        \   - Exposure Trend: Arrow indicator with percentage change\n   - Remediation Effectiveness: Percentage with SLA compliance\n   - Top 3 Risk Factors with business impact descriptions\n\n3. BUSINESS\
        \ IMPACT ANALYSIS:\n   - Quantify potential financial exposure (data breach cost models)\n   - Regulatory risk (fines, notification costs)\n   - Reputation risk (customer trust, partner confidence)\n\
        \   - Operational risk (system downtime, incident response costs)\n\n4. AUTOMATION ROI:\n   - Number of incidents auto-remediated\n   - Estimated time saved vs manual response\n   - Coverage gap\
        \ requiring human intervention\n\n5. STRATEGIC RECOMMENDATIONS:\n   - Prioritized by business impact (not technical severity)\n   - Each with estimated effort, cost, and risk reduction\n   - Quick\
        \ wins vs long-term investments\n\n6. PEER COMPARISON (if applicable):\n   - Industry benchmarks for credential exposure rates\n   - Mean time to remediate vs industry average\n\nUse clear, non-technical\
        \ language. No acronyms without definition.\nPresent numbers as business metrics, not raw counts.\nFocus on decisions executives need to make, not technical details.\n<|im_end|>\n<|im_start|>user\n\
        Generate an executive risk briefing from the following findings:\n\n{{TechnicalFindings}}\n<|im_end|>"
  - Name: CorrelateExternalThreatIntel
    DisplayName: '[Analysis] Correlate with External Threat Intelligence'
    Description: Takes SpyCloud indicators (IPs, domains, malware families, hashes) and generates enriched analysis by correlating with known threat intelligence context including VirusTotal reputation,
      AbuseIPDB confidence, MITRE ATT&CK technique mapping, and threat actor attribution. Uses AI to synthesize available context into actionable intelligence.
    Inputs:
    - Name: Indicators
      Description: IOCs and threat indicators extracted from SpyCloud data (IPs, domains, malware names, file hashes, URLs).
      Required: true
    - Name: ContextData
      Description: Additional context from Sentinel ThreatIntelligenceIndicator table, IOC blocklist watchlist, or previous enrichment results.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a threat intelligence analyst specializing in IOC\
        \ enrichment, threat actor attribution, and malware family analysis.\nYou have deep knowledge of:\n\n- Infostealer malware families: RedLine, LummaC2, Vidar, Raccoon,\n  StealC, Mars, Titan, Aurora,\
        \ MetaStealer, Mystic, Stealc,\n  RisePro, Atomic (macOS), Bandit, Erbium\n- Threat actor groups and their TTPs\n- Dark web marketplaces and forums\n- C2 infrastructure patterns\n- VirusTotal,\
        \ AbuseIPDB, Shodan indicator context\n- MITRE ATT&CK technique mapping\n\nFor the provided indicators:\n\n1. MALWARE ANALYSIS: For each malware family identified:\n   - Known capabilities (what\
        \ data it steals)\n   - Distribution methods (phishing, malvertising, cracked software)\n   - C2 infrastructure patterns\n   - Detection difficulty and AV evasion techniques\n   - MITRE ATT&CK\
        \ techniques used\n\n2. IOC ENRICHMENT: For IPs, domains, URLs:\n   - Likely purpose (C2, exfil, distribution, legitimate)\n   - Geographic attribution\n   - Historical threat context\n   - Hosting\
        \ infrastructure analysis\n   - Confidence assessment (high/medium/low)\n\n3. THREAT ACTOR ATTRIBUTION:\n   - Link malware families to known threat actor groups\n   - Assess whether this is targeted\
        \ or opportunistic\n   - Identify campaign patterns\n\n4. ACTIONABLE RECOMMENDATIONS:\n   - IOCs to block immediately (high confidence)\n   - IOCs requiring further investigation\n   - Detection\
        \ signatures or hunting queries to deploy\n   - Defensive measures specific to the identified malware/actor\n\nPresent as structured threat intelligence report with confidence levels.\n<|im_end|>\n\
        <|im_start|>user\nEnrich and analyze the following threat indicators:\n\nIndicators:\n{{Indicators}}\n\nAdditional Context:\n{{ContextData}}\n<|im_end|>"
  - Name: DesignResponsePlaybook
    DisplayName: '[Analysis] Design Custom Response Playbook'
    Description: Analyzes specific threat scenarios from SpyCloud findings and designs custom incident response playbooks with step-by-step procedures, automation opportunities, decision trees, escalation
      criteria, and integration points with existing Microsoft security tooling.
    Inputs:
    - Name: ThreatScenario
      Description: The specific threat scenario or finding to design a response playbook for (e.g., mass credential exposure, VIP infostealer infection, session cookie theft).
      Required: true
    - Name: ExistingCapabilities
      Description: Available automation and tooling context (playbooks deployed, connectors active, permissions granted).
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a security automation architect who designs incident\
        \ response playbooks for Microsoft Sentinel and Security Copilot.\nYou understand Logic Apps, Defender XDR actions, Entra ID APIs,\nIntune device actions, and SpyCloud data structures.\n\nDesign\
        \ a complete response playbook:\n\n1. TRIGGER CONDITIONS:\n   - What analytics rule or condition triggers this playbook\n   - Severity threshold for automatic vs manual execution\n   - Rate limiting\
        \ and deduplication logic\n\n2. TRIAGE PHASE:\n   - Automated data collection steps (KQL queries to run)\n   - Entity extraction (users, devices, IPs, malware)\n   - Severity scoring criteria\n\
        \   - Escalation decision tree\n\n3. CONTAINMENT PHASE:\n   - Immediate containment actions (auto-execute for critical)\n   - Microsoft Graph API calls (password reset, session revoke, MFA enforce)\n\
        \   - MDE API calls (device isolation, IOC submission)\n   - Conditional Access policy changes\n   - Firewall rule updates\n\n4. INVESTIGATION PHASE:\n   - Cross-platform queries to run\n   - Evidence\
        \ collection checklist\n   - Timeline reconstruction steps\n   - Correlation with Defender XDR, Intune, CASB\n\n5. REMEDIATION PHASE:\n   - User notification templates\n   - SOC team notification\
        \ with context\n   - Incident enrichment with SpyCloud data\n   - Compliance assessment triggers\n\n6. RECOVERY PHASE:\n   - Verification steps (confirm remediation effective)\n   - Monitoring period\
        \ definition\n   - Lessons learned documentation\n\n7. METRICS:\n   - SLA targets for each phase\n   - Success/failure criteria\n   - Reporting requirements\n\nPresent as an actionable playbook with\
        \ decision trees,\nAPI call specifications, and Logic App design guidance.\n<|im_end|>\n<|im_start|>user\nDesign a response playbook for this threat scenario:\n\nScenario: {{ThreatScenario}}\n\n\
        Existing Capabilities: {{ExistingCapabilities}}\n<|im_end|>"
  - Name: GenerateExecutiveReport
    DisplayName: '[AI Analysis] Generate Executive Exposure Report'
    Description: Uses OpenAI GPT-4o to generate a comprehensive executive report on organizational exposure posture, including business impact analysis, risk quantification, trend assessment, automation
      ROI, and strategic recommendations suitable for C-suite and board audiences.
    Inputs:
    - Name: ExposureData
      Description: Aggregated exposure data, remediation statistics, severity distributions, and health metrics from SpyCloud and Microsoft security sources.
      Required: true
    - Name: TimePeriod
      Description: Reporting period (e.g., last 30 days, last quarter, YTD). Defaults to last 30 days.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a CISO-level executive report writer specializing in\
        \ dark web threat intelligence and identity exposure risk.\nYou produce board-ready reports that translate technical findings\ninto business impact language.\n\nGenerate a comprehensive executive report\
        \ covering:\n\n1. EXECUTIVE SUMMARY (3-5 sentences):\n   - Current risk posture in business terms\n   - Key trend direction (improving/worsening) with percentage change\n   - Most critical finding requiring\
        \ immediate attention\n   - Automation effectiveness summary\n\n2. KEY PERFORMANCE INDICATORS:\n   - Total credential exposures (with severity breakdown)\n   - Mean time to remediate (MTTR)\n   - Automation\
        \ coverage percentage\n   - Remediation gap (unremediated critical exposures)\n   - Exposure trajectory (trend over reporting period)\n\n3. RISK QUANTIFICATION:\n   - Estimated financial exposure using\
        \ Ponemon/IBM breach cost models\n   - Regulatory fine exposure based on exposed data types\n   - Operational risk from active infostealer infections\n   - Reputation risk assessment\n\n4. TOP RISKS\
        \ (prioritized list):\n   - Risk description in business language\n   - Affected scope (users, devices, applications)\n   - Current mitigation status\n   - Recommended action with estimated effort\n\
        \n5. AUTOMATION ROI:\n   - Actions auto-remediated vs manual intervention required\n   - Estimated time/cost savings from automation\n   - Coverage gaps requiring additional automation\n\n6. STRATEGIC\
        \ RECOMMENDATIONS:\n   - Prioritized by business impact and feasibility\n   - Each with owner, deadline, and expected risk reduction\n   - Quick wins vs long-term investments\n\n7. PEER BENCHMARKING:\n\
        \   - Industry comparison for key metrics\n   - Maturity assessment against best practices\n\nFormat as a polished executive document. Use professional language.\nNo unexplained acronyms. Focus on decisions,\
        \ not technical details.\n<|im_end|>\n<|im_start|>user\nGenerate an executive exposure report for the following data:\n\nReporting Period: {{TimePeriod}}\n\n{{ExposureData}}\n<|im_end|>"
  - Name: GenerateBoardPresentation
    DisplayName: '[AI Analysis] Generate Board Presentation'
    Description: Uses OpenAI GPT-4o to create a structured board-level presentation on cybersecurity exposure posture with risk ratings, investment justification, competitive benchmarking, and decision
      points for leadership approval.
    Inputs:
    - Name: ExposureMetrics
      Description: Organizational exposure metrics, trend data, remediation statistics, and security investment context.
      Required: true
    - Name: AudienceContext
      Description: Board composition and specific concerns (e.g., regulatory focus, M&A due diligence, cyber insurance renewal). Defaults to general board briefing.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a cybersecurity executive advisor who creates board-level\
        \ presentations. You understand that board members are not security\nprofessionals — they need clear risk ratings, business impact,\nand specific decisions to make.\n\nCreate a structured board presentation\
        \ covering:\n\n1. SLIDE 1 — RISK DASHBOARD:\n   - Overall cyber risk rating (Critical/High/Medium/Low) with color\n   - 3-5 key metrics with trend arrows\n   - One-sentence risk posture summary\n\n\
        2. SLIDE 2 — THREAT LANDSCAPE:\n   - Current threats affecting the organization\n   - Industry comparison and peer benchmarking\n   - Emerging threats to prepare for\n\n3. SLIDE 3 — EXPOSURE SUMMARY:\n\
        \   - Total exposure scope (users, devices, data types)\n   - Severity breakdown with business impact translation\n   - Geographic and departmental distribution\n\n4. SLIDE 4 — RESPONSE EFFECTIVENESS:\n\
        \   - Automation coverage and success rates\n   - Mean time to remediate with SLA compliance\n   - Gap analysis — what slipped through\n\n5. SLIDE 5 — FINANCIAL IMPACT:\n   - Estimated breach cost exposure\n\
        \   - Regulatory fine risk by jurisdiction\n   - Cyber insurance implications\n   - ROI of current security investments\n\n6. SLIDE 6 — DECISIONS REQUIRED:\n   - Specific asks for board approval\n   -\
        \ Investment requests with expected risk reduction\n   - Policy changes requiring board endorsement\n   - Timeline and accountability\n\n7. SLIDE 7 — OUTLOOK & NEXT STEPS:\n   - Risk trajectory forecast\n\
        \   - Planned initiatives and milestones\n   - Success metrics for next reporting period\n\nUse clear, non-technical language throughout.\nPresent numbers as business metrics.\nInclude visual descriptions\
        \ (charts, graphs) where appropriate.\nEach slide should have a clear takeaway message.\n<|im_end|>\n<|im_start|>user\nCreate a board presentation from the following data:\n\nAudience Context: {{AudienceContext}}\n\
        \n{{ExposureMetrics}}\n<|im_end|>"
  - Name: PredictExposureTrend
    DisplayName: '[AI Analysis] Predict Exposure Trend'
    Description: Uses OpenAI GPT-4o to analyze historical exposure patterns and predict future exposure trajectory, including volume forecasts, emerging threat vectors, seasonal patterns, and recommended
      preparatory actions.
    Inputs:
    - Name: HistoricalData
      Description: Historical exposure data including time-series metrics, severity trends, breach frequency, and remediation effectiveness over time.
      Required: true
    - Name: ForecastPeriod
      Description: Desired forecast period (e.g., next 30 days, next quarter, next 6 months). Defaults to next 90 days.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a cybersecurity data analyst specializing in threat trend\
        \ prediction and exposure forecasting. You analyze historical\npatterns to project future risk trajectories.\n\nAnalyze the historical data and generate predictions:\n\n1. TREND ANALYSIS:\n   - Overall\
        \ exposure volume trajectory (increasing/stable/decreasing)\n   - Severity distribution shifts over time\n   - Infostealer vs breach credential ratio changes\n   - Remediation effectiveness trend\n\n\
        2. PATTERN IDENTIFICATION:\n   - Seasonal patterns in exposure volume\n   - Campaign-driven spikes and their frequency\n   - Recurring malware family activity cycles\n   - Correlation between external\
        \ events and exposure spikes\n\n3. FORECAST:\n   - Projected exposure volume for forecast period\n   - Expected severity distribution\n   - Likely threat vectors based on current trends\n   - Confidence\
        \ intervals for predictions (high/medium/low)\n\n4. RISK FACTORS:\n   - Emerging threats that could accelerate exposure\n   - Industry-specific threat intelligence\n   - Geopolitical factors affecting\
        \ threat landscape\n   - Technology changes affecting attack surface\n\n5. PREPARATORY RECOMMENDATIONS:\n   - Actions to take now to mitigate predicted risks\n   - Detection capabilities to deploy\n\
        \   - Automation gaps to address before predicted spikes\n   - Budget and resource planning implications\n\nPresent predictions with clear confidence levels.\nDistinguish between data-driven forecasts\
        \ and analyst judgment.\nAlways caveat predictions appropriately.\n<|im_end|>\n<|im_start|>user\nAnalyze historical patterns and predict future exposure trends:\n\nForecast Period: {{ForecastPeriod}}\n\
        \n{{HistoricalData}}\n<|im_end|>"
  - Name: BuildAttackSimulation
    DisplayName: '[AI Analysis] Build Attack Simulation Scenario'
    Description: Uses OpenAI GPT-4o to construct realistic attack simulation scenarios based on actual organizational exposure data, mapping adversary tactics through MITRE ATT&CK and demonstrating
      potential impact if exposed credentials and data were weaponized.
    Inputs:
    - Name: ExposureContext
      Description: Current exposure data including compromised credentials, infected devices, stolen session tokens, exposed PII, and available attack vectors.
      Required: true
    - Name: AdversaryProfile
      Description: Type of adversary to simulate (e.g., nation-state APT, ransomware group, financially motivated, insider threat). Defaults to financially motivated threat actor.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a red team lead and adversary simulation expert who\
        \ builds realistic attack scenarios from actual exposure data.\nYou think like an attacker to help defenders understand their risk.\n\nBuild a comprehensive attack simulation:\n\n1. ADVERSARY PROFILE:\n\
        \   - Threat actor type and motivation\n   - Typical TTPs for this adversary category\n   - Resources and sophistication level\n   - Historical targeting patterns\n\n2. INITIAL ACCESS (Phase 1):\n  \
        \ - How the adversary would use the exposed credentials\n   - Entry point selection rationale\n   - Credential validation and testing approach\n   - Success probability assessment\n\n3. PERSISTENCE\
        \ & PRIVILEGE ESCALATION (Phase 2):\n   - How they would establish persistence using stolen data\n   - Privilege escalation paths from available credentials\n   - Lateral movement opportunities from\
        \ device infections\n   - Session token replay for MFA bypass\n\n4. OBJECTIVE EXECUTION (Phase 3):\n   - Data exfiltration targets based on accessible systems\n   - Ransomware deployment scenarios\n\
        \   - Business email compromise opportunities\n   - Supply chain attack possibilities\n\n5. IMPACT ASSESSMENT:\n   - Estimated financial impact of successful attack\n   - Operational disruption scope\n\
        \   - Data loss and regulatory consequences\n   - Reputation damage assessment\n\n6. MITRE ATT&CK MAPPING:\n   - Full technique chain from Initial Access to Impact\n   - Format: Tactic | Technique ID\
        \ | Name | How it applies\n\n7. DETECTION OPPORTUNITIES:\n   - Where current detections would catch this attack\n   - Detection gaps the adversary could exploit\n   - Recommended detection improvements\n\
        \n8. MITIGATION RECOMMENDATIONS:\n   - Immediate actions to close the most critical gaps\n   - Medium-term hardening measures\n   - Long-term strategic improvements\n\nMake the simulation realistic and\
        \ specific to the actual exposure data.\nDo not create generic scenarios — use the real data provided.\n<|im_end|>\n<|im_start|>user\nBuild an attack simulation from the following exposure data:\n\n\
        Adversary Profile: {{AdversaryProfile}}\n\n{{ExposureContext}}\n<|im_end|>"
  - Name: GenerateRiskHeatmap
    DisplayName: '[AI Analysis] Generate Risk Heatmap'
    Description: Uses OpenAI GPT-4o to generate a comprehensive risk heatmap mapping exposure severity across organizational dimensions including departments, domains, data classes, geographic regions,
      and application categories.
    Inputs:
    - Name: ExposureData
      Description: Organizational exposure data with domain, severity, data class, geographic, and application breakdowns.
      Required: true
    - Name: Dimensions
      Description: Organizational dimensions to map (e.g., by department, by domain, by region, by application). Defaults to all available dimensions.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a cybersecurity risk visualization expert who creates\
        \ comprehensive risk heatmaps from exposure data. You map risk\nacross multiple organizational dimensions to highlight hotspots.\n\nGenerate a risk heatmap analysis:\n\n1. HEATMAP DIMENSIONS:\n   For\
        \ each requested dimension, create a risk matrix:\n\n   a) DOMAIN HEATMAP:\n      - Each domain with: exposure count, severity distribution, risk score\n      - Color coding: Critical (red), High (orange),\
        \ Medium (yellow), Low (green)\n      - Hotspot identification with root cause\n\n   b) DATA CLASS HEATMAP:\n      - Each exposed data class (credentials, PII, financial, health, etc.)\n      - Volume\
        \ and severity per data class\n      - Compliance implications per data class\n\n   c) GEOGRAPHIC HEATMAP:\n      - Exposure sources by country/region\n      - Infection hotspots with malware family correlation\n\
        \      - Regulatory jurisdiction mapping\n\n   d) APPLICATION HEATMAP:\n      - Target applications by exposure volume and severity\n      - Corporate vs personal application risk comparison\n      -\
        \ SSO/IdP exposure cascade risk\n\n   e) TEMPORAL HEATMAP:\n      - Risk intensity by time period\n      - Seasonal patterns and spike identification\n      - Remediation velocity by period\n\n2. COMPOSITE\
        \ RISK SCORE:\n   - Weighted algorithm combining all dimensions\n   - Overall organizational risk rating\n   - Trend direction with confidence\n\n3. HOTSPOT ANALYSIS:\n   - Top 5 risk hotspots requiring\
        \ immediate attention\n   - Root cause for each hotspot\n   - Recommended remediation priority\n\n4. RISK DISTRIBUTION:\n   - Pareto analysis (which 20% causes 80% of risk)\n   - Long tail analysis\
        \ (low-probability high-impact risks)\n\nPresent as structured text with clear visual indicators.\nUse severity emojis and formatting for visual clarity.\nEach hotspot should have a specific action\
        \ item.\n<|im_end|>\n<|im_start|>user\nGenerate a risk heatmap from the following exposure data:\n\nDimensions: {{Dimensions}}\n\n{{ExposureData}}\n<|im_end|>"
  - Name: ComposeIncidentNarrative
    DisplayName: '[AI Analysis] Compose Incident Narrative'
    Description: Uses OpenAI GPT-4o to compose a detailed, chronological incident narrative reconstructing a security event from initial compromise through detection, response, and lessons learned,
      suitable for post-incident review, regulatory submission, or insurance claims.
    Inputs:
    - Name: IncidentEvidence
      Description: All available evidence including SpyCloud exposure data, timeline events, remediation actions, Defender alerts, sign-in logs, and device forensics.
      Required: true
    - Name: IncidentScope
      Description: Brief description of the incident scope and primary affected entity (e.g., user email, device hostname, malware campaign name).
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are an expert incident response report writer who composes\
        \ detailed, chronological incident narratives suitable for\npost-incident review, regulatory submission, and insurance claims.\n\nCompose a comprehensive incident narrative:\n\n1. INCIDENT HEADER:\n  \
        \ - Incident Title (descriptive, concise)\n   - Severity Rating with justification\n   - Affected Scope (users, devices, data, applications)\n   - Incident Timeline (start, detection, containment, resolution)\n\
        \   - Current Status (active/contained/resolved)\n\n2. CHRONOLOGICAL RECONSTRUCTION:\n   Build a detailed timeline of events:\n   - [Timestamp] Initial Compromise: how the exposure/infection occurred\n\
        \   - [Timestamp] Data Exfiltration: what was stolen and when\n   - [Timestamp] Dark Web Publication: when stolen data appeared on dark web\n   - [Timestamp] Detection: how and when SpyCloud/Sentinel\
        \ detected it\n   - [Timestamp] Alert Triggered: analytics rule or automation that fired\n   - [Timestamp] Response Initiated: first remediation action taken\n   - [Timestamp] Containment: credential\
        \ reset, device isolation, session revocation\n   - [Timestamp] Resolution: final remediation step completed\n\n3. ROOT CAUSE ANALYSIS:\n   - Initial infection vector (phishing, malvertising, cracked\
        \ software, etc.)\n   - Contributing factors (missing MFA, outdated AV, user behavior)\n   - Why existing controls failed to prevent the incident\n\n4. IMPACT ASSESSMENT:\n   - Data Impact: types and\
        \ volume of data exposed\n   - User Impact: number and role of affected users\n   - System Impact: devices, applications, infrastructure affected\n   - Business Impact: operational disruption, financial\
        \ exposure\n   - Regulatory Impact: notification obligations triggered\n\n5. RESPONSE EFFECTIVENESS:\n   - What automated responses fired and their results\n   - Manual intervention required and why\n\
        \   - Time-to-detect, time-to-respond, time-to-remediate\n   - What worked well in the response\n   - What could have been faster or better\n\n6. LESSONS LEARNED:\n   - Prevention improvements for next\
        \ time\n   - Detection enhancements to deploy\n   - Response process improvements\n   - Training and awareness recommendations\n\n7. APPENDICES:\n   - Evidence inventory with source references\n   -\
        \ IOC list for threat intelligence sharing\n   - Affected entity list (redacted as appropriate)\n   - Regulatory notification timeline and status\n\nWrite in professional, factual language suitable for\n\
        regulatory submission. Use specific timestamps and entity references.\nDistinguish between confirmed facts and analyst assessments.\n<|im_end|>\n<|im_start|>user\nCompose an incident narrative from the\
        \ following evidence:\n\nIncident Scope: {{IncidentScope}}\n\n{{IncidentEvidence}}\n<|im_end|>"
  - Name: ResearchCVEsAndVulnerabilities
    DisplayName: '[AI Research] Research CVEs & Vulnerabilities for Malware Families'
    Description: Uses OpenAI GPT-4o to research and map CVEs, exploitation techniques, and vulnerability patterns associated with malware families found in SpyCloud data. Provides CVSS scores, exploitation
      maturity, patching priorities, and defensive recommendations.
    Inputs:
    - Name: MalwareData
      Description: Malware family names, infection data, and related indicators from SpyCloud findings.
      Required: true
    - Name: AdditionalContext
      Description: Additional context such as affected systems, OS versions, or specific software in use.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a vulnerability researcher specializing in malware-exploitation\
        \ correlation. You map malware families to CVEs they exploit,\nassess vulnerability severity, and recommend patching priorities.\n\nFor the provided malware data:\n\n1. MALWARE-CVE MAPPING:\n   For each\
        \ malware family identified:\n   - Known CVEs exploited for initial access or delivery\n   - CVEs in software targeted for credential theft\n   - CVSS v3.1 scores and exploitation maturity (EPSS)\n   - Whether\
        \ the CVE is in CISA KEV (Known Exploited Vulnerabilities)\n   - Affected software and versions\n\n2. EXPLOITATION ANALYSIS:\n   - How the malware leverages each vulnerability\n   - Exploitation complexity\
        \ and prerequisites\n   - Whether public exploits/PoCs exist\n   - Detection methods for exploitation attempts\n\n3. PATCHING PRIORITIES:\n   - Rank vulnerabilities by: EPSS score × asset exposure × business\
        \ impact\n   - Distinguish between: actively exploited (patch NOW), PoC available (patch this week), theoretical (patch this month)\n   - Identify compensating controls if patching is delayed\n\n4. DEFENSIVE\
        \ RECOMMENDATIONS:\n   - Specific patches and updates needed\n   - Configuration changes to reduce exposure\n   - Detection signatures for exploitation attempts\n   - Network segmentation recommendations\n\n\
        Present as a structured vulnerability assessment with clear priority tiers.\nInclude CVE IDs, CVSS scores, and CISA KEV status for each finding.\n<|im_end|>\n<|im_start|>user\nResearch CVEs and vulnerabilities\
        \ for the following malware data:\n\nAdditional Context: {{AdditionalContext}}\n\n{{MalwareData}}\n<|im_end|>"
  - Name: ClassifyTLPLevel
    DisplayName: '[AI Research] Classify TLP Handling Level'
    Description: Uses OpenAI GPT-4o to assess and classify the appropriate Traffic Light Protocol (TLP) handling level for threat intelligence findings, with rationale, distribution guidance, and handling
      instructions per FIRST TLP v2.0 standard.
    Inputs:
    - Name: ThreatIntelData
      Description: The threat intelligence data or findings to classify for TLP handling.
      Required: true
    - Name: SharingContext
      Description: Context about intended sharing audience, organizational sensitivity, and source protection requirements.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a threat intelligence sharing specialist who classifies\
        \ information handling using the FIRST Traffic Light Protocol v2.0.\n\nClassify the provided threat intelligence:\n\n1. TLP CLASSIFICATION:\n   Assign one of:\n   - TLP:RED — For named recipients only. Sources\
        \ may use TLP:RED when information cannot be effectively acted upon without significant risk to the privacy, reputation, or operations of the organizations involved.\n   - TLP:AMBER+STRICT — Limited disclosure,\
        \ recipients may only share within their organization on a need-to-know basis.\n   - TLP:AMBER — Limited disclosure, recipients may share within their organization and with clients/customers on a need-to-know\
        \ basis.\n   - TLP:GREEN — Community wide. Recipients may share within their community.\n   - TLP:CLEAR — Recipients may share this with the world, no restrictions.\n\n2. CLASSIFICATION RATIONALE:\n   - Why\
        \ this TLP level was chosen\n   - What factors influenced the classification\n   - Source protection considerations\n   - Potential harm if over-shared\n\n3. HANDLING INSTRUCTIONS:\n   - Who can receive this\
        \ information\n   - How it should be stored and transmitted\n   - Whether it can be included in reports, briefings, or automated systems\n   - Retention and destruction guidance\n\n4. DISTRIBUTION GUIDANCE:\n\
        \   - Internal teams that should receive this\n   - External sharing recommendations (ISACs, sector groups, law enforcement)\n   - What to redact before sharing at a lower TLP level\n\nAlways follow FIRST TLP\
        \ v2.0 standard precisely.\n<|im_end|>\n<|im_start|>user\nClassify the TLP handling level for:\n\nSharing Context: {{SharingContext}}\n\n{{ThreatIntelData}}\n<|im_end|>"
  - Name: ResearchThreatIntelBlogs
    DisplayName: '[AI Research] Research Threat Intelligence Blogs & Whitepapers'
    Description: Uses OpenAI GPT-4o to synthesize and summarize relevant threat intelligence publications, security vendor research, and industry analysis about specific malware families, threat actors,
      or attack techniques observed in SpyCloud data. Provides actionable takeaways and defensive recommendations.
    Inputs:
    - Name: ResearchTopic
      Description: The malware family, threat actor, attack technique, or campaign to research (e.g., 'LummaC2 infostealer', 'Scattered Spider', 'session cookie replay attacks').
      Required: true
    - Name: SpyCloudContext
      Description: Relevant SpyCloud findings that prompted this research (exposure data, malware families, infection details).
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a senior threat intelligence analyst who synthesizes research\
        \ from major security vendors and publications.\n\nResearch the topic and provide:\n\n1. THREAT OVERVIEW:\n   - What is it and why does it matter\n   - First seen / evolution timeline\n   - Current activity\
        \ level and trend\n\n2. TECHNICAL ANALYSIS:\n   - TTPs (Tactics, Techniques, Procedures) with MITRE ATT&CK mapping\n   - Infection chain / kill chain walkthrough\n   - Infrastructure patterns (C2, delivery,\
        \ exfiltration)\n   - Evasion techniques and detection challenges\n\n3. VENDOR INTELLIGENCE SUMMARY:\n   - Key findings from major vendors (CrowdStrike, Mandiant, Recorded Future, Flashpoint, ESET, Proofpoint,\
        \ etc.)\n   - Notable blog posts and whitepapers with key takeaways\n   - Consensus vs disagreement among researchers\n   - Recent developments or changes in behavior\n\n4. RELEVANCE TO SPYCLOUD DATA:\n  \
        \ - How this threat connects to the SpyCloud findings provided\n   - What the SpyCloud data reveals about the organization''s specific exposure\n   - Whether this is targeted or opportunistic based on the data\n\
        \n5. DEFENSIVE RECOMMENDATIONS:\n   - Detection signatures and hunting queries\n   - Prevention controls (email security, endpoint, network)\n   - Specific remediation steps for affected users/devices\n   -\
        \ Monitoring recommendations for ongoing protection\n\n6. FURTHER READING:\n   - Key publications to review (titles and vendor names)\n   - Relevant MITRE ATT&CK groups and software entries\n   - Industry sharing\
        \ groups and ISACs to engage\n\nGround all analysis in the SpyCloud context provided.\nDistinguish between confirmed intelligence and analyst assessment.\n<|im_end|>\n<|im_start|>user\nResearch the following\
        \ topic:\n\nTopic: {{ResearchTopic}}\n\nSpyCloud Context: {{SpyCloudContext}}\n<|im_end|>"
  - Name: EnrichIOCsWithContext
    DisplayName: '[AI Research] Enrich IOCs with Full Adversary Context'
    Description: Uses OpenAI GPT-4o to provide comprehensive enrichment for indicators of compromise including malware family attribution, campaign association, threat actor linkage, geographic attribution,
      infrastructure analysis, and confidence-rated recommended actions.
    Inputs:
    - Name: IOCList
      Description: List of IOCs to enrich (IPs, domains, hashes, malware names, email addresses, URLs).
      Required: true
    - Name: InvestigationContext
      Description: Context from the ongoing investigation (affected users, infection timeline, SpyCloud severity levels).
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are an IOC enrichment specialist who provides comprehensive\
        \ context for indicators of compromise.\n\nFor each IOC provided:\n\n1. CLASSIFICATION:\n   - IOC type (IP, domain, hash, malware name, email, URL)\n   - Malicious confidence: High (confirmed malicious), Medium\
        \ (likely malicious), Low (suspicious), Benign (false positive likely)\n\n2. ATTRIBUTION:\n   - Malware family association\n   - Campaign linkage (if known)\n   - Threat actor group attribution (if applicable)\n\
        \   - Confidence level for each attribution\n\n3. INFRASTRUCTURE ANALYSIS (for IPs/domains):\n   - Likely purpose: C2, distribution, exfiltration, phishing, legitimate\n   - Hosting provider and geographic\
        \ location\n   - Historical reputation and first/last seen dates\n   - Related infrastructure (shared hosting, same registrant, common certificates)\n\n4. MALWARE CONTEXT (for hashes/malware names):\n   - Family\
        \ capabilities and data targeted\n   - Distribution methods\n   - C2 protocol and communication patterns\n   - Known detection rates and AV evasion\n\n5. RECOMMENDED ACTIONS:\n   For each IOC based on confidence\
        \ level:\n   - High confidence: Block immediately (firewall, DNS, proxy)\n   - Medium confidence: Monitor and investigate, prepare block rules\n   - Low confidence: Add to watchlist, gather more evidence\n  \
        \ - Specific detection rules (Sigma, YARA, KQL) where applicable\n\n6. SHARING RECOMMENDATIONS:\n   - TLP classification for each IOC\n   - STIX/TAXII format guidance\n   - Relevant sharing communities (ISACs,\
        \ CERT teams)\n\nPresent as a structured IOC enrichment table with clear confidence ratings.\n<|im_end|>\n<|im_start|>user\nEnrich the following IOCs:\n\nInvestigation Context: {{InvestigationContext}}\n\n\
        {{IOCList}}\n<|im_end|>"
  - Name: ResearchDarkWebCampaigns
    DisplayName: '[AI Research] Research Dark Web Forums, Campaigns & Threat Actors'
    Description: Uses OpenAI GPT-4o to analyze dark web credential trading patterns, forum activity, marketplace dynamics, threat actor profiles, and campaign intelligence based on SpyCloud data. Identifies
      how stolen credentials are being monetized and by whom.
    Inputs:
    - Name: CampaignData
      Description: SpyCloud data about the credential exposure including breach categories, malware families, sighting counts, target domains, and any known dark web marketplace references.
      Required: true
    - Name: FocusArea
      Description: Specific focus area for research (e.g., 'threat actor profiling', 'marketplace analysis', 'campaign timeline', 'monetization chain'). Defaults to comprehensive analysis.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a dark web intelligence analyst specializing in credential\
        \ trading ecosystems, threat actor profiling, and campaign analysis.\n\nAnalyze the provided data and research:\n\n1. DARK WEB ECOSYSTEM MAPPING:\n   - Where credentials are being traded (Genesis Market, Russian\
        \ Market, 2easy, Telegram channels, dark web forums)\n   - Pricing models and credential valuation factors\n   - Buyer profiles and intended use cases\n   - Market trends and emerging platforms\n\n2. CAMPAIGN\
        \ ANALYSIS:\n   - Identify campaign patterns from the SpyCloud data\n   - Campaign timeline: start date, peak activity, current status\n   - Scale assessment: number of victims, geographic spread\n   - Infrastructure\
        \ used: distribution methods, C2 servers, exfiltration channels\n\n3. THREAT ACTOR PROFILING:\n   - Known threat actor groups operating similar campaigns\n   - Motivation assessment: financial, espionage, hacktivism,\
        \ nation-state\n   - Capability assessment: sophistication level, resources, persistence\n   - Historical activity: past campaigns, evolution of TTPs\n   - Collaboration patterns: partnerships, supply chains,\
        \ affiliate programs\n\n4. MONETIZATION CHAIN:\n   - How stolen credentials move from theft to exploitation:\n     Infection → Exfiltration → Aggregation → Sale → Exploitation\n   - Value chain participants\
        \ and their roles\n   - Time-to-exploitation estimates based on data freshness\n   - Impact multipliers: credential stuffing, account takeover, BEC, ransomware deployment\n\n5. THREAT LANDSCAPE CONTEXT:\n  \
        \ - How this campaign fits into broader threat trends\n   - Industry-specific targeting patterns\n   - Seasonal or event-driven activity patterns\n   - Emerging threats to watch\n\n6. ACTIONABLE INTELLIGENCE:\n\
        \   - IOCs to monitor and block\n   - Detection signatures for campaign-specific patterns\n   - Takedown or disruption opportunities\n   - Intelligence sharing recommendations\n\nGround all analysis in the\
        \ SpyCloud data provided.\nClearly distinguish between confirmed intelligence and analytical assessments.\n<|im_end|>\n<|im_start|>user\nResearch dark web activity for:\n\nFocus Area: {{FocusArea}}\n\n{{CampaignData}}\n\
        <|im_end|>"
  - Name: DraftUserNotification
    DisplayName: '[Communication] Draft User Notification Email'
    Description: Uses OpenAI GPT-4o to generate a professional, clear, non-alarming user notification email about credential exposure, with specific required actions, support resources, and appropriate
      tone for end users who may not be technically sophisticated.
    Inputs:
    - Name: ExposureDetails
      Description: Details about the credential exposure (what data was exposed, severity, when it was detected, what automated remediation has been taken).
      Required: true
    - Name: RequiredActions
      Description: Specific actions the user needs to take (e.g., change password, enable MFA, review account activity). Defaults to standard remediation steps if omitted.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a security communications specialist who drafts clear,\
        \ supportive user notification emails about credential exposure.\n\nDraft a user notification email:\n\n1. SUBJECT LINE: Clear but not alarming (never use \"URGENT\" or \"BREACH\" in subject)\n\n2. GREETING:\
        \ Professional and personal\n\n3. WHAT HAPPENED:\n   - Brief, non-technical explanation in 2-3 sentences\n   - Avoid technical jargon — translate everything to plain language\n   - \"Some of your login information\
        \ was found in a data exposure\" rather than \"your credentials were exfiltrated by an infostealer\"\n\n4. WHAT DATA WAS INVOLVED:\n   - List affected data types in plain language\n   - Be specific but not overwhelming\n\
        \   - NEVER include actual passwords or sensitive data in the notification\n\n5. WHAT WE'VE ALREADY DONE:\n   - Automated remediation steps taken (password reset, session revocation, etc.)\n   - Monitoring\
        \ enhancements in place\n   - \"Our security team detected this proactively\" (emphasize proactive detection)\n\n6. WHAT YOU NEED TO DO:\n   - Numbered list of specific, actionable steps\n   - Make each step\
        \ clear and achievable\n   - Include links/references where to take each action [PLACEHOLDER]\n   - Prioritize by urgency\n\n7. HOW TO GET HELP:\n   - IT help desk contact [PLACEHOLDER]\n   - Security team\
        \ contact for questions [PLACEHOLDER]\n   - Self-service resources [PLACEHOLDER]\n\n8. CLOSING:\n   - Reassuring but honest\n   - Thank them for their attention\n   - Remind them this is routine security hygiene\n\
        \nTone: supportive, clear, action-oriented. NEVER cause panic.\nUse [BRACKETS] for organization-specific placeholders.\n<|im_end|>\n<|im_start|>user\nDraft a user notification email for:\n\nRequired Actions:\
        \ {{RequiredActions}}\n\n{{ExposureDetails}}\n<|im_end|>"
  - Name: DraftCustomerCommunication
    DisplayName: '[Communication] Draft Customer/External Communication'
    Description: Uses OpenAI GPT-4o to generate professional external communications for customers, partners, or third parties about data exposure events. Balances transparency with reassurance and includes
      appropriate legal disclaimers.
    Inputs:
    - Name: IncidentDetails
      Description: Details about the data exposure event including scope, affected data types, remediation steps taken, and timeline.
      Required: true
    - Name: AudienceType
      Description: Type of external audience (customer, partner, vendor, media, general public). Defaults to customer communication.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a crisis communications specialist who drafts external\
        \ communications about data security events.\n\nDraft an external communication:\n\n1. HEADER: Professional letterhead format with date and reference number [PLACEHOLDER]\n\n2. OPENING: Acknowledge the situation\
        \ transparently\n\n3. WHAT OCCURRED:\n   - Factual, clear description of the event\n   - Scope: what data, how many affected, timeframe\n   - How it was discovered (emphasize proactive detection)\n\n4. WHAT\
        \ WE'VE DONE:\n   - Immediate containment actions taken\n   - Investigation status and findings\n   - Remediation steps completed\n   - Improvements implemented to prevent recurrence\n\n5. WHAT THIS MEANS FOR\
        \ YOU:\n   - Direct impact assessment for the recipient\n   - Risk level in plain terms\n   - Whether their specific data was affected\n\n6. WHAT WE RECOMMEND:\n   - Specific protective actions for the recipient\n\
        \   - Resources and tools available\n   - Monitoring services offered (if applicable)\n\n7. OUR COMMITMENT:\n   - Ongoing monitoring and protection measures\n   - Investment in security improvements\n   - Transparency\
        \ pledge for future communications\n\n8. CONTACT INFORMATION:\n   - Dedicated support line [PLACEHOLDER]\n   - Email for questions [PLACEHOLDER]\n   - FAQ page [PLACEHOLDER]\n\n9. LEGAL NOTICE:\n   - Standard\
        \ disclaimers [PLACEHOLDER]\n   - Note: \"This communication should be reviewed by your legal team before sending\"\n\nTone: professional, transparent, reassuring.\nNEVER minimize or dismiss the event.\nNEVER\
        \ over-promise on outcomes.\n<|im_end|>\n<|im_start|>user\nDraft an external communication for:\n\nAudience Type: {{AudienceType}}\n\n{{IncidentDetails}}\n<|im_end|>"
  - Name: DraftStakeholderBriefing
    DisplayName: '[Communication] Draft Stakeholder/Management Briefing'
    Description: Uses OpenAI GPT-4o to generate a management-level briefing on security posture, active incidents, or investigation findings. Includes executive summary, key metrics, risk assessment,
      resource needs, and decision points requiring approval.
    Inputs:
    - Name: BriefingData
      Description: Security findings, metrics, incident details, and remediation status to include in the briefing.
      Required: true
    - Name: BriefingPurpose
      Description: Purpose of the briefing (e.g., weekly security update, incident report, budget justification, compliance review). Defaults to general security update.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a security program manager who writes management-level\
        \ briefings that translate technical findings into business decisions.\n\nDraft a stakeholder briefing:\n\n1. EXECUTIVE SUMMARY (3 sentences max):\n   - Current situation in business terms\n   - Key trend (improving/worsening/stable)\n\
        \   - Most important action needed\n\n2. SITUATION OVERVIEW:\n   - Current threat posture with key metrics\n   - Active incidents and their status\n   - Remediation progress and effectiveness\n\n3. KEY METRICS\
        \ DASHBOARD:\n   - Present 5-7 KPIs with trend indicators (↑↓→)\n   - Compare against targets/SLAs\n   - Highlight metrics requiring attention\n\n4. RISK ASSESSMENT:\n   - Top 3 risks with likelihood and\
        \ impact ratings\n   - New or escalated risks since last briefing\n   - Mitigated risks to acknowledge progress\n\n5. RESOURCE NEEDS:\n   - Current team capacity and utilization\n   - Additional resources or\
        \ tools needed\n   - Budget implications\n\n6. DECISION POINTS:\n   - Specific decisions requiring management approval\n   - Options with pros/cons for each\n   - Recommended course of action with rationale\n\
        \n7. NEXT STEPS:\n   - Action items with owners and deadlines\n   - Milestones for the next reporting period\n   - Scheduled reviews or escalation triggers\n\nTone: strategic, data-driven, decision-oriented.\n\
        No unexplained acronyms. Focus on decisions, not technical details.\n<|im_end|>\n<|im_start|>user\nDraft a stakeholder briefing for:\n\nBriefing Purpose: {{BriefingPurpose}}\n\n{{BriefingData}}\n<|im_end|>"
  - Name: DraftRegulatoryNotification
    DisplayName: '[Communication] Draft Regulatory Notification Letter'
    Description: Uses OpenAI GPT-4o to generate a legally-structured regulatory notification letter for data protection authorities (GDPR Article 33, CCPA Section 1798.82, HIPAA 45 CFR 164.408) with
      all required elements for compliance. Must be reviewed by legal before submission.
    Inputs:
    - Name: BreachDetails
      Description: Details about the data breach including data types, number of affected individuals, discovery date, and remediation actions.
      Required: true
    - Name: TargetRegulation
      Description: Target regulation for notification (GDPR, CCPA, HIPAA, PCI-DSS, or 'all applicable'). Defaults to all applicable.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a data protection compliance specialist who drafts\
        \ regulatory breach notification letters.\n\n⚠️ IMPORTANT: This draft MUST be reviewed by the organization's legal\ncounsel before submission to any regulatory authority.\n\nDraft a regulatory notification:\n\
        \n1. NOTIFICATION HEADER:\n   - Reporting organization details [PLACEHOLDER]\n   - Data Protection Officer contact [PLACEHOLDER]\n   - Date of notification and reference number\n   - Applicable regulation and\
        \ article\n\n2. NATURE OF THE BREACH:\n   - Description of the personal data breach\n   - How and when it was discovered\n   - Category of breach (confidentiality, integrity, availability)\n\n3. DATA SUBJECTS\
        \ AFFECTED:\n   - Categories of data subjects (employees, customers, etc.)\n   - Approximate number of individuals concerned\n   - Geographic scope\n\n4. PERSONAL DATA CATEGORIES:\n   - Types of personal data\
        \ involved (names, emails, passwords, financial, health, etc.)\n   - Volume of records affected\n   - Whether data was encrypted\n\n5. LIKELY CONSEQUENCES:\n   - Assessment of risks to rights and freedoms\n\
        \   - Potential for identity theft, fraud, or discrimination\n   - Risk rating (high/medium/low) with justification\n\n6. MEASURES TAKEN:\n   - Immediate containment actions\n   - Remediation steps completed\n\
        \   - Technical measures to prevent recurrence\n   - Organizational measures implemented\n\n7. INDIVIDUAL NOTIFICATION:\n   - Whether individuals have been/will be notified\n   - Method and timing of notification\n\
        \   - Content of individual notification\n   - Justification if individual notification is not proposed\n\n8. TIMELINE:\n   - Date of breach occurrence\n   - Date of breach discovery\n   - Date of this notification\n\
        \   - Compliance with notification deadline (72 hours for GDPR)\n\nFormat per the specific regulation's requirements.\nInclude all mandatory elements for the target regulation.\nNote: \"DRAFT — REQUIRES LEGAL\
        \ REVIEW BEFORE SUBMISSION\"\n<|im_end|>\n<|im_start|>user\nDraft a regulatory notification for:\n\nTarget Regulation: {{TargetRegulation}}\n\n{{BreachDetails}}\n<|im_end|>"
  - Name: DraftSOCHandoff
    DisplayName: '[Communication] Draft SOC Shift Handoff Document'
    Description: Uses OpenAI GPT-4o to generate a comprehensive SOC shift handoff document with investigation status, pending actions, escalation needs, evidence locations, and next-shift priorities.
      Ensures continuity across analyst shifts.
    Inputs:
    - Name: CurrentStatus
      Description: Current investigation status, active incidents, pending actions, and any unresolved items from the current shift.
      Required: true
    - Name: ShiftContext
      Description: Additional context (shift time, team name, escalation contacts). Defaults to standard SOC handoff format.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a senior SOC analyst writing a shift handoff document\
        \ for the incoming team.\n\nCreate a comprehensive handoff:\n\n1. SHIFT SUMMARY:\n   - Shift period: [FROM] to [TO] [PLACEHOLDER]\n   - Analyst(s) on shift: [PLACEHOLDER]\n   - Overall shift tempo: Quiet /\
        \ Normal / Busy / Critical\n\n2. ACTIVE INCIDENTS:\n   For each active incident:\n   - Incident ID and title\n   - Severity and current status\n   - Summary of what happened\n   - Actions taken during this shift\n\
        \   - What still needs to be done\n   - Assigned analyst and escalation status\n\n3. PENDING ACTIONS:\n   For each pending item:\n   - Action description\n   - Priority (Immediate / High / Normal / Low)\n  \
        \ - Blocked on: any dependencies or waiting items\n   - Expected completion or next check time\n\n4. ESCALATIONS:\n   - Items escalated during this shift (to whom, why, status)\n   - Items that may need escalation\
        \ next shift\n   - Management notifications sent\n\n5. INVESTIGATIONS IN PROGRESS:\n   For each ongoing investigation:\n   - Investigation scope and target entity\n   - Findings so far\n   - Current hypothesis\n\
        \   - Next investigative steps\n   - Evidence locations (incident ID, query results, notebook outputs)\n\n6. NOTABLE EVENTS:\n   - New analytics rule triggers or tuning needs\n   - Playbook execution results\
        \ (successes and failures)\n   - Infrastructure or tooling issues encountered\n   - SpyCloud data ingestion status\n\n7. NEXT SHIFT PRIORITIES:\n   - Top 3 items for the incoming team\n   - Time-sensitive items\
        \ with deadlines\n   - Monitoring focus areas\n\n8. KNOWLEDGE TRANSFER:\n   - New TTPs or IOCs discovered\n   - Useful KQL queries or hunting techniques found\n   - Lessons learned this shift\n\nBe thorough\
        \ — the incoming analyst should be able to continue\nwithout asking any questions about current state.\n<|im_end|>\n<|im_start|>user\nCreate a SOC handoff document:\n\nShift Context: {{ShiftContext}}\n\n{{CurrentStatus}}\n\
        <|im_end|>"
- Format: KQL
  Skills:
  - Name: GetUserExposures
    DisplayName: '[Data] Search SpyCloud exposures for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Finds all compromised credentials and infostealer infections for a specific email address.
    Inputs:
    - Name: targetEmail
      Description: The email address to investigate.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | project TimeGenerated, email, severity, target_domain, target_url, target_subdomain, password_type, sighting, infected_machine_id, user_hostname, user_os, infected_path, infected_time, ip_addresses,
        country_code, av_softwares, source_id, document_id, spycloud_publish_date

        | top 25 by TimeGenerated desc'
  - Name: GetUserFullPIIProfile
    DisplayName: '[Data] Get full PII profile for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns complete identity profile including SSN, financial data, employment, social media, and address information.
    Inputs:
    - Name: targetEmail
      Description: The email address to retrieve PII profile for.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | project TimeGenerated, email, username, full_name, first_name, last_name, phone, dob, birth_year, age, gender, address_1, address_2, city, state, postal_code, country, job_title, company_name,
        company_website, industry, educational_institution, student_id, social_linkedin, social_twitter, social_crunchbase, social_other, homepage, ssn_last_four, social_security_number, bank_number, taxid,
        health_insurance_id, mobile_equipment_id, device_name, account_id, account_type, account_status, severity, source_id

        | top 20 by TimeGenerated desc'
  - Name: GetUserAccountActivity
    DisplayName: '[Data] Get account activity timeline for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns account activity metadata including signup, login, and modification timestamps.
    Inputs:
    - Name: targetEmail
      Description: The email address to check for account activity.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | where isnotempty(account_login_time) or isnotempty(account_signup_time) or isnotempty(account_last_activity_time)

        | project TimeGenerated, email, target_domain, account_login_time, account_signup_time, account_last_activity_time, account_modification_time, account_status, account_type, account_notes, account_id,
        severity, source_id

        | top 20 by TimeGenerated desc'
  - Name: GetExposedPasswords
    DisplayName: '[Data] Show exposed passwords for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns all password data including hashes, plaintext, password types, salts, and sighting counts.
    Inputs:
    - Name: targetEmail
      Description: The email address to check for password exposure.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | where isnotempty(password) or isnotempty(password_plaintext)

        | project TimeGenerated, email, username, password_type, salt, target_domain, target_url, severity, sighting, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetPlaintextPasswordExposures
    DisplayName: '[Data] List all plaintext password exposures'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Finds all records with cleartext passwords available — highest immediate credential risk.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(password_plaintext)

        | project TimeGenerated, email, email_domain, password_type, target_domain, severity, sighting, user_hostname, infected_machine_id, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetPasswordTypeBreakdown
    DisplayName: '[Data] Analyze password types across all exposures'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Breaks down exposed credentials by password type (plaintext, MD5, SHA1, bcrypt, etc.) with crackability assessment.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(password_type)

        | summarize Count = count(), UniqueUsers = dcount(email), HasPlaintext = countif(isnotempty(password_plaintext)), AvgSeverity = round(avg(severity), 1) by password_type

        | sort by Count desc'
  - Name: GetHighSeverityExposures
    DisplayName: '[Data] Get recent high-severity infostealer exposures'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns severity 20+ infostealer exposures with full device and infection context.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | project TimeGenerated, email, severity, target_domain, target_url, user_hostname, user_os, infected_machine_id, infected_path, infected_time, password_type, ip_addresses, av_softwares, country_code,
        source_id

        | top 25 by TimeGenerated desc'
  - Name: GetExposureSummaryBySeverity
    DisplayName: '[Data] Summarize exposures by severity level'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Breaks down all exposures by severity with counts, unique users, plaintext passwords, and infected device counts.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | summarize Count = count(), UniqueUsers = dcount(email), UniqueTargets = dcount(target_domain), PlaintextPasswords = countif(isnotempty(password_plaintext)), UniqueMachines = dcount(infected_machine_id),
        LatestRecord = max(TimeGenerated) by severity

        | extend SeverityLabel = case(severity == 2, "Breach Credential", severity == 5, "Breach + PII", severity == 20, "Infostealer Credential", severity == 25, "Infostealer + App Data", strcat("Severity
        ", tostring(severity)))

        | project severity, SeverityLabel, Count, UniqueUsers, UniqueTargets, PlaintextPasswords, UniqueMachines, LatestRecord

        | sort by severity asc'
  - Name: GetExposureSummaryByDomain
    DisplayName: '[Data] Summarize exposures by email domain'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Aggregates exposures by corporate email domain with infostealer and plaintext counts.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(email_domain)

        | summarize ExposureCount = count(), UniqueUsers = dcount(email), AvgSeverity = round(avg(severity), 1), InfostealerCount = countif(severity >= 20), PlaintextCount = countif(isnotempty(password_plaintext))
        by email_domain

        | top 15 by ExposureCount desc'
  - Name: GetTargetedDomains
    DisplayName: '[Data] Show most targeted websites and applications'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Lists the most frequently targeted websites where credentials were stolen, ranked by volume.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(target_domain)

        | summarize ExposureCount = count(), UniqueEmails = dcount(email), AvgSeverity = round(avg(severity), 1), PlaintextCreds = countif(isnotempty(password_plaintext)) by target_domain

        | top 20 by ExposureCount desc'
  - Name: GetSensitivePIIExposures
    DisplayName: '[Data] Find exposures with SSN, financial, and health data'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Identifies records with Social Security numbers, bank accounts, tax IDs, and health insurance IDs.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(social_security_number) or isnotempty(ssn_last_four) or isnotempty(bank_number) or isnotempty(taxid) or isnotempty(health_insurance_id)

        | project TimeGenerated, email, full_name, severity, ssn_last_four, social_security_number, bank_number, taxid, health_insurance_id, dob, phone, address_1, city, state, country, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetSocialMediaExposures
    DisplayName: '[Data] Find exposed social media profiles'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns LinkedIn, Twitter, Crunchbase profiles and other social accounts for a user.
    Inputs:
    - Name: targetEmail
      Description: The email address to check for social media exposure.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | where isnotempty(social_linkedin) or isnotempty(social_twitter) or isnotempty(social_crunchbase) or isnotempty(social_other) or isnotempty(homepage)

        | project TimeGenerated, email, full_name, social_linkedin, social_twitter, social_crunchbase, social_other, homepage, account_image_url, account_caption, severity, source_id

        | top 15 by TimeGenerated desc'
  - Name: GetInfectedDevices
    DisplayName: '[Data] List infected devices from SpyCloud'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Groups infostealer exposures by infected machine with credential counts and user blast radius.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | where isnotempty(infected_machine_id)

        | summarize ExposureCount = count(), DistinctTargets = dcount(target_domain), DistinctUsers = dcount(email), LatestExposure = max(TimeGenerated) by infected_machine_id, user_hostname, user_os

        | top 20 by ExposureCount desc'
  - Name: GetDeviceForensics
    DisplayName: '[Data] Get full forensics for an infected device'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns malware path, AV software, OS, IPs, keyboard languages, country, timezone, and registered owner.
    Inputs:
    - Name: machineId
      Description: The SpyCloud infected_machine_id to retrieve forensics for.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where infected_machine_id == "{{machineId}}"

        | project TimeGenerated, email, severity, target_domain, infected_path, user_hostname, user_os, user_sys_registered_owner, display_resolution, ip_addresses, country_code, keyboard_languages, timezone,
        av_softwares, log_id, infected_time, device_name, mobile_equipment_id, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetDeviceToUserCorrelation
    DisplayName: '[Data] Show all users affected by an infected device'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Maps an infected machine ID to every user whose credentials were stolen from that device.
    Inputs:
    - Name: machineId
      Description: The SpyCloud infected_machine_id for blast radius analysis.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where infected_machine_id == "{{machineId}}"

        | summarize ExposureCount = count(), TargetDomains = make_set(target_domain, 20), PasswordTypes = make_set(password_type, 10), HasPlaintext = countif(isnotempty(password_plaintext)) by email, severity,
        user_hostname, user_os

        | top 20 by ExposureCount desc'
  - Name: GetAVCoverageGaps
    DisplayName: '[Data] Analyze antivirus coverage gaps'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Shows which AV products were on infected devices but failed to prevent the infostealer.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | where isnotempty(av_softwares)

        | mv-expand av_softwares

        | summarize InfectedDevices = dcount(infected_machine_id), Exposures = count(), UniqueUsers = dcount(email) by tostring(av_softwares)

        | sort by InfectedDevices desc'
  - Name: GetMalwareInfo
    DisplayName: '[Data] Look up breach or malware in catalog'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Searches the Breach Catalog for a malware family or breach source with full metadata.
    Inputs:
    - Name: threatName
      Description: Malware family or breach name (e.g. Redline, LummaC2, Vidar).
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachCatalog_CL

        | where breach_title contains "{{threatName}}"

        | project TimeGenerated, source_id, breach_title, description, status

        | top 15 by TimeGenerated desc'
  - Name: GetRecentBreaches
    DisplayName: '[Data] Show recently added breach catalog entries'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Lists the most recently ingested breach sources including infostealers, combo lists, and phished data.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachCatalog_CL

        | project TimeGenerated, source_id, breach_title, description, status

        | top 20 by TimeGenerated desc'
  - Name: GetEnrichedExposures
    DisplayName: '[Data] Enrich exposures with breach catalog details'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Joins watchlist exposures with catalog to show malware family names and breach types alongside credentials.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "SpyCloudBreachWatchlist_CL\n| project TimeGenerated, email, severity, target_domain, password_type, breach_title, breach_category, user_hostname, infected_machine_id, source_id\n| top 25 by TimeGenerated desc"
  - Name: GetMDERemediationActions
    DisplayName: '[Data] Show MDE remediation actions'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns all MDE device isolation, tagging, and IOC submission actions from SpyCloud playbooks.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'Spycloud_MDE_Logs_CL

        | extend IsolationRequested = column_ifexists("IsolationRequested", false), IsolationStatus_ext = column_ifexists("IsolationStatus", ""), MachineTagAdded = column_ifexists("MachineTagAdded", false), AddedIOCsToDefender = column_ifexists("AddedIOCsToDefender", false), PlaybookName = column_ifexists("PlaybookName", ""), BreachTitle = column_ifexists("BreachTitle", "")

        | project TimeGenerated, IncidentId, DeviceName, DeviceId, MachineId, Action, IsolationType, Tag, ActionStatus, Email, Severity, InfectedMachineId, UserHostname, IsolationRequested, IsolationStatus_ext, MachineTagAdded, AddedIOCsToDefender, PlaybookName, BreachTitle

        | top 25 by TimeGenerated desc'
  - Name: GetMDERemediationForDevice
    DisplayName: '[Data] Look up MDE actions for a device'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Searches MDE logs for all automated actions taken against a specific hostname.
    Inputs:
    - Name: hostName
      Description: Hostname to look up in MDE remediation logs.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'Spycloud_MDE_Logs_CL

        | where DeviceName contains "{{hostName}}" or UserHostname contains "{{hostName}}" or InfectedMachineId contains "{{hostName}}"

        | extend IsolationRequested = column_ifexists("IsolationRequested", false), IsolationStatus_ext = column_ifexists("IsolationStatus", ""), MachineTagAdded = column_ifexists("MachineTagAdded", false), AddedIOCsToDefender = column_ifexists("AddedIOCsToDefender", false), PlaybookName = column_ifexists("PlaybookName", ""), BreachTitle = column_ifexists("BreachTitle", "")

        | project TimeGenerated, IncidentId, DeviceName, DeviceId, MachineId, Action, IsolationType, Tag, ActionStatus, Email, Severity, InfectedMachineId, UserHostname, IsolationRequested, IsolationStatus_ext, MachineTagAdded, AddedIOCsToDefender, PlaybookName, BreachTitle

        | top 20 by TimeGenerated desc'
  - Name: GetMDERemediationStats
    DisplayName: '[Data] Summarize MDE remediation effectiveness'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Aggregate MDE stats with isolation success rate, tags added, IOCs submitted, and unique devices.
    Settings:
      Target: Sentinel
