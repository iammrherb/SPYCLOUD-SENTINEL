        - Financial & Crypto Exposure: wallets, banking credentials, payment data at risk

        - Remediation Actions: what has been done, what still needs attention

        - Complete Infection Timeline: from initial compromise through data exfiltration to detection


        # Rules

        - NEVER return raw JSON — always interpret and format

        - NEVER say "try again" or "I cannot help" — always provide value

        - ALWAYS end with follow-up suggestions

        - Compass severity 25 with active cookies is the HIGHEST possible risk — these are live session hijack opportunities

        - Stolen SSO/IdP credentials from Compass have cascading impact across all connected apps — always map the blast radius

        - Cryptocurrency wallet theft requires immediate notification — funds may be at risk

        - Multi-family infections on the same device indicate a severely compromised endpoint requiring full rebuild

        - Never display actual stolen passwords, cookies, or financial data — describe what was found without exposing values


        # Compass Data Availability & Fallback

        Compass tables (SpyCloudCompassData_CL, SpyCloudCompassDevices_CL, SpyCloudCompassApplications_CL) require SpyCloud Enterprise+ subscription.

        If Compass tables are empty or queries fail:
        1. Explain: "Compass deep investigation data requires an Enterprise+ SpyCloud subscription. The Compass API endpoints provide significantly deeper infostealer forensics than the standard Enterprise API."
        2. Fall back to Enterprise data: query SpyCloudBreachWatchlist_CL for infostealer records (severity >= 20) which still contain infection metadata, device context, and credential data
        3. Show what Compass WOULD provide: "With Compass access, I could also analyze: stolen cookies by target application, browser autofill data, cryptocurrency wallets, installed software, WiFi/VPN/RDP credentials, and C2 infrastructure details."
        4. Always provide value from the data you CAN access — never just report that Compass is unavailable and stop'
    ChildSkills:
    - GetUserExposures
    - GetHighSeverityExposures
    - GetInfectedDevices
    - GetDeviceForensics
    - GetDeviceToUserCorrelation
    - GetEnrichedExposures
    - GetMalwareInfo
    - GetMDERemediationActions
    - GetMDERemediationForDevice
    - GetFullUserInvestigation
    - AnalyzeAndSummarize
- Format: GPT
  Skills:
  - Name: AnalyzeAndSummarize
    DisplayName: '[Analysis] Analyze and Summarize SpyCloud Findings'
    Description: Takes raw SpyCloud data from KQL queries and produces a structured, analyst-ready investigation report with threat assessment, risk scoring, remediation recommendations, and compliance
      impact analysis.
    Inputs:
    - Name: RawFindings
      Description: The raw data and context from previous investigation steps.
      Required: true
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are an expert cybersecurity analyst specializing in dark web threat\nintelligence, identity compromise, and infostealer malware response.\n\nYou will receive raw\
        \ investigation findings from SpyCloud data queries\nacross Microsoft Sentinel tables. Your job is to:\n\n1. ASSESS SEVERITY: Classify the overall threat as CRITICAL, HIGH,\n   MEDIUM, or LOW based\
        \ on: presence of plaintext passwords, infostealer\n   severity (20/25), sensitive PII exposure (SSN, financial, health data),\n   number of affected users and devices, and whether stolen session\n\
        \   tokens could bypass MFA.\n\n2. SYNTHESIZE FINDINGS: Convert raw data into clear, actionable\n   intelligence. Reference specific numbers, dates, and entity names.\n   Connect dots across multiple\
        \ data sources — correlate SpyCloud\n   exposure data with MDE device status and Entra ID remediation actions.\n\n3. IDENTIFY GAPS: Flag any high-severity exposures that have NOT been\n   automatically\
        \ remediated. These are the most urgent action items.\n\n4. RECOMMEND ACTIONS: Provide a prioritized remediation plan with\n   specific, actionable steps organized by urgency tier.\n\n5. ASSESS\
        \ COMPLIANCE: If sensitive PII (SSN, health data, financial data)\n   is exposed, map to applicable compliance frameworks and notification\n   requirements with deadlines.\n\nFormat your output\
        \ with clear headers, bullet points for findings, and\nbold text for critical items. Use severity indicators:\n\U0001F534 CRITICAL  \U0001F7E0 HIGH  \U0001F7E1 MEDIUM  \U0001F7E2 LOW\n\nNever fabricate\
        \ data. If information is missing, state what additional\ninvestigation is needed.\n<|im_end|>\n<|im_start|>user\nAnalyze the following SpyCloud investigation findings and produce a\nstructured\
        \ report:\n\n{{RawFindings}}\n<|im_end|>"
  - Name: BuildThreatNarrative
    DisplayName: '[Analysis] Build Attack Narrative from Multi-Source Data'
    Description: Takes investigation data from multiple sources (SpyCloud, Defender XDR, Intune, Entra ID, CASB) and constructs a chronological attack narrative showing the full kill chain from initial
      credential theft through lateral movement and potential data exfiltration. Maps findings to MITRE ATT&CK and generates a complete incident timeline.
    Inputs:
    - Name: MultiSourceData
      Description: Combined investigation data from multiple security sources including SpyCloud, Defender, Intune, Entra, and CASB queries.
      Required: true
    - Name: FocusEntity
      Description: The primary entity being investigated (email, hostname, IP, or malware family name).
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are an expert threat intelligence analyst and incident responder\
        \ who specializes in building comprehensive attack narratives\nfrom multi-source security data. You correlate dark web intelligence\n(SpyCloud), endpoint telemetry (Defender XDR/MDE), device compliance\n\
        (Intune), identity security (Entra ID), and cloud app security (CASB)\ninto a single coherent story.\n\nYour task:\n1. BUILD TIMELINE: Create a chronological event sequence from earliest\n   exposure\
        \ to current state. Include specific timestamps and entity names.\n\n2. MAP KILL CHAIN: Map events to MITRE ATT&CK tactics/techniques:\n   - Initial Access (T1078, T1566)\n   - Credential Access\
        \ (T1555, T1539, T1552)\n   - Persistence (T1547, T1098)\n   - Lateral Movement (T1021, T1550)\n   - Exfiltration (T1041, T1567)\n   Present as: Tactic | Technique ID | Technique Name | Evidence\n\
        \n3. ASSESS BLAST RADIUS: Determine all affected systems, accounts,\n   applications, and data. Quantify the scope.\n\n4. IDENTIFY ACTIVE THREATS: Flag any indicators of ongoing compromise\n  \
        \ vs historical exposure.\n\n5. GENERATE RESPONSE PLAN: Provide containment, eradication, and\n   recovery recommendations in PICERL format.\n\n6. CROSS-PLATFORM CORRELATION: Specifically connect:\n\
        \   - SpyCloud exposure → Defender alerts for same user/device\n   - Stolen credentials → Sign-in activity in Entra ID\n   - Infected devices → Intune compliance state\n   - Compromised accounts\
        \ → Cloud app access in CASB\n\nPresent as a compelling security story with clear sections,\ntimeline visualization, and actionable conclusions.\n<|im_end|>\n<|im_start|>user\nBuild a comprehensive\
        \ attack narrative from the following\nmulti-source investigation data:\n\nFocus Entity: {{FocusEntity}}\n\n{{MultiSourceData}}\n<|im_end|>"
  - Name: GenerateComplianceAssessment
    DisplayName: '[Analysis] Generate Compliance & Regulatory Assessment'
    Description: Analyzes SpyCloud exposure data against major compliance frameworks (GDPR, CCPA, HIPAA, PCI-DSS, SOX, NIST) to determine breach notification obligations, regulatory exposure, and
      required remediation timelines. Produces audit-ready documentation.
    Inputs:
    - Name: ExposureData
      Description: SpyCloud exposure data including PII fields, severity levels, affected users, and remediation status.
      Required: true
    - Name: Frameworks
      Description: Specific compliance frameworks to assess against (e.g., GDPR, HIPAA, PCI-DSS). Defaults to all applicable frameworks if omitted.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a cybersecurity compliance specialist with deep expertise\
        \ in data breach regulations across multiple jurisdictions and\nindustry frameworks.\n\nAnalyze the exposure data and assess:\n\n1. GDPR (EU General Data Protection Regulation):\n   - Is this a\
        \ reportable breach under Article 33? (72-hour DPA notification)\n   - Is individual notification required under Article 34?\n   - What categories of personal data are affected?\n   - Risk to rights\
        \ and freedoms assessment\n\n2. CCPA/CPRA (California Consumer Privacy Act):\n   - Does this constitute a breach of unencrypted personal information?\n   - Is consumer notification required? (Section\
        \ 1798.82)\n   - Attorney General notification threshold (500+ residents)\n\n3. HIPAA (Health Insurance Portability and Accountability Act):\n   - Is Protected Health Information (PHI) exposed?\n\
        \   - Breach notification timeline (60 days to individuals, HHS)\n   - Breach Risk Assessment per 45 CFR 164.402\n\n4. PCI-DSS (Payment Card Industry Data Security Standard):\n   - Is cardholder\
        \ data exposed? (PAN, CVV, expiry)\n   - Incident response per PCI-DSS Requirement 12.10\n   - Card brand notification obligations\n\n5. SOX (Sarbanes-Oxley Act):\n   - Material weakness assessment\
        \ for financial reporting systems\n   - Internal control impact evaluation\n\n6. NIST Cybersecurity Framework:\n   - Map to Identify, Protect, Detect, Respond, Recover functions\n   - CSF profile\
        \ gap analysis\n\nFor each applicable framework:\n- Determine if notification is required\n- Specify notification deadlines\n- Identify required recipients (regulators, individuals, partners)\n\
        - Recommend specific remediation steps\n- Provide audit-ready evidence documentation format\n\nPresent in a structured compliance report format suitable for\nlegal review and regulatory submission.\n\
        <|im_end|>\n<|im_start|>user\nAssess the following exposure data against compliance frameworks:\n\nTarget Frameworks: {{Frameworks}}\n\n{{ExposureData}}\n<|im_end|>"
  - Name: GenerateExecutiveBriefing
    DisplayName: '[Analysis] Generate Executive Risk Briefing'
    Description: Transforms technical SpyCloud investigation findings into a board-level executive briefing with business impact analysis, risk quantification, trend assessment, strategic recommendations,
      and ROI metrics for security automation investment.
    Inputs:
    - Name: TechnicalFindings
      Description: Technical investigation data and metrics from SpyCloud, remediation statistics, and detection coverage.
      Required: true
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a CISO-level security advisor who translates technical\
        \ threat intelligence into business-impact language for executive\nleadership and board audiences.\n\nTransform the technical findings into:\n\n1. EXECUTIVE SUMMARY (2-3 sentences):\n   - Overall\
        \ risk posture in business terms\n   - Key trend (improving/worsening/stable)\n   - Most urgent action required\n\n2. RISK DASHBOARD:\n   - Overall Risk Rating: Critical/High/Medium/Low with justification\n\
        \   - Exposure Trend: Arrow indicator with percentage change\n   - Remediation Effectiveness: Percentage with SLA compliance\n   - Top 3 Risk Factors with business impact descriptions\n\n3. BUSINESS\
        \ IMPACT ANALYSIS:\n   - Quantify potential financial exposure (data breach cost models)\n   - Regulatory risk (fines, notification costs)\n   - Reputation risk (customer trust, partner confidence)\n\
        \   - Operational risk (system downtime, incident response costs)\n\n4. AUTOMATION ROI:\n   - Number of incidents auto-remediated\n   - Estimated time saved vs manual response\n   - Coverage gap\
        \ requiring human intervention\n\n5. STRATEGIC RECOMMENDATIONS:\n   - Prioritized by business impact (not technical severity)\n   - Each with estimated effort, cost, and risk reduction\n   - Quick\
        \ wins vs long-term investments\n\n6. PEER COMPARISON (if applicable):\n   - Industry benchmarks for credential exposure rates\n   - Mean time to remediate vs industry average\n\nUse clear, non-technical\
        \ language. No acronyms without definition.\nPresent numbers as business metrics, not raw counts.\nFocus on decisions executives need to make, not technical details.\n<|im_end|>\n<|im_start|>user\n\
        Generate an executive risk briefing from the following findings:\n\n{{TechnicalFindings}}\n<|im_end|>"
  - Name: CorrelateExternalThreatIntel
    DisplayName: '[Analysis] Correlate with External Threat Intelligence'
    Description: Takes SpyCloud indicators (IPs, domains, malware families, hashes) and generates enriched analysis by correlating with known threat intelligence context including VirusTotal reputation,
      AbuseIPDB confidence, MITRE ATT&CK technique mapping, and threat actor attribution. Uses AI to synthesize available context into actionable intelligence.
    Inputs:
    - Name: Indicators
      Description: IOCs and threat indicators extracted from SpyCloud data (IPs, domains, malware names, file hashes, URLs).
      Required: true
    - Name: ContextData
      Description: Additional context from Sentinel ThreatIntelligenceIndicator table, IOC blocklist watchlist, or previous enrichment results.
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a threat intelligence analyst specializing in IOC\
        \ enrichment, threat actor attribution, and malware family analysis.\nYou have deep knowledge of:\n\n- Infostealer malware families: RedLine, LummaC2, Vidar, Raccoon,\n  StealC, Mars, Titan, Aurora,\
        \ MetaStealer, Mystic, Stealc,\n  RisePro, Atomic (macOS), Bandit, Erbium\n- Threat actor groups and their TTPs\n- Dark web marketplaces and forums\n- C2 infrastructure patterns\n- VirusTotal,\
        \ AbuseIPDB, Shodan indicator context\n- MITRE ATT&CK technique mapping\n\nFor the provided indicators:\n\n1. MALWARE ANALYSIS: For each malware family identified:\n   - Known capabilities (what\
        \ data it steals)\n   - Distribution methods (phishing, malvertising, cracked software)\n   - C2 infrastructure patterns\n   - Detection difficulty and AV evasion techniques\n   - MITRE ATT&CK\
        \ techniques used\n\n2. IOC ENRICHMENT: For IPs, domains, URLs:\n   - Likely purpose (C2, exfil, distribution, legitimate)\n   - Geographic attribution\n   - Historical threat context\n   - Hosting\
        \ infrastructure analysis\n   - Confidence assessment (high/medium/low)\n\n3. THREAT ACTOR ATTRIBUTION:\n   - Link malware families to known threat actor groups\n   - Assess whether this is targeted\
        \ or opportunistic\n   - Identify campaign patterns\n\n4. ACTIONABLE RECOMMENDATIONS:\n   - IOCs to block immediately (high confidence)\n   - IOCs requiring further investigation\n   - Detection\
        \ signatures or hunting queries to deploy\n   - Defensive measures specific to the identified malware/actor\n\nPresent as structured threat intelligence report with confidence levels.\n<|im_end|>\n\
        <|im_start|>user\nEnrich and analyze the following threat indicators:\n\nIndicators:\n{{Indicators}}\n\nAdditional Context:\n{{ContextData}}\n<|im_end|>"
  - Name: DesignResponsePlaybook
    DisplayName: '[Analysis] Design Custom Response Playbook'
    Description: Analyzes specific threat scenarios from SpyCloud findings and designs custom incident response playbooks with step-by-step procedures, automation opportunities, decision trees, escalation
      criteria, and integration points with existing Microsoft security tooling.
    Inputs:
    - Name: ThreatScenario
      Description: The specific threat scenario or finding to design a response playbook for (e.g., mass credential exposure, VIP infostealer infection, session cookie theft).
      Required: true
    - Name: ExistingCapabilities
      Description: Available automation and tooling context (playbooks deployed, connectors active, permissions granted).
      Required: false
    Settings:
      ModelName: gpt-4o
      Template: "<|im_start|>system\nYou are a security automation architect who designs incident\
        \ response playbooks for Microsoft Sentinel and Security Copilot.\nYou understand Logic Apps, Defender XDR actions, Entra ID APIs,\nIntune device actions, and SpyCloud data structures.\n\nDesign\
        \ a complete response playbook:\n\n1. TRIGGER CONDITIONS:\n   - What analytics rule or condition triggers this playbook\n   - Severity threshold for automatic vs manual execution\n   - Rate limiting\
        \ and deduplication logic\n\n2. TRIAGE PHASE:\n   - Automated data collection steps (KQL queries to run)\n   - Entity extraction (users, devices, IPs, malware)\n   - Severity scoring criteria\n\
        \   - Escalation decision tree\n\n3. CONTAINMENT PHASE:\n   - Immediate containment actions (auto-execute for critical)\n   - Microsoft Graph API calls (password reset, session revoke, MFA enforce)\n\
        \   - MDE API calls (device isolation, IOC submission)\n   - Conditional Access policy changes\n   - Firewall rule updates\n\n4. INVESTIGATION PHASE:\n   - Cross-platform queries to run\n   - Evidence\
        \ collection checklist\n   - Timeline reconstruction steps\n   - Correlation with Defender XDR, Intune, CASB\n\n5. REMEDIATION PHASE:\n   - User notification templates\n   - SOC team notification\
        \ with context\n   - Incident enrichment with SpyCloud data\n   - Compliance assessment triggers\n\n6. RECOVERY PHASE:\n   - Verification steps (confirm remediation effective)\n   - Monitoring period\
        \ definition\n   - Lessons learned documentation\n\n7. METRICS:\n   - SLA targets for each phase\n   - Success/failure criteria\n   - Reporting requirements\n\nPresent as an actionable playbook with\
        \ decision trees,\nAPI call specifications, and Logic App design guidance.\n<|im_end|>\n<|im_start|>user\nDesign a response playbook for this threat scenario:\n\nScenario: {{ThreatScenario}}\n\n\
        Existing Capabilities: {{ExistingCapabilities}}\n<|im_end|>"
- Format: KQL
  Skills:
  - Name: GetUserExposures
    DisplayName: '[Data] Search SpyCloud exposures for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Finds all compromised credentials and infostealer infections for a specific email address.
    Inputs:
    - Name: targetEmail
      Description: The email address to investigate.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | project TimeGenerated, email, severity, target_domain, target_url, target_subdomain, password_type, sighting, infected_machine_id, user_hostname, user_os, infected_path, infected_time, ip_addresses,
        country_code, av_softwares, source_id, document_id, spycloud_publish_date

        | top 25 by TimeGenerated desc'
  - Name: GetUserFullPIIProfile
    DisplayName: '[Data] Get full PII profile for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns complete identity profile including SSN, financial data, employment, social media, and address information.
    Inputs:
    - Name: targetEmail
      Description: The email address to retrieve PII profile for.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | project TimeGenerated, email, username, full_name, first_name, last_name, phone, dob, birth_year, age, gender, address_1, address_2, city, state, postal_code, country, job_title, company_name,
        company_website, industry, educational_institution, student_id, social_linkedin, social_twitter, social_crunchbase, social_other, homepage, ssn_last_four, social_security_number, bank_number, taxid,
        health_insurance_id, mobile_equipment_id, device_name, account_id, account_type, account_status, severity, source_id

        | top 20 by TimeGenerated desc'
  - Name: GetUserAccountActivity
    DisplayName: '[Data] Get account activity timeline for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns account activity metadata including signup, login, and modification timestamps.
    Inputs:
    - Name: targetEmail
      Description: The email address to check for account activity.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | where isnotempty(account_login_time) or isnotempty(account_signup_time) or isnotempty(account_last_activity_time)

        | project TimeGenerated, email, target_domain, account_login_time, account_signup_time, account_last_activity_time, account_modification_time, account_status, account_type, account_notes, account_id,
        severity, source_id

        | top 20 by TimeGenerated desc'
  - Name: GetExposedPasswords
    DisplayName: '[Data] Show exposed passwords for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns all password data including hashes, plaintext, password types, salts, and sighting counts.
    Inputs:
    - Name: targetEmail
      Description: The email address to check for password exposure.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | where isnotempty(password) or isnotempty(password_plaintext)

        | project TimeGenerated, email, username, password_type, salt, target_domain, target_url, severity, sighting, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetPlaintextPasswordExposures
    DisplayName: '[Data] List all plaintext password exposures'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Finds all records with cleartext passwords available — highest immediate credential risk.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(password_plaintext)

        | project TimeGenerated, email, email_domain, password_type, target_domain, severity, sighting, user_hostname, infected_machine_id, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetPasswordTypeBreakdown
    DisplayName: '[Data] Analyze password types across all exposures'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Breaks down exposed credentials by password type (plaintext, MD5, SHA1, bcrypt, etc.) with crackability assessment.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(password_type)

        | summarize Count = count(), UniqueUsers = dcount(email), HasPlaintext = countif(isnotempty(password_plaintext)), AvgSeverity = round(avg(severity), 1) by password_type

        | sort by Count desc'
  - Name: GetHighSeverityExposures
    DisplayName: '[Data] Get recent high-severity infostealer exposures'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns severity 20+ infostealer exposures with full device and infection context.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | project TimeGenerated, email, severity, target_domain, target_url, user_hostname, user_os, infected_machine_id, infected_path, infected_time, password_type, ip_addresses, av_softwares, country_code,
        source_id

        | top 25 by TimeGenerated desc'
  - Name: GetExposureSummaryBySeverity
    DisplayName: '[Data] Summarize exposures by severity level'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Breaks down all exposures by severity with counts, unique users, plaintext passwords, and infected device counts.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | summarize Count = count(), UniqueUsers = dcount(email), UniqueTargets = dcount(target_domain), PlaintextPasswords = countif(isnotempty(password_plaintext)), UniqueMachines = dcount(infected_machine_id),
        LatestRecord = max(TimeGenerated) by severity

        | extend SeverityLabel = case(severity == 2, "Breach Credential", severity == 5, "Breach + PII", severity == 20, "Infostealer Credential", severity == 25, "Infostealer + App Data", strcat("Severity
        ", tostring(severity)))

        | project severity, SeverityLabel, Count, UniqueUsers, UniqueTargets, PlaintextPasswords, UniqueMachines, LatestRecord

        | sort by severity asc'
  - Name: GetExposureSummaryByDomain
    DisplayName: '[Data] Summarize exposures by email domain'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Aggregates exposures by corporate email domain with infostealer and plaintext counts.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(email_domain)

        | summarize ExposureCount = count(), UniqueUsers = dcount(email), AvgSeverity = round(avg(severity), 1), InfostealerCount = countif(severity >= 20), PlaintextCount = countif(isnotempty(password_plaintext))
        by email_domain

        | top 15 by ExposureCount desc'
  - Name: GetTargetedDomains
    DisplayName: '[Data] Show most targeted websites and applications'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Lists the most frequently targeted websites where credentials were stolen, ranked by volume.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(target_domain)

        | summarize ExposureCount = count(), UniqueEmails = dcount(email), AvgSeverity = round(avg(severity), 1), PlaintextCreds = countif(isnotempty(password_plaintext)) by target_domain

        | top 20 by ExposureCount desc'
  - Name: GetSensitivePIIExposures
    DisplayName: '[Data] Find exposures with SSN, financial, and health data'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Identifies records with Social Security numbers, bank accounts, tax IDs, and health insurance IDs.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(social_security_number) or isnotempty(ssn_last_four) or isnotempty(bank_number) or isnotempty(taxid) or isnotempty(health_insurance_id)

        | project TimeGenerated, email, full_name, severity, ssn_last_four, social_security_number, bank_number, taxid, health_insurance_id, dob, phone, address_1, city, state, country, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetSocialMediaExposures
    DisplayName: '[Data] Find exposed social media profiles'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns LinkedIn, Twitter, Crunchbase profiles and other social accounts for a user.
    Inputs:
    - Name: targetEmail
      Description: The email address to check for social media exposure.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | where isnotempty(social_linkedin) or isnotempty(social_twitter) or isnotempty(social_crunchbase) or isnotempty(social_other) or isnotempty(homepage)

        | project TimeGenerated, email, full_name, social_linkedin, social_twitter, social_crunchbase, social_other, homepage, account_image_url, account_caption, severity, source_id

        | top 15 by TimeGenerated desc'
  - Name: GetInfectedDevices
    DisplayName: '[Data] List infected devices from SpyCloud'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Groups infostealer exposures by infected machine with credential counts and user blast radius.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | where isnotempty(infected_machine_id)

        | summarize ExposureCount = count(), DistinctTargets = dcount(target_domain), DistinctUsers = dcount(email), LatestExposure = max(TimeGenerated) by infected_machine_id, user_hostname, user_os

        | top 20 by ExposureCount desc'
  - Name: GetDeviceForensics
    DisplayName: '[Data] Get full forensics for an infected device'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns malware path, AV software, OS, IPs, keyboard languages, country, timezone, and registered owner.
    Inputs:
    - Name: machineId
      Description: The SpyCloud infected_machine_id to retrieve forensics for.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where infected_machine_id == "{{machineId}}"

        | project TimeGenerated, email, severity, target_domain, infected_path, user_hostname, user_os, user_sys_registered_owner, display_resolution, ip_addresses, country_code, keyboard_languages, timezone,
        av_softwares, log_id, infected_time, device_name, mobile_equipment_id, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetDeviceToUserCorrelation
    DisplayName: '[Data] Show all users affected by an infected device'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Maps an infected machine ID to every user whose credentials were stolen from that device.
    Inputs:
    - Name: machineId
      Description: The SpyCloud infected_machine_id for blast radius analysis.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where infected_machine_id == "{{machineId}}"

        | summarize ExposureCount = count(), TargetDomains = make_set(target_domain, 20), PasswordTypes = make_set(password_type, 10), HasPlaintext = countif(isnotempty(password_plaintext)) by email, severity,
        user_hostname, user_os

        | top 20 by ExposureCount desc'
  - Name: GetAVCoverageGaps
    DisplayName: '[Data] Analyze antivirus coverage gaps'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Shows which AV products were on infected devices but failed to prevent the infostealer.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | where isnotempty(av_softwares)

        | mv-expand av_softwares

        | summarize InfectedDevices = dcount(infected_machine_id), Exposures = count(), UniqueUsers = dcount(email) by tostring(av_softwares)

        | sort by InfectedDevices desc'
  - Name: GetMalwareInfo
    DisplayName: '[Data] Look up breach or malware in catalog'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Searches the Breach Catalog for a malware family or breach source with full metadata.
    Inputs:
    - Name: threatName
      Description: Malware family or breach name (e.g. Redline, LummaC2, Vidar).
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachCatalog_CL

        | where breach_title contains "{{threatName}}"

        | project TimeGenerated, source_id, breach_title, description, status

        | top 15 by TimeGenerated desc'
  - Name: GetRecentBreaches
    DisplayName: '[Data] Show recently added breach catalog entries'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Lists the most recently ingested breach sources including infostealers, combo lists, and phished data.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachCatalog_CL

        | project TimeGenerated, source_id, breach_title, description, status

        | top 20 by TimeGenerated desc'
  - Name: GetEnrichedExposures
    DisplayName: '[Data] Enrich exposures with breach catalog details'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Joins watchlist exposures with catalog to show malware family names and breach types alongside credentials.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "SpyCloudBreachWatchlist_CL\n| join kind=leftouter (\n    SpyCloudBreachCatalog_CL\n    | summarize arg_max(TimeGenerated, *) by source_id\n    | project source_id, breach_title, status\n\
        ) on source_id\n| project TimeGenerated, email, severity, target_domain, password_type, breach_title, status, user_hostname, infected_machine_id\n| top 25 by TimeGenerated desc"
  - Name: GetMDERemediationActions
    DisplayName: '[Data] Show MDE remediation actions'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns all MDE device isolation, tagging, and IOC submission actions from SpyCloud playbooks.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'Spycloud_MDE_Logs_CL

        | extend IsolationRequested = column_ifexists("IsolationRequested", false), IsolationStatus = column_ifexists("IsolationStatus", false), MachineTagAdded = column_ifexists("MachineTagAdded", false), AddedIOCsToDefender = column_ifexists("AddedIOCsToDefender", false), MachineTagName = column_ifexists("MachineTagName", "")

        | project TimeGenerated, IncidentId, HostName, NormalizedHostName, DeviceId, OSPlatform, RiskScore, ExposureLevel, IsolationRequested, IsolationStatus, MachineTagAdded, MachineTagName, AddedIOCsToDefender,
        PlaybookName, BreachTitle, InfectedMachineId

        | top 25 by TimeGenerated desc'
  - Name: GetMDERemediationForDevice
    DisplayName: '[Data] Look up MDE actions for a device'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Searches MDE logs for all automated actions taken against a specific hostname.
    Inputs:
    - Name: hostName
      Description: Hostname to look up in MDE remediation logs.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'Spycloud_MDE_Logs_CL

        | where HostName contains "{{hostName}}" or NormalizedHostName contains "{{hostName}}"

        | extend IsolationRequested = column_ifexists("IsolationRequested", false), IsolationStatus = column_ifexists("IsolationStatus", false), MachineTagAdded = column_ifexists("MachineTagAdded", false), AddedIOCsToDefender = column_ifexists("AddedIOCsToDefender", false), MachineTagName = column_ifexists("MachineTagName", "")

        | project TimeGenerated, IncidentId, HostName, DeviceId, OSPlatform, RiskScore, ExposureLevel, IsolationRequested, IsolationStatus, MachineTagAdded, MachineTagName, AddedIOCsToDefender, PlaybookName,
        BreachTitle, InfectedMachineId

        | top 20 by TimeGenerated desc'
  - Name: GetMDERemediationStats
    DisplayName: '[Data] Summarize MDE remediation effectiveness'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Aggregate MDE stats with isolation success rate, tags added, IOCs submitted, and unique devices.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'Spycloud_MDE_Logs_CL

        | extend _IsolationRequested = column_ifexists("IsolationRequested", false), _IsolationStatus = column_ifexists("IsolationStatus", false), _MachineTagAdded = column_ifexists("MachineTagAdded", false), _AddedIOCsToDefender = column_ifexists("AddedIOCsToDefender", false)

        | summarize TotalActions = count(), IsolationRequested = countif(_IsolationRequested == true), IsolationSucceeded = countif(_IsolationStatus == true), TagsAdded = countif(_MachineTagAdded == true),
        IOCsSubmitted = countif(_AddedIOCsToDefender == true), UniqueDevices = dcount(DeviceId), UniqueIncidents = dcount(IncidentId)

        | extend IsolationSuccessRate = iff(IsolationRequested > 0, round(100.0 * IsolationSucceeded / IsolationRequested, 1), 0.0)'
  - Name: GetConditionalAccessActions
    DisplayName: '[Data] Show Conditional Access remediation actions'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns all Entra ID password resets, session revocations, CA group additions, and account disablements.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloud_ConditionalAccessLogs_CL

        | project TimeGenerated, IncidentId, Username, UserEmail, ForcedPasswordResetOnNextSignIn, UserSessionsRevoked, CAgroup, UserDisabled, PlaybookName, BreachTitle, InfectedMachineId

        | top 25 by TimeGenerated desc'
  - Name: GetConditionalAccessForUser
    DisplayName: '[Data] Look up identity actions for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Searches CA logs for all identity remediation taken against a specific user.
    Inputs:
    - Name: userEmail
      Description: The email address or UPN to look up.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloud_ConditionalAccessLogs_CL

        | where UserEmail =~ "{{userEmail}}" or Username =~ "{{userEmail}}"

        | project TimeGenerated, IncidentId, Username, UserEmail, ForcedPasswordResetOnNextSignIn, UserSessionsRevoked, CAgroup, UserDisabled, PlaybookName, BreachTitle, InfectedMachineId

        | top 20 by TimeGenerated desc'
  - Name: GetConditionalAccessStats
    DisplayName: '[Data] Summarize identity remediation effectiveness'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Aggregate CA stats with password resets, session revocations, CA group additions, and account disablements.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloud_ConditionalAccessLogs_CL

        | summarize TotalActions = count(), PasswordResets = countif(ForcedPasswordResetOnNextSignIn == true), SessionsRevoked = countif(UserSessionsRevoked == true), AddedToCAGroup = countif(CAgroup ==
        true), AccountsDisabled = countif(UserDisabled == true), UniqueUsers = dcount(UserEmail), UniqueIncidents = dcount(IncidentId)'
  - Name: GetFullUserInvestigation
    DisplayName: '[Data] Full cross-table investigation for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Checks a user across watchlist, MDE, and CA tables in a single query for complete picture.
    Inputs:
    - Name: investigateEmail
      Description: The email address to investigate across all tables.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "union\n  (SpyCloudBreachWatchlist_CL\n  | where email =~ \"{{investigateEmail}}\"\n  | summarize ExposureCount = count(), LatestExposure = max(TimeGenerated), MaxSeverity = max(severity),\
        \ UniqueTargets = dcount(target_domain), UniqueMachines = dcount(infected_machine_id), PlaintextPasswords = countif(isnotempty(password_plaintext)), HasSSN = countif(isnotempty(social_security_number)\
        \ or isnotempty(ssn_last_four))\n  | extend DataSource = \"Watchlist Exposures\"),\n  (SpyCloud_ConditionalAccessLogs_CL\n  | where UserEmail =~ \"{{investigateEmail}}\" or Username =~ \"{{investigateEmail}}\"\
        \n  | summarize CAActions = count(), PasswordResets = countif(ForcedPasswordResetOnNextSignIn == true), SessionRevocations = countif(UserSessionsRevoked == true), AccountDisablements = countif(UserDisabled\
        \ == true)\n  | extend DataSource = \"Conditional Access\")"
  - Name: GetGeographicAnalysis
    DisplayName: '[Data] Analyze geographic distribution of infections'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Shows infection distribution by country with device counts and user counts per country.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | where isnotempty(country_code)

        | summarize ExposureCount = count(), UniqueDevices = dcount(infected_machine_id), UniqueUsers = dcount(email) by country_code

        | sort by ExposureCount desc'
  - Name: GetSpyCloudHealthStatus
    DisplayName: '[Data] Check SpyCloud data ingestion health'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Health check across all four SpyCloud tables showing record counts and last update times.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "union isfuzzy=true\n  (SpyCloudBreachWatchlist_CL | summarize Records=count(), Latest=max(TimeGenerated) | extend Table='Watchlist'),\n  (SpyCloudBreachCatalog_CL | summarize Records=count(), Latest=max(TimeGenerated)\
        \ | extend Table='Breach Catalog'),\n  (Spycloud_MDE_Logs_CL | summarize Records=count(), Latest=max(TimeGenerated) | extend Table='MDE Remediation'),\n  (SpyCloud_ConditionalAccessLogs_CL | summarize\
        \ Records=count(), Latest=max(TimeGenerated) | extend Table='Conditional Access'),\n  (SpyCloudCompassData_CL | summarize Records=count(), Latest=max(TimeGenerated) | extend Table='Compass Data'),\n\
        \  (SpyCloudCompassDevices_CL | summarize Records=count(), Latest=max(TimeGenerated) | extend Table='Compass Devices')\n| project Table, Records, Latest, HoursSinceUpdate = datetime_diff('hour', now(),\
        \ Latest)"
  - Name: InvestigateFullExposureChain
    DisplayName: '[Data] Full exposure investigation chain'
    Description: Internal data retrieval skill. Performs a comprehensive multi-table investigation for a user across SpyCloud exposures, sign-in activity, and remediation history with a complete timeline
      and risk assessment.
    Inputs:
    - Name: UserEmail
      Description: Email to investigate.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "let user = \"{{UserEmail}}\";\nlet exposures = SpyCloudBreachWatchlist_CL | where email =~ user and TimeGenerated > ago(90d);\nlet signins = SigninLogs | where UserPrincipalName =~\
        \ user and TimeGenerated > ago(30d);\nlet remediated = SpyCloud_ConditionalAccessLogs_CL | where UserEmail =~ user and TimeGenerated > ago(30d);\nunion isfuzzy=true\n(exposures | summarize Exposures=count(),\
        \ MaxSev=max(severity), Breaches=dcount(source_id), PlaintextPWs=countif(isnotempty(password_plaintext)), Devices=dcount(infected_machine_id) | extend Phase=\"1-Exposure\"),\n(signins | where\
        \ ResultType == 0 | summarize SuccessSignIns=count(), UniqueIPs=dcount(IPAddress), Countries=dcount(tostring(LocationDetails.countryOrRegion)) | extend Phase=\"2-SignInActivity\"),\n(remediated\
        \ | summarize Resets=countif(ForcedPasswordResetOnNextSignIn == true), Revokes=countif(UserSessionsRevoked == true) | extend Phase=\"3-Remediation\")"
  - Name: GenerateIncidentSummary
    DisplayName: '[Data] Generate incident summary report'
    Description: Internal data retrieval skill. Creates a structured incident summary for SpyCloud exposure events including affected users, severity assessment, remediation status, and unremediated
      gaps.
    Inputs:
    - Name: HoursBack
      Description: Hours to look back (default 24).
      Required: false
      DefaultValue: '24'
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "let timeframe = ago({{HoursBack}}h);\nlet new_exposures = SpyCloudBreachWatchlist_CL | where TimeGenerated > timeframe;\nlet mde_actions = Spycloud_MDE_Logs_CL | where TimeGenerated\
        \ > timeframe;\nlet ca_actions = SpyCloud_ConditionalAccessLogs_CL | where TimeGenerated > timeframe;\nunion isfuzzy=true\n(new_exposures | summarize v=count() | extend Category=\"New Exposures\"\
        ),\n(new_exposures | where severity == 25 | summarize v=count() | extend Category=\"Critical (Sev 25)\"),\n(new_exposures | where severity == 20 | summarize v=count() | extend Category=\"High\
        \ (Sev 20)\"),\n(new_exposures | summarize v=dcount(email) | extend Category=\"Unique Users Affected\"),\n(new_exposures | where isnotempty(infected_machine_id) | summarize v=dcount(infected_machine_id)\
        \ | extend Category=\"Infected Devices\"),\n(mde_actions | summarize v=count() | extend Category=\"MDE Isolations Performed\"),\n(ca_actions | summarize v=count() | extend Category=\"CA Resets\
        \ Performed\"),\n(new_exposures | where severity >= 20 and email !in~ (ca_actions | distinct UserEmail) | summarize v=dcount(email) | extend Category=\"Unremediated High-Sev\")\n| project Category,\
        \ Value=v"
  - Name: DetectPermissionGaps
    DisplayName: '[Data] Detect missing permissions for playbooks'
    Description: Internal data retrieval skill. Checks if SpyCloud playbooks have been executing successfully by identifying permission gaps, failed actions, and missing remediation for high-severity
      exposures.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "let exposed_sev20 = SpyCloudBreachWatchlist_CL | where TimeGenerated > ago(7d) and severity >= 20 | distinct email;\nlet mde_acted = Spycloud_MDE_Logs_CL | where TimeGenerated > ago(7d)\
        \ | distinct HostName;\nlet ca_acted = SpyCloud_ConditionalAccessLogs_CL | where TimeGenerated > ago(7d) | distinct UserEmail;\nunion isfuzzy=true\n(exposed_sev20 | where email !in~ (ca_acted)\
        \ | summarize Unremediated=count() | extend Check=\"Users sev20+ without CA reset\", Status=iff(Unremediated > 0, \"GAP\", \"OK\")),\n(Spycloud_MDE_Logs_CL | where TimeGenerated > ago(7d) | extend _IsolationStatus = column_ifexists(\"IsolationStatus\", false) | where _IsolationStatus == false | summarize Failures=count() | extend Check=\"MDE isolation failures\", Status=iff(Failures > 0, \"CHECK\", \"OK\")),\n(SpyCloud_ConditionalAccessLogs_CL | where TimeGenerated\
        \ > ago(7d) and ForcedPasswordResetOnNextSignIn == false | summarize Failures=count() | extend Check=\"CA reset failures\", Status=iff(Failures > 0, \"CHECK\", \"OK\"))\n| project Check, Status"
  - Name: GetConnectorHealthAssessment
    DisplayName: '[Data] Assess connector and data source health'
    Description: Internal data retrieval skill. Evaluates the health and ingestion status of all SpyCloud and Microsoft data sources by checking recent record counts, last ingestion times, and identifying
      data gaps across all 10 custom tables and key Microsoft security tables.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "union isfuzzy=true\n(SpyCloudBreachWatchlist_CL | summarize Records=count(), LastIngestion=max(TimeGenerated) | extend Source=\"SpyCloudBreachWatchlist_CL\", Status=iff(LastIngestion\
        \ > ago(7d), \"Active\", \"Stale\")),\n(SpyCloudBreachCatalog_CL | summarize Records=count(), LastIngestion=max(TimeGenerated) | extend Source=\"SpyCloudBreachCatalog_CL\", Status=iff(LastIngestion\
        \ > ago(7d), \"Active\", \"Stale\")),\n(SpyCloudCompassData_CL | summarize Records=count(), LastIngestion=max(TimeGenerated) | extend Source=\"SpyCloudCompassData_CL\", Status=iff(LastIngestion\
        \ > ago(7d), \"Active\", \"Stale\")),\n(SpyCloudCompassDevices_CL | summarize Records=count(), LastIngestion=max(TimeGenerated) | extend Source=\"SpyCloudCompassDevices_CL\", Status=iff(LastIngestion\
        \ > ago(7d), \"Active\", \"Stale\")),\n(Spycloud_MDE_Logs_CL | summarize Records=count(), LastIngestion=max(TimeGenerated) | extend Source=\"Spycloud_MDE_Logs_CL\", Status=iff(LastIngestion >\
        \ ago(7d), \"Active\", \"Stale\")),\n(SpyCloud_ConditionalAccessLogs_CL | summarize Records=count(), LastIngestion=max(TimeGenerated) | extend Source=\"SpyCloud_ConditionalAccessLogs_CL\", Status=iff(LastIngestion\
        \ > ago(7d), \"Active\", \"Stale\")),\n(SigninLogs | take 1 | summarize Records=count() | extend Source=\"SigninLogs\", LastIngestion=now(), Status=iff(Records > 0, \"Connected\", \"Not Connected\"\
        )),\n(SecurityAlert | take 1 | summarize Records=count() | extend Source=\"SecurityAlert\", LastIngestion=now(), Status=iff(Records > 0, \"Connected\", \"Not Connected\")),\n(DeviceInfo | take\
        \ 1 | summarize Records=count() | extend Source=\"DeviceInfo (MDE)\", LastIngestion=now(), Status=iff(Records > 0, \"Connected\", \"Not Connected\")),\n(BehaviorAnalytics | take 1 | summarize\
        \ Records=count() | extend Source=\"BehaviorAnalytics (UEBA)\", LastIngestion=now(), Status=iff(Records > 0, \"Connected\", \"Not Connected\"))\n| project Source, Status, Records, LastIngestion\n\
        | order by Status asc, Source asc"
  - Name: GetMissingConnectorRecommendations
    DisplayName: '[Data] Generate missing connector recommendations'
    Description: Internal data retrieval skill. Identifies which Microsoft data sources are not connected to the Sentinel workspace and generates prioritized recommendations for enabling them, including
      the security value each connector provides for SpyCloud correlation.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "let check_table = (T: (c: long), name: string, desc: string, priority: int) { T | extend Source=name, Description=desc, Priority=priority };\nunion isfuzzy=true\n(SigninLogs | take\
        \ 1 | summarize c=count() | where c == 0 | extend Source=\"Entra ID Sign-in Logs\", Description=\"User authentication events, MFA status, Conditional Access results\", Priority=1, Status=\"\
        Missing\"),\n(SecurityAlert | where ProviderName has \"Fusion\" | take 1 | summarize c=count() | where c == 0 | extend Source=\"Fusion ML Detection\", Description=\"Multistage attack detection\
        \ correlating SpyCloud with other signals\", Priority=2, Status=\"Missing\"),\n(DeviceInfo | take 1 | summarize c=count() | where c == 0 | extend Source=\"Defender for Endpoint\", Description=\"\
        Endpoint alerts, device isolation, process/network telemetry\", Priority=1, Status=\"Missing\"),\n(IdentityLogonEvents | take 1 | summarize c=count() | where c == 0 | extend Source=\"Defender\
        \ for Identity\", Description=\"Identity attacks: pass-the-hash, golden ticket, lateral movement\", Priority=2, Status=\"Missing\"),\n(EmailEvents | take 1 | summarize c=count() | where c ==\
        \ 0 | extend Source=\"Defender for Office 365\", Description=\"Email threats, phishing, credential harvesting targeting exposed users\", Priority=3, Status=\"Missing\"),\n(CloudAppEvents | take\
        \ 1 | summarize c=count() | where c == 0 | extend Source=\"Defender for Cloud Apps (CASB)\", Description=\"Shadow IT, OAuth abuse, DLP violations from compromised accounts\", Priority=2, Status=\"\
        Missing\"),\n(BehaviorAnalytics | take 1 | summarize c=count() | where c == 0 | extend Source=\"UEBA (User Entity Behavior)\", Description=\"Behavioral anomalies for users with credential exposure\"\
        , Priority=2, Status=\"Missing\"),\n(ThreatIntelligenceIndicator | take 1 | summarize c=count() | where c == 0 | extend Source=\"Threat Intelligence Feeds\", Description=\"TI correlation with\
        \ SpyCloud infection IPs and domains\", Priority=3, Status=\"Missing\")\n| project Source, Description, Priority, Status\n| order by Priority asc"
  - Name: GetPlaybookPermissionGaps
    DisplayName: '[Data] Check playbook permission gaps'
    Description: Internal data retrieval skill. Identifies permission gaps preventing SpyCloud playbooks from executing properly by checking remediation coverage, execution failures, and comparing
      high-severity exposures against actual remediation actions taken.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "let sev20_users = SpyCloudBreachWatchlist_CL | where TimeGenerated > ago(14d) and severity >= 20 | distinct email;\nlet sev20_devices = SpyCloudBreachWatchlist_CL | where TimeGenerated\
        \ > ago(14d) and severity >= 20 and isnotempty(infected_machine_id) | distinct infected_machine_id;\nlet ca_users = SpyCloud_ConditionalAccessLogs_CL | where TimeGenerated > ago(14d) | distinct\
        \ UserEmail;\nlet mde_devices = Spycloud_MDE_Logs_CL | where TimeGenerated > ago(14d) | distinct HostName;\nlet ca_total = toscalar(SpyCloud_ConditionalAccessLogs_CL | where TimeGenerated >\
        \ ago(14d) | count);\nlet mde_total = toscalar(Spycloud_MDE_Logs_CL | where TimeGenerated > ago(14d) | count);\nlet ca_failures = toscalar(SpyCloud_ConditionalAccessLogs_CL | where TimeGenerated\
        \ > ago(14d) and ForcedPasswordResetOnNextSignIn == false | count);\nlet mde_failures = toscalar(Spycloud_MDE_Logs_CL | where TimeGenerated > ago(14d) | extend _IsolationStatus = column_ifexists(\"\
        IsolationStatus\", false) | where _IsolationStatus == false | count);\nunion isfuzzy=true\n(print Check=\"Identity remediation (CA/password reset) coverage\", Metric=strcat(toscalar(sev20_users\
        \ | where email in~ (ca_users) | count), \" of \", toscalar(sev20_users | count), \" sev20+ users remediated\"), Status=iff(toscalar(sev20_users | where email !in~ (ca_users) | count) > 0, \"\
        GAP\", \"OK\")),\n(print Check=\"MDE device isolation coverage\", Metric=strcat(toscalar(sev20_devices | where infected_machine_id in~ (mde_devices) | count), \" of \", toscalar(sev20_devices\
        \ | count), \" infected devices acted on\"), Status=iff(toscalar(sev20_devices | where infected_machine_id !in~ (mde_devices) | count) > 0, \"GAP\", \"OK\")),\n(print Check=\"CA playbook execution\
        \ failures\", Metric=strcat(ca_failures, \" failures out of \", ca_total, \" total executions\"), Status=iff(ca_failures > 0, \"CHECK\", \"OK\")),\n(print Check=\"MDE playbook execution failures\"\
        , Metric=strcat(mde_failures, \" failures out of \", mde_total, \" total executions\"), Status=iff(mde_failures > 0, \"CHECK\", \"OK\")),\n(print Check=\"CA playbook active (any executions)\"\
        , Metric=iff(ca_total > 0, \"Active\", \"No executions found — check permissions\"), Status=iff(ca_total > 0, \"OK\", \"GAP\")),\n(print Check=\"MDE playbook active (any executions)\", Metric=iff(mde_total\
        \ > 0, \"Active\", \"No executions found — check permissions\"), Status=iff(mde_total > 0, \"OK\", \"GAP\"))\n| project Check, Metric, Status"
  - Name: GetCapabilityMatrix
    DisplayName: '[Data] Generate full capability matrix'
    Description: Internal data retrieval skill. Generates a comprehensive capability matrix showing the deployment status of all SpyCloud Sentinel solution components including tables, analytics rules,
      playbooks, workbooks, hunting queries, UEBA, Fusion, and data connectors.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "union isfuzzy=true\n(SpyCloudBreachWatchlist_CL | summarize c=count() | extend Component=\"SpyCloud Breach Watchlist Table\", Category=\"Data Tables\", Status=iff(c > 0, \"Deployed\
        \ & Active\", \"Empty\"), Detail=strcat(c, \" records\")),\n(SpyCloudBreachCatalog_CL | summarize c=count() | extend Component=\"SpyCloud Breach Catalog Table\", Category=\"Data Tables\", Status=iff(c\
        \ > 0, \"Deployed & Active\", \"Empty\"), Detail=strcat(c, \" records\")),\n(SpyCloudCompassData_CL | summarize c=count() | extend Component=\"SpyCloud Compass Data Table\", Category=\"Data\
        \ Tables\", Status=iff(c > 0, \"Deployed & Active\", \"Empty (Enterprise+ required)\"), Detail=strcat(c, \" records\")),\n(SpyCloudCompassDevices_CL | summarize c=count() | extend Component=\"\
        SpyCloud Compass Devices Table\", Category=\"Data Tables\", Status=iff(c > 0, \"Deployed & Active\", \"Empty (Enterprise+ required)\"), Detail=strcat(c, \" records\")),\n(Spycloud_MDE_Logs_CL\
        \ | summarize c=count() | extend Component=\"MDE Remediation Logs Table\", Category=\"Data Tables\", Status=iff(c > 0, \"Active\", \"No playbook executions yet\"), Detail=strcat(c, \" records\"\
        )),\n(SpyCloud_ConditionalAccessLogs_CL | summarize c=count() | extend Component=\"CA Remediation Logs Table\", Category=\"Data Tables\", Status=iff(c > 0, \"Active\", \"No playbook executions\
        \ yet\"), Detail=strcat(c, \" records\")),\n(SecurityAlert | where ProviderName == \"Azure Sentinel\" | summarize c=count() | extend Component=\"Analytics Rules\", Category=\"Detection\", Status=iff(c\
        \ > 0, \"Active — generating alerts\", \"No alerts yet\"), Detail=strcat(c, \" alerts generated\")),\n(SecurityAlert | where ProviderName has \"Fusion\" | summarize c=count() | extend Component=\"\
        Fusion ML Detection\", Category=\"Detection\", Status=iff(c > 0, \"Active\", \"No Fusion detections\"), Detail=strcat(c, \" Fusion alerts\")),\n(BehaviorAnalytics | summarize c=count() | extend\
        \ Component=\"UEBA Behavioral Analytics\", Category=\"Detection\", Status=iff(c > 0, \"Active\", \"Not enabled or no data\"), Detail=strcat(c, \" anomalies\")),\n(SentinelHealth | where SentinelResourceType\
        \ == \"Automation rule\" | summarize c=count() | extend Component=\"Automation Rules\", Category=\"Response\", Status=iff(c > 0, \"Active\", \"No automation executions\"), Detail=strcat(c, \"\
        \ executions\")),\n(SigninLogs | take 1 | summarize c=count() | extend Component=\"Entra ID Sign-in Logs\", Category=\"Data Connectors\", Status=iff(c > 0, \"Connected\", \"Not connected\"),\
        \ Detail=\"\"),\n(DeviceInfo | take 1 | summarize c=count() | extend Component=\"Defender for Endpoint\", Category=\"Data Connectors\", Status=iff(c > 0, \"Connected\", \"Not connected\"), Detail=\"\
        \"),\n(IdentityLogonEvents | take 1 | summarize c=count() | extend Component=\"Defender for Identity\", Category=\"Data Connectors\", Status=iff(c > 0, \"Connected\", \"Not connected\"), Detail=\"\
        \"),\n(CloudAppEvents | take 1 | summarize c=count() | extend Component=\"Defender for Cloud Apps\", Category=\"Data Connectors\", Status=iff(c > 0, \"Connected\", \"Not connected\"), Detail=\"\
        \")\n| project Category, Component, Status, Detail\n| order by Category asc, Component asc"
AgentDefinitions:
- Name: SpyCloudThreatIntelAgent
  DisplayName: SpyCloud Darknet & Identity Threat Exposure Intelligence Agent
  Description: "Interactive investigation agent for SpyCloud darknet & identity threat exposure intelligence. Investigate email addresses for credential compromise, device hostnames for infostealer forensics, malware families for threat hunting, or request an organization-wide exposure overview. The agent orchestrates 35 KQL skills across 6 Sentinel tables (156 columns), 17 specialized sub-agents (UEBA, Fusion, TI Enrichment, Session Cookie/MFA Bypass, Lateral Movement, Data Exfiltration, Executive Summary, Watchlist Management, Ransomware Assessment, Identity Risk Scoring, Supply Chain Exposure, Dark Web Monitoring, Defender XDR, Intune Compliance, CASB Cloud App, Compass Deep Investigation), GPT-4o analysis, and produces rich investigation reports with data tables, timelines, severity indicators, MITRE ATT&CK mappings, remediation gap analysis, compliance impact, and contextual follow-up questions for continued pivoting. Includes graceful error handling for missing data, empty tables, and API tier gating with intelligent fallback to available data sources. Supports all breach categories including infostealers, combo lists, phishing, exfiltration, and scraping. Compatible with SpyCloud KQL Plugin (90 skills) and SpyCloud API Plugin (20 skills) for complete coverage."
  Publisher: SpyCloud
  Product: ThreatIntelligence
  Category: Other
  Version: 8.0.0
  Icon: https://raw.githubusercontent.com/iammrherb/SPYCLOUD-SENTINEL/main/docs/images/SpyCloud-icon-SC_2.png
  RequiredSkillsets:
  - SpyCloud.ThreatIntelligence.SentinelAgent
  AgentSingleInstanceConstraint: None
  SupportedAuthTypes:
  - None
  Settings:
  - Name: TenantId
    Label: Azure Tenant ID
    Description: Your Azure Tenant ID
    HintText: Enter your Azure Tenant ID
    SettingType: string
    Required: true
  - Name: SubscriptionId
    Label: Azure Subscription ID
    Description: Your Azure Subscription ID
    HintText: Enter your Azure Subscription ID
    SettingType: string
    Required: true
  - Name: ResourceGroupName
    Label: Resource Group Name
    Description: Resource Group containing your Sentinel workspace
    HintText: Enter Resource Group name
    SettingType: string
    Required: true
  - Name: WorkspaceName
    Label: Sentinel Workspace Name
    Description: Name of the Log Analytics workspace with SpyCloud data
    HintText: Enter workspace name
