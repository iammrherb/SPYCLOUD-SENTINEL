    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudExposure_CL

        | where TimeGenerated > ago(90d)

        | summarize total_exposures = count(), avg_risk = avg(risk_score_d), critical_count = countif(severity_d >= 20), remediated_count = countif(remediation_status_s =~ "remediated"),
        unique_emails = dcount(email_s)
        by bin(TimeGenerated, 7d)

        | extend remediation_rate = round(100.0 * remediated_count / total_exposures, 1)

        | order by TimeGenerated asc'
  - Name: GetExposureDataClasses
    DisplayName: '[Data] Analyze Exposure data class distribution'
    Description: Internal data retrieval skill. Maps the distribution of exposed data classes to assess what types of data are most at risk.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudExposure_CL

        | where TimeGenerated > ago(30d)

        | mv-expand data_class = split(data_classes_s, ",")

        | extend data_class_clean = trim(" ", tostring(data_class))

        | where isnotempty(data_class_clean)

        | summarize record_count = count(), unique_emails = dcount(email_s), avg_severity = avg(severity_d), avg_risk = avg(risk_score_d)
        by data_class_clean

        | extend risk_impact = case(avg_risk >= 80, "CRITICAL", avg_risk >= 60, "HIGH", avg_risk >= 40, "MEDIUM", "LOW")

        | order by record_count desc

        | top 25 by record_count desc'
  - Name: GetExposureSummaryDashboard
    DisplayName: '[Data] Generate Exposure summary dashboard'
    Description: Internal data retrieval skill. Generates a comprehensive exposure summary dashboard with key metrics, severity distribution, remediation rates, and risk indicators.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'union isfuzzy=true
        (SpyCloudExposure_CL | where TimeGenerated > ago(30d) | summarize total = count(), unique_emails = dcount(email_s), unique_domains = dcount(email_domain_s), avg_risk = round(avg(risk_score_d), 1)
        | extend Metric = "Overview", Detail = strcat("Total: ", total, " exposures | ", unique_emails, " users | ", unique_domains, " domains | Avg Risk: ", avg_risk)),
        (SpyCloudExposure_CL | where TimeGenerated > ago(30d) | summarize count() by severity_level = case(severity_d >= 25, "Critical (25)", severity_d >= 20, "Urgent (20)", severity_d >= 5, "High (5+)", "Standard (2)")
        | extend Metric = "Severity", Detail = strcat(severity_level, ": ", count_)),
        (SpyCloudExposure_CL | where TimeGenerated > ago(30d) | summarize remediated = countif(remediation_status_s =~ "remediated"), total = count()
        | extend Metric = "Remediation", Detail = strcat(remediated, " of ", total, " remediated (", round(100.0 * remediated / total, 1), "%)"))
        | project Metric, Detail'
