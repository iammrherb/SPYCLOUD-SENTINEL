        # Data Sources

        14 SpyCloud custom tables in Sentinel:

        - SpyCloudBreachWatchlist_CL (73 cols): credentials, PII, device forensics, passwords, infostealer artifacts, financial data, social media

        - SpyCloudBreachCatalog_CL (13 cols): breach metadata — title, description, category, record counts, confidence scores

        - SpyCloudCompassData_CL (29 cols): consumer/partner identity exposures (Enterprise+ only)

        - SpyCloudCompassDevices_CL (8 cols): infected device fingerprints and malware artifacts (Enterprise+ only)

        - Spycloud_MDE_Logs_CL (13 cols): MDE device isolation, tagging, IOC audit trail

        - SpyCloud_ConditionalAccessLogs_CL (17 cols): password resets, session revocations, CA group, account disable audit


        Additional Sentinel tables you can query:

        Microsoft Entra ID:
        - SigninLogs: user sign-in events, MFA status, Conditional Access results, location, IP, app, device
        - AuditLogs: directory changes, app consent, role assignments, group membership changes
        - AADNonInteractiveUserSignInLogs: service principal and token-based sign-ins
        - AADRiskyUsers: Entra ID Identity Protection risky user assessments
        - AADUserRiskEvents: risk detection events (leaked credentials, anonymous IP, malware-linked IP)

        Microsoft Defender XDR:
        - SecurityIncident: correlated XDR incidents across all Defender products
        - SecurityAlert: unified alerts from all Defender products and Sentinel analytics rules

        Defender for Endpoint:
        - DeviceInfo: device inventory, OS, health state, MDE onboarding status
        - DeviceNetworkEvents: network connections from endpoints
        - DeviceLogonEvents: local and remote logon events on endpoints
        - DeviceFileEvents: file creation/modification/deletion activity
        - DeviceProcessEvents: process execution telemetry
        - DeviceAlertEvents: MDE security alerts per device
        - DeviceRegistryEvents: registry modification events

        Defender for Identity:
        - IdentityLogonEvents: identity-based authentication (RDP, SMB, Kerberos, NTLM)
        - IdentityQueryEvents: LDAP and DNS queries from Defender for Identity sensors
        - IdentityDirectoryEvents: Active Directory changes detected by sensors

        Defender for Office 365:
        - EmailEvents: email delivery, filtering, and verdict events
        - EmailAttachmentInfo: attachment metadata and detonation results
        - EmailUrlInfo: URLs extracted from emails with threat verdicts

        Defender for Cloud Apps (CASB):
        - CloudAppEvents: cloud application operations including file ops, OAuth, admin actions
        - OfficeActivity: Exchange/SharePoint/OneDrive/Teams activity

        Microsoft Intune:
        - IntuneDevices: device enrollment, compliance state, OS version, encryption, last check-in
        - IntuneDeviceComplianceOrg: compliance policy status across the organization

        Sentinel Core:
        - BehaviorAnalytics: UEBA anomaly data (correlate with exposed users)
        - ThreatIntelligenceIndicator: TI feeds (TAXII, MDTI, custom)
        - SentinelHealth: automation rule and playbook execution health

        Watchlists:
