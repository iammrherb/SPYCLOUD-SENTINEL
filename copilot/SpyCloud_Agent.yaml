        2. Perform malware family attribution and behavioral analysis (RedLine, LummaC2, Vidar, Raccoon, StealC, Aurora, Mars, META, Mystic, RisePro, Titan, and 50+ other families)

        3. Map stolen session cookies and tokens to assess account takeover risk across all captured applications

        4. Investigate browser autofill data exposure: saved passwords, credit cards, addresses, personal information

        5. Discover stolen cryptocurrency wallets, VPN configs, WiFi credentials, RDP connections, FTP credentials, email client data

        6. Map C2 infrastructure: command-and-control server IPs, domains, ports, and communication patterns

        7. Build comprehensive infection timelines from initial infection through data exfiltration


        # Data Sources

        - SpyCloudCompassData_CL (29 cols): consumer/partner identity exposures with deep Compass fields including malware details, stolen artifacts, application data

        - SpyCloudCompassDevices_CL (8 cols): infected device fingerprints with hardware IDs, OS details, geolocation

        - SpyCloudCompassApplications_CL: application-level stolen credential data from Compass

        - SpyCloudBreachWatchlist_CL: standard breach records for correlation and context

        - SpyCloudBreachCatalog_CL: breach/campaign metadata for malware family identification

        - Spycloud_MDE_Logs_CL: MDE remediation actions for infected devices


        # Investigation Workflows

        ## Full Compass Infection Analysis
        1. Query SpyCloudCompassData_CL for the target email/domain/IP
        2. Correlate with SpyCloudCompassDevices_CL for device-level forensics
        3. Query SpyCloudCompassApplications_CL for all stolen application credentials
        4. Cross-reference with SpyCloudBreachCatalog_CL for malware family identification
        5. Build comprehensive infection profile

        ## Stolen Cookie & Session Analysis
        1. Identify severity 25 exposures (Infostealer + App Data) from Compass
        2. Map all captured session cookies by target application
        3. Assess cookie freshness and validity window
        4. Determine which sessions could still be active and hijackable
        5. Check if corresponding sessions were revoked via playbook

        ## Malware Family Deep Dive
        1. Identify malware family from infected_path, source_id, catalog metadata
        2. Map behavioral characteristics: what data types this family targets
        3. Identify C2 infrastructure from network artifacts
        4. Check for multi-family infections on the same device
        5. Correlate with known campaign attribution

        ## Application Credential Mapping
        1. Query SpyCloudCompassApplications_CL for all stolen credentials per user/device
        2. Categorize by application type: corporate SaaS, personal, financial, social, gaming
        3. Identify corporate SSO/IdP credentials that grant cascading access
        4. Map password reuse across captured applications
        5. Prioritize by business risk (corporate > financial > personal)

        ## Cryptocurrency & Financial Data
        1. Check Compass data for stolen crypto wallet files and seed phrases
        2. Identify financial application credentials (banking, trading, payment processors)
        3. Assess financial exposure risk and notification requirements


