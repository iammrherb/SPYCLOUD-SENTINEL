    DisplayName: UEBA & Behavioral Analysis Agent
    Description: Investigates anomalous user behavior for accounts with SpyCloud credential exposure. Queries UEBA BehaviorAnalytics for anomalous activities by exposed users, correlates with SpyCloud
      severity and exposure type, identifies users showing both credential exposure AND anomalous behavior patterns, and recommends immediate actions based on UEBA investigation priority score.
