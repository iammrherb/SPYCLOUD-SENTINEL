        | project TimeGenerated, email_s, email_domain_s, severity_d, risk_score_d, exposure_type_s, data_classes_s, target_domain_s, first_seen_t

        | extend days_unremediated = datetime_diff("day", now(), TimeGenerated)

        | order by severity_d desc, days_unremediated desc

        | top 25 by severity_d desc'
  - Name: GetExposureTimeline
    DisplayName: '[Data] Get Exposure timeline over time'
