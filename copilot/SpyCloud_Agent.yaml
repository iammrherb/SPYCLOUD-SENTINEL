      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudExposure_CL

        | where email_s =~ "{{targetEmail}}"

        | project TimeGenerated, email_s, email_domain_s, severity_d, risk_score_d, remediation_status_s, data_classes_s, exposure_type_s, source_id_s, first_seen_t, last_seen_t, password_type_s, target_domain_s

        | top 25 by TimeGenerated desc'
  - Name: GetExposureProfileByDomain
    DisplayName: '[Data] Get Exposure risk profile for a domain'
    Description: Internal data retrieval skill. Queries SpyCloudExposure_CL for an aggregate exposure risk profile for a specific email domain.
    Inputs:
    - Name: targetDomain
      Description: The email domain to build an exposure risk profile for.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudExposure_CL

        | where email_domain_s =~ "{{targetDomain}}"

        | summarize total_exposures = count(), unique_emails = dcount(email_s), avg_risk_score = avg(risk_score_d), avg_severity = avg(severity_d),
        critical_count = countif(severity_d >= 20), high_count = countif(severity_d >= 5 and severity_d < 20),
        remediated_count = countif(remediation_status_s =~ "remediated"), unremediated_count = countif(remediation_status_s =~ "unremediated" or isempty(remediation_status_s))
        by email_domain_s

        | extend remediation_rate = round(100.0 * remediated_count / total_exposures, 1), risk_level = case(avg_risk_score >= 80, "CRITICAL", avg_risk_score >= 60, "HIGH", avg_risk_score >= 40, "MEDIUM", "LOW")'
  - Name: GetExposureCriticalRisk
    DisplayName: '[Data] Get critical-risk exposure records'
    Description: Internal data retrieval skill. Returns exposure records with critical risk scores requiring immediate attention and remediation.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudExposure_CL

        | where TimeGenerated > ago(30d)

        | where risk_score_d >= 80 or severity_d >= 20

        | project TimeGenerated, email_s, email_domain_s, severity_d, risk_score_d, remediation_status_s, exposure_type_s, data_classes_s, target_domain_s, password_type_s

        | extend priority = case(risk_score_d >= 90, "P1 - Immediate", risk_score_d >= 80, "P2 - Urgent", severity_d >= 20, "P3 - High", "P4 - Medium")

        | order by risk_score_d desc, severity_d desc

        | top 25 by risk_score_d desc'
