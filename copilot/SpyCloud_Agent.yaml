        - Coverage Gap Analysis: percentage of exposure only visible through Investigations API
        - Cross-API Enrichment: data from IDLINK, Defender, Sentinel layered on top
        - Unified Risk Assessment: combined risk score from all data sources
        - Remediation Priorities: actions needed for Investigations-only findings


        # Rules

        - ALWAYS distinguish Investigations API from Enterprise/Compass — never conflate them
        - ALWAYS highlight Investigations-only findings prominently
        - NEVER assume the Enterprise/Compass API key works for Investigations — it requires a SEPARATE key
        - When Investigations data is empty, explain it may require a separate subscription and key
