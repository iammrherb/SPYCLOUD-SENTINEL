        Each dimension scores 0-15 points (max composite score: 105):

        - Credential Severity (0-15): severity 25=15pts, 20=12pts, 5=6pts, 2=3pts

        - Password Crackability (0-15): plaintext=15pts, MD5/SHA1=12pts, SHA256=8pts, bcrypt=3pts, none=0pts

        - PII Exposure Depth (0-15): SSN/financial=15pts, DOB+address=10pts, name+phone=5pts, email only=2pts

        - Device Infection (0-15): active infected device=15pts, historical infection=8pts, no infection=0pts

        - Remediation Timeliness (0-15): unremediated >7d=15pts, unremediated 1-7d=10pts, remediated >24h=5pts, remediated <24h=0pts

        - Behavioral Anomalies (0-15): UEBA anomalies post-exposure=15pts, suspicious sign-ins=10pts, normal=0pts

        - VIP/Asset Criticality (0-15): C-suite/VIP=15pts, admin/privileged=10pts, high-value asset access=8pts, standard=0pts


        Risk Tiers: Critical (75-105), High (50-74), Medium (25-49), Low (0-24)


        # Data Sources

        - SpyCloudBreachWatchlist_CL: exposure severity, password types, PII fields, device infections

        - SpyCloud_ConditionalAccessLogs_CL: remediation timestamps for timeliness calculation

        - BehaviorAnalytics: UEBA anomaly data for behavioral risk dimension

        - _GetWatchlist("VIP_Executives"): VIP status for criticality scoring

        - SigninLogs: sign-in patterns for behavioral assessment


        # Output Format

        - Risk-ranked user table: rank, email, composite score, risk tier, top risk factors, remediation status

        - Risk distribution chart data: users per tier

        - Highest-risk users with detailed dimension breakdown

        - Trend indicators where historical data available

        - Recommended actions per risk tier


        # Rules

        - NEVER return raw JSON — always interpret and format

        - NEVER say "try again" or "I cannot help" — always provide value

        - ALWAYS end with follow-up suggestions

        - Critical-tier users should include specific, immediate remediation actions

        - Always note if a user is on the VIP watchlist'
    ChildSkills:
    - GetUserExposures
    - GetHighSeverityExposures
    - GetExposureSummaryBySeverity
    - GetSensitivePIIExposures
    - GetInfectedDevices
    - GetConditionalAccessForUser
    - GetConditionalAccessStats
    - GetPlaintextPasswordExposures
    - GetFullUserInvestigation
    - AnalyzeAndSummarize
  - Name: SupplyChainExposureAgent
    DisplayName: Supply Chain & Third-Party Exposure Agent
    Description: Investigates third-party and supply chain credential exposure risks from SpyCloud data. Identifies credentials stolen from partner/vendor domains, tracks shared service account compromise,
      correlates third-party breach events with organizational impact, evaluates vendor risk posture based on breach frequency and severity, and produces supply chain risk assessments.
    Interfaces:
    - InteractiveAgent
    Inputs:
    - Name: UserRequest
      Description: 'Your supply chain exposure request. Examples: assess third-party vendor credential risk, identify partner domain exposures affecting our users, check for shared service account compromise,
        or generate a supply chain risk assessment report.'
      DefaultValue: ''
      Required: true
    Settings:
      OrchestratorSkill: DefaultAgentOrchestrator
      Instructions: '# Mission

        You are the Supply Chain & Third-Party Exposure Agent — a specialized analyst that investigates third-party and supply chain credential exposure risks from SpyCloud data in Microsoft Sentinel.


        # Core Capabilities

        1. Identify credentials stolen from partner, vendor, and third-party service domains (target_domain analysis)

        2. Track shared service account compromise across organizational boundaries

        3. Correlate third-party breach events from SpyCloudBreachCatalog_CL with organizational exposure impact

        4. Evaluate vendor risk posture based on breach frequency, severity, and data class exposure

        5. Produce supply chain risk assessments with vendor tiering recommendations


        # Data Sources

        - SpyCloudBreachWatchlist_CL: credential exposures with target_domain identifying third-party services

        - SpyCloudBreachCatalog_CL: breach metadata for identifying vendor-specific breaches

        - _GetWatchlist("Approved_Domains"): approved/corporate domains for filtering first-party vs third-party

        - SpyCloud_ConditionalAccessLogs_CL: remediation status for third-party-exposed credentials


        # Investigation Workflow

        1. Query SpyCloudBreachWatchlist_CL and group by target_domain to identify third-party services with stolen credentials

        2. Filter out first-party domains using _GetWatchlist("Approved_Domains")

        3. For each third-party domain, calculate: unique affected users, severity distribution, password type breakdown

        4. Cross-reference with SpyCloudBreachCatalog_CL to identify the specific breach events

        5. Check remediation status for third-party-exposed credentials

        6. Score vendor risk: breach count * affected user count * max severity * remediation gaps


        # Output Format

        - Third-party exposure summary: vendor domain, affected users, max severity, breach source, remediation %

        - Vendor risk tiering: Critical/High/Medium/Low vendors with justification

        - Shared service account alerts: service accounts with third-party exposure

        - Supply chain risk score with trend

        - Recommended vendor management actions

        - Follow-up investigation suggestions


        # Rules

        - NEVER return raw JSON — always interpret and format

        - NEVER say "try again" or "I cannot help" — always provide value

        - ALWAYS end with follow-up suggestions

        - Shared service accounts exposed on third-party platforms are CRITICAL — flag immediately

        - SSO/IdP credentials (Okta, Azure AD, OneLogin) exposed on third-party sites require immediate password rotation'
    ChildSkills:
    - GetUserExposures
    - GetHighSeverityExposures
    - GetExposureSummaryByDomain
    - GetTargetedDomains
    - GetRecentBreaches
    - GetEnrichedExposures
    - GetConditionalAccessStats
    - GetFullUserInvestigation
    - AnalyzeAndSummarize
  - Name: DarkWebMonitoringAlertAgent
    DisplayName: Dark Web Monitoring & Alert Agent
    Description: Provides real-time dark web monitoring intelligence and alert management for SpyCloud exposure data. Tracks new exposure ingestion velocity, identifies emerging breach sources, monitors for
      fresh infostealer infections targeting the organization, manages alert severity thresholds, and produces daily/weekly dark web intelligence briefings with trending threats and new exposure
      notifications.
    Interfaces:
    - InteractiveAgent
    Inputs:
    - Name: UserRequest
      Description: 'Your dark web monitoring request. Examples: show new exposures ingested today, generate a daily dark web intelligence briefing, identify emerging breach sources,
        track infostealer infection velocity for our organization, or review alert thresholds and notification status.'
      DefaultValue: ''
      Required: true
    Settings:
      OrchestratorSkill: DefaultAgentOrchestrator
      Instructions: '# Mission

        You are the Dark Web Monitoring & Alert Agent — a specialized analyst that provides real-time dark web monitoring intelligence and alert management for SpyCloud exposure data in Microsoft Sentinel.


        # Core Capabilities

        1. Track new exposure ingestion velocity (records per hour/day/week) and identify spikes indicating fresh breach data

        2. Identify emerging and new breach sources from SpyCloudBreachCatalog_CL not previously seen

        3. Monitor for fresh infostealer infections (severity 20/25) targeting the organization within configurable time windows

        4. Produce daily, weekly, and monthly dark web intelligence briefings with trending threats

        5. Alert on new exposure types or data classes not previously observed for the organization


        # Data Sources

        - SpyCloudBreachWatchlist_CL: all credential exposures with TimeGenerated for ingestion tracking

        - SpyCloudBreachCatalog_CL: breach metadata for new source identification

        - Spycloud_MDE_Logs_CL: MDE response tracking for new exposures

        - SpyCloud_ConditionalAccessLogs_CL: identity response tracking for new exposures


        # Monitoring Workflows

        1. New Exposure Check: query SpyCloudBreachWatchlist_CL for records ingested in last N hours, summarize by severity, email_domain, source_id

        2. Ingestion Velocity: compare current period ingestion rate with historical baseline, flag anomalies (>2x baseline)

        3. New Breach Sources: identify source_ids in SpyCloudBreachCatalog_CL first seen within the monitoring window

        4. Fresh Infostealers: severity 20+ exposures with infected_time within 72 hours (active infections still exfiltrating)

        5. Response Gap Check: new high-severity exposures without corresponding remediation actions


        # Output Format

        - Dark web intelligence briefing with key metrics and trends

        - New exposure summary table: time window, total records, unique users, severity breakdown

        - Ingestion velocity chart data with anomaly flags

        - New breach source alerts with affected user counts

        - Fresh infostealer infection alerts with device context

        - Response gap table: unremediated new high-severity exposures

        - Recommended alert threshold adjustments


        # Rules

        - NEVER return raw JSON — always interpret and format

        - NEVER say "try again" or "I cannot help" — always provide value

        - ALWAYS end with follow-up suggestions

        - Fresh infostealers (infected_time < 72h) are CRITICAL — the malware may still be active and exfiltrating data

        - Ingestion spikes (>2x baseline) often indicate a major new breach dump — investigate immediately'
    ChildSkills:
    - GetHighSeverityExposures
    - GetExposureSummaryBySeverity
    - GetExposureSummaryByDomain
    - GetRecentBreaches
    - GetEnrichedExposures
    - GetSpyCloudHealthStatus
    - GetMDERemediationStats
    - GetConditionalAccessStats
    - GenerateIncidentSummary
    - AnalyzeAndSummarize
- Format: GPT
  Skills:
  - Name: AnalyzeAndSummarize
    DisplayName: '[Analysis] Analyze and Summarize SpyCloud Findings'
    Description: Takes raw SpyCloud data from KQL queries and produces a structured, analyst-ready investigation report with threat assessment, risk scoring, remediation recommendations, and compliance
      impact analysis.
    Inputs:
    - Name: RawFindings
      Description: The raw data and context from previous investigation steps.
      Required: true
    Settings:
      ModelName: gpt-4.1
      Template: "<|im_start|>system\nYou are an expert cybersecurity analyst specializing in dark web threat\nintelligence, identity compromise, and infostealer malware response.\n\nYou will receive raw\
        \ investigation findings from SpyCloud data queries\nacross Microsoft Sentinel tables. Your job is to:\n\n1. ASSESS SEVERITY: Classify the overall threat as CRITICAL, HIGH,\n   MEDIUM, or LOW based\
        \ on: presence of plaintext passwords, infostealer\n   severity (20/25), sensitive PII exposure (SSN, financial, health data),\n   number of affected users and devices, and whether stolen session\n\
        \   tokens could bypass MFA.\n\n2. SYNTHESIZE FINDINGS: Convert raw data into clear, actionable\n   intelligence. Reference specific numbers, dates, and entity names.\n   Connect dots across multiple\
        \ data sources — correlate SpyCloud\n   exposure data with MDE device status and Entra ID remediation actions.\n\n3. IDENTIFY GAPS: Flag any high-severity exposures that have NOT been\n   automatically\
        \ remediated. These are the most urgent action items.\n\n4. RECOMMEND ACTIONS: Provide a prioritized remediation plan with\n   specific, actionable steps organized by urgency tier.\n\n5. ASSESS\
        \ COMPLIANCE: If sensitive PII (SSN, health data, financial data)\n   is exposed, map to applicable compliance frameworks and notification\n   requirements with deadlines.\n\nFormat your output\
        \ with clear headers, bullet points for findings, and\nbold text for critical items. Use severity indicators:\n\U0001F534 CRITICAL  \U0001F7E0 HIGH  \U0001F7E1 MEDIUM  \U0001F7E2 LOW\n\nNever fabricate\
        \ data. If information is missing, state what additional\ninvestigation is needed.\n<|im_end|>\n<|im_start|>user\nAnalyze the following SpyCloud investigation findings and produce a\nstructured\
        \ report:\n\n{{RawFindings}}\n<|im_end|>"
- Format: KQL
  Skills:
  - Name: GetUserExposures
    DisplayName: '[Data] Search SpyCloud exposures for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Finds all compromised credentials and infostealer infections for a specific email address.
    Inputs:
    - Name: targetEmail
      Description: The email address to investigate.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | project TimeGenerated, email, severity, target_domain, target_url, target_subdomain, password_type, sighting, infected_machine_id, user_hostname, user_os, infected_path, infected_time, ip_addresses,
        country_code, av_softwares, source_id, document_id, spycloud_publish_date

        | top 25 by TimeGenerated desc'
  - Name: GetUserFullPIIProfile
    DisplayName: '[Data] Get full PII profile for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns complete identity profile including SSN, financial data, employment, social media, and address information.
    Inputs:
    - Name: targetEmail
      Description: The email address to retrieve PII profile for.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | project TimeGenerated, email, username, full_name, first_name, last_name, phone, dob, birth_year, age, gender, address_1, address_2, city, state, postal_code, country, job_title, company_name,
        company_website, industry, educational_institution, student_id, social_linkedin, social_twitter, social_crunchbase, social_other, homepage, ssn_last_four, social_security_number, bank_number, taxid,
        health_insurance_id, mobile_equipment_id, device_name, account_id, account_type, account_status, severity, source_id

        | top 20 by TimeGenerated desc'
  - Name: GetUserAccountActivity
    DisplayName: '[Data] Get account activity timeline for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns account activity metadata including signup, login, and modification timestamps.
    Inputs:
    - Name: targetEmail
      Description: The email address to check for account activity.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | where isnotempty(account_login_time) or isnotempty(account_signup_time) or isnotempty(account_last_activity_time)

        | project TimeGenerated, email, target_domain, account_login_time, account_signup_time, account_last_activity_time, account_modification_time, account_status, account_type, account_notes, account_id,
        severity, source_id

        | top 20 by TimeGenerated desc'
  - Name: GetExposedPasswords
    DisplayName: '[Data] Show exposed passwords for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns all password data including hashes, plaintext, password types, salts, and sighting counts.
    Inputs:
    - Name: targetEmail
      Description: The email address to check for password exposure.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | where isnotempty(password) or isnotempty(password_plaintext)

        | project TimeGenerated, email, username, password_type, salt, target_domain, target_url, severity, sighting, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetPlaintextPasswordExposures
    DisplayName: '[Data] List all plaintext password exposures'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Finds all records with cleartext passwords available — highest immediate credential risk.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(password_plaintext)

        | project TimeGenerated, email, email_domain, password_type, target_domain, severity, sighting, user_hostname, infected_machine_id, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetPasswordTypeBreakdown
    DisplayName: '[Data] Analyze password types across all exposures'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Breaks down exposed credentials by password type (plaintext, MD5, SHA1, bcrypt, etc.) with crackability assessment.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(password_type)

        | summarize Count = count(), UniqueUsers = dcount(email), HasPlaintext = countif(isnotempty(password_plaintext)), AvgSeverity = round(avg(severity), 1) by password_type

        | sort by Count desc'
  - Name: GetHighSeverityExposures
    DisplayName: '[Data] Get recent high-severity infostealer exposures'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns severity 20+ infostealer exposures with full device and infection context.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | project TimeGenerated, email, severity, target_domain, target_url, user_hostname, user_os, infected_machine_id, infected_path, infected_time, password_type, ip_addresses, av_softwares, country_code,
        source_id

        | top 25 by TimeGenerated desc'
  - Name: GetExposureSummaryBySeverity
    DisplayName: '[Data] Summarize exposures by severity level'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Breaks down all exposures by severity with counts, unique users, plaintext passwords, and infected device counts.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | summarize Count = count(), UniqueUsers = dcount(email), UniqueTargets = dcount(target_domain), PlaintextPasswords = countif(isnotempty(password_plaintext)), UniqueMachines = dcount(infected_machine_id),
        LatestRecord = max(TimeGenerated) by severity

        | extend SeverityLabel = case(severity == 2, "Breach Credential", severity == 5, "Breach + PII", severity == 20, "Infostealer Credential", severity == 25, "Infostealer + App Data", strcat("Severity
        ", tostring(severity)))

        | project severity, SeverityLabel, Count, UniqueUsers, UniqueTargets, PlaintextPasswords, UniqueMachines, LatestRecord

        | sort by severity asc'
  - Name: GetExposureSummaryByDomain
    DisplayName: '[Data] Summarize exposures by email domain'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Aggregates exposures by corporate email domain with infostealer and plaintext counts.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(email_domain)

        | summarize ExposureCount = count(), UniqueUsers = dcount(email), AvgSeverity = round(avg(severity), 1), InfostealerCount = countif(severity >= 20), PlaintextCount = countif(isnotempty(password_plaintext))
        by email_domain

        | top 15 by ExposureCount desc'
  - Name: GetTargetedDomains
    DisplayName: '[Data] Show most targeted websites and applications'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Lists the most frequently targeted websites where credentials were stolen, ranked by volume.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(target_domain)

        | summarize ExposureCount = count(), UniqueEmails = dcount(email), AvgSeverity = round(avg(severity), 1), PlaintextCreds = countif(isnotempty(password_plaintext)) by target_domain

        | top 20 by ExposureCount desc'
  - Name: GetSensitivePIIExposures
    DisplayName: '[Data] Find exposures with SSN, financial, and health data'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Identifies records with Social Security numbers, bank accounts, tax IDs, and health insurance IDs.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where isnotempty(social_security_number) or isnotempty(ssn_last_four) or isnotempty(bank_number) or isnotempty(taxid) or isnotempty(health_insurance_id)

        | project TimeGenerated, email, full_name, severity, ssn_last_four, social_security_number, bank_number, taxid, health_insurance_id, dob, phone, address_1, city, state, country, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetSocialMediaExposures
    DisplayName: '[Data] Find exposed social media profiles'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns LinkedIn, Twitter, Crunchbase profiles and other social accounts for a user.
    Inputs:
    - Name: targetEmail
      Description: The email address to check for social media exposure.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where email =~ "{{targetEmail}}"

        | where isnotempty(social_linkedin) or isnotempty(social_twitter) or isnotempty(social_crunchbase) or isnotempty(social_other) or isnotempty(homepage)

        | project TimeGenerated, email, full_name, social_linkedin, social_twitter, social_crunchbase, social_other, homepage, account_image_url, account_caption, severity, source_id

        | top 15 by TimeGenerated desc'
  - Name: GetInfectedDevices
    DisplayName: '[Data] List infected devices from SpyCloud'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Groups infostealer exposures by infected machine with credential counts and user blast radius.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | where isnotempty(infected_machine_id)

        | summarize ExposureCount = count(), DistinctTargets = dcount(target_domain), DistinctUsers = dcount(email), LatestExposure = max(TimeGenerated) by infected_machine_id, user_hostname, user_os

        | top 20 by ExposureCount desc'
  - Name: GetDeviceForensics
    DisplayName: '[Data] Get full forensics for an infected device'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns malware path, AV software, OS, IPs, keyboard languages, country, timezone, and registered owner.
    Inputs:
    - Name: machineId
      Description: The SpyCloud infected_machine_id to retrieve forensics for.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where infected_machine_id == "{{machineId}}"

        | project TimeGenerated, email, severity, target_domain, infected_path, user_hostname, user_os, user_sys_registered_owner, display_resolution, ip_addresses, country_code, keyboard_languages, timezone,
        av_softwares, log_id, infected_time, device_name, mobile_equipment_id, source_id

        | top 25 by TimeGenerated desc'
  - Name: GetDeviceToUserCorrelation
    DisplayName: '[Data] Show all users affected by an infected device'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Maps an infected machine ID to every user whose credentials were stolen from that device.
    Inputs:
    - Name: machineId
      Description: The SpyCloud infected_machine_id for blast radius analysis.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where infected_machine_id == "{{machineId}}"

        | summarize ExposureCount = count(), TargetDomains = make_set(target_domain, 20), PasswordTypes = make_set(password_type, 10), HasPlaintext = countif(isnotempty(password_plaintext)) by email, severity,
        user_hostname, user_os

        | top 20 by ExposureCount desc'
  - Name: GetAVCoverageGaps
    DisplayName: '[Data] Analyze antivirus coverage gaps'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Shows which AV products were on infected devices but failed to prevent the infostealer.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | where isnotempty(av_softwares)

        | mv-expand av_softwares

        | summarize InfectedDevices = dcount(infected_machine_id), Exposures = count(), UniqueUsers = dcount(email) by tostring(av_softwares)

        | sort by InfectedDevices desc'
  - Name: GetMalwareInfo
    DisplayName: '[Data] Look up breach or malware in catalog'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Searches the Breach Catalog for a malware family or breach source with full metadata.
    Inputs:
    - Name: threatName
      Description: Malware family or breach name (e.g. Redline, LummaC2, Vidar).
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachCatalog_CL

        | where breach_title contains "{{threatName}}"

        | project TimeGenerated, source_id, breach_title, description, status

        | top 15 by TimeGenerated desc'
  - Name: GetRecentBreaches
    DisplayName: '[Data] Show recently added breach catalog entries'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Lists the most recently ingested breach sources including infostealers, combo lists, and phished data.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachCatalog_CL

        | project TimeGenerated, source_id, breach_title, description, status

        | top 20 by TimeGenerated desc'
  - Name: GetEnrichedExposures
    DisplayName: '[Data] Enrich exposures with breach catalog details'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Joins watchlist exposures with catalog to show malware family names and breach types alongside credentials.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "SpyCloudBreachWatchlist_CL\n| join kind=leftouter (\n    SpyCloudBreachCatalog_CL\n    | summarize arg_max(TimeGenerated, *) by source_id\n    | project source_id, breach_title, status\n\
        ) on source_id\n| project TimeGenerated, email, severity, target_domain, password_type, breach_title, status, user_hostname, infected_machine_id\n| top 25 by TimeGenerated desc"
  - Name: GetMDERemediationActions
    DisplayName: '[Data] Show MDE remediation actions'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns all MDE device isolation, tagging, and IOC submission actions from SpyCloud playbooks.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'Spycloud_MDE_Logs_CL

        | project TimeGenerated, IncidentId, HostName, NormalizedHostName, DeviceId, OSPlatform, RiskScore, ExposureLevel, IsolationRequested, IsolationStatus, MachineTagAdded, MachineTagName, AddedIOCsToDefender,
        PlaybookName, BreachTitle, InfectedMachineId

        | top 25 by TimeGenerated desc'
  - Name: GetMDERemediationForDevice
    DisplayName: '[Data] Look up MDE actions for a device'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Searches MDE logs for all automated actions taken against a specific hostname.
    Inputs:
    - Name: hostName
      Description: Hostname to look up in MDE remediation logs.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'Spycloud_MDE_Logs_CL

        | where HostName contains "{{hostName}}" or NormalizedHostName contains "{{hostName}}"

        | project TimeGenerated, IncidentId, HostName, DeviceId, OSPlatform, RiskScore, ExposureLevel, IsolationRequested, IsolationStatus, MachineTagAdded, MachineTagName, AddedIOCsToDefender, PlaybookName,
        BreachTitle, InfectedMachineId

        | top 20 by TimeGenerated desc'
  - Name: GetMDERemediationStats
    DisplayName: '[Data] Summarize MDE remediation effectiveness'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Aggregate MDE stats with isolation success rate, tags added, IOCs submitted, and unique devices.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'Spycloud_MDE_Logs_CL

        | summarize TotalActions = count(), IsolationRequested = countif(IsolationRequested == true), IsolationSucceeded = countif(IsolationStatus == true), TagsAdded = countif(MachineTagAdded == true),
        IOCsSubmitted = countif(AddedIOCsToDefender == true), UniqueDevices = dcount(DeviceId), UniqueIncidents = dcount(IncidentId)

        | extend IsolationSuccessRate = iff(IsolationRequested > 0, round(100.0 * IsolationSucceeded / IsolationRequested, 1), 0.0)'
  - Name: GetConditionalAccessActions
    DisplayName: '[Data] Show Conditional Access remediation actions'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Returns all Entra ID password resets, session revocations, CA group additions, and account disablements.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloud_ConditionalAccessLogs_CL

        | project TimeGenerated, IncidentId, Username, UserEmail, ForcedPasswordResetOnNextSignIn, UserSessionsRevoked, CAgroup, UserDisabled, PlaybookName, BreachTitle, InfectedMachineId

        | top 25 by TimeGenerated desc'
  - Name: GetConditionalAccessForUser
    DisplayName: '[Data] Look up identity actions for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Searches CA logs for all identity remediation taken against a specific user.
    Inputs:
    - Name: userEmail
      Description: The email address or UPN to look up.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloud_ConditionalAccessLogs_CL

        | where UserEmail =~ "{{userEmail}}" or Username =~ "{{userEmail}}"

        | project TimeGenerated, IncidentId, Username, UserEmail, ForcedPasswordResetOnNextSignIn, UserSessionsRevoked, CAgroup, UserDisabled, PlaybookName, BreachTitle, InfectedMachineId

        | top 20 by TimeGenerated desc'
  - Name: GetConditionalAccessStats
    DisplayName: '[Data] Summarize identity remediation effectiveness'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Aggregate CA stats with password resets, session revocations, CA group additions, and account disablements.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloud_ConditionalAccessLogs_CL

        | summarize TotalActions = count(), PasswordResets = countif(ForcedPasswordResetOnNextSignIn == true), SessionsRevoked = countif(UserSessionsRevoked == true), AddedToCAGroup = countif(CAgroup ==
        true), AccountsDisabled = countif(UserDisabled == true), UniqueUsers = dcount(UserEmail), UniqueIncidents = dcount(IncidentId)'
  - Name: GetFullUserInvestigation
    DisplayName: '[Data] Full cross-table investigation for a user'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Checks a user across watchlist, MDE, and CA tables in a single query for complete picture.
    Inputs:
    - Name: investigateEmail
      Description: The email address to investigate across all tables.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "union\n  (SpyCloudBreachWatchlist_CL\n  | where email =~ \"{{investigateEmail}}\"\n  | summarize ExposureCount = count(), LatestExposure = max(TimeGenerated), MaxSeverity = max(severity),\
        \ UniqueTargets = dcount(target_domain), UniqueMachines = dcount(infected_machine_id), PlaintextPasswords = countif(isnotempty(password_plaintext)), HasSSN = countif(isnotempty(social_security_number)\
        \ or isnotempty(ssn_last_four))\n  | extend DataSource = \"Watchlist Exposures\"),\n  (SpyCloud_ConditionalAccessLogs_CL\n  | where UserEmail =~ \"{{investigateEmail}}\" or Username =~ \"{{investigateEmail}}\"\
        \n  | summarize CAActions = count(), PasswordResets = countif(ForcedPasswordResetOnNextSignIn == true), SessionRevocations = countif(UserSessionsRevoked == true), AccountDisablements = countif(UserDisabled\
        \ == true)\n  | extend DataSource = \"Conditional Access\")"
  - Name: GetGeographicAnalysis
    DisplayName: '[Data] Analyze geographic distribution of infections'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Shows infection distribution by country with device counts and user counts per country.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: 'SpyCloudBreachWatchlist_CL

        | where severity >= 20

        | where isnotempty(country_code)

        | summarize ExposureCount = count(), UniqueDevices = dcount(infected_machine_id), UniqueUsers = dcount(email) by country_code

        | sort by ExposureCount desc'
  - Name: GetSpyCloudHealthStatus
    DisplayName: '[Data] Check SpyCloud data ingestion health'
    Description: Internal data retrieval skill used by the SpyCloud Investigation Agent. Health check across all four SpyCloud tables showing record counts and last update times.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "union\n  (SpyCloudBreachWatchlist_CL | summarize Records=count(), Latest=max(TimeGenerated) | extend Table='Watchlist'),\n  (SpyCloudBreachCatalog_CL | summarize Records=count(), Latest=max(TimeGenerated)\
        \ | extend Table='Breach Catalog'),\n  (Spycloud_MDE_Logs_CL | summarize Records=count(), Latest=max(TimeGenerated) | extend Table='MDE Remediation'),\n  (SpyCloud_ConditionalAccessLogs_CL | summarize\
        \ Records=count(), Latest=max(TimeGenerated) | extend Table='Conditional Access')\n| project Table, Records, Latest, HoursSinceUpdate = datetime_diff('hour', now(), Latest)"
  - Name: InvestigateFullExposureChain
    DisplayName: '[Data] Full exposure investigation chain'
    Description: Internal data retrieval skill. Performs a comprehensive multi-table investigation for a user across SpyCloud exposures, sign-in activity, and remediation history with a complete timeline
      and risk assessment.
    Inputs:
    - Name: UserEmail
      Description: Email to investigate.
      Required: true
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "let user = \"{{UserEmail}}\";\nlet exposures = SpyCloudBreachWatchlist_CL | where email =~ user and TimeGenerated > ago(90d);\nlet signins = SigninLogs | where UserPrincipalName =~\
        \ user and TimeGenerated > ago(30d);\nlet remediated = SpyCloud_ConditionalAccessLogs_CL | where UserEmail =~ user and TimeGenerated > ago(30d);\nunion isfuzzy=true\n(exposures | summarize Exposures=count(),\
        \ MaxSev=max(severity), Breaches=dcount(source_id), PlaintextPWs=countif(isnotempty(password_plaintext)), Devices=dcount(infected_machine_id) | extend Phase=\"1-Exposure\"),\n(signins | where\
        \ ResultType == 0 | summarize SuccessSignIns=count(), UniqueIPs=dcount(IPAddress), Countries=dcount(tostring(LocationDetails.countryOrRegion)) | extend Phase=\"2-SignInActivity\"),\n(remediated\
        \ | summarize Resets=countif(ForcedPasswordResetOnNextSignIn == true), Revokes=countif(UserSessionsRevoked == true) | extend Phase=\"3-Remediation\")"
  - Name: GenerateIncidentSummary
    DisplayName: '[Data] Generate incident summary report'
    Description: Internal data retrieval skill. Creates a structured incident summary for SpyCloud exposure events including affected users, severity assessment, remediation status, and unremediated
      gaps.
    Inputs:
    - Name: HoursBack
      Description: Hours to look back (default 24).
      Required: false
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "let timeframe = ago({{HoursBack}}h);\nlet new_exposures = SpyCloudBreachWatchlist_CL | where TimeGenerated > timeframe;\nlet mde_actions = Spycloud_MDE_Logs_CL | where TimeGenerated\
        \ > timeframe;\nlet ca_actions = SpyCloud_ConditionalAccessLogs_CL | where TimeGenerated > timeframe;\nunion isfuzzy=true\n(new_exposures | summarize v=count() | extend Category=\"New Exposures\"\
        ),\n(new_exposures | where severity == 25 | summarize v=count() | extend Category=\"Critical (Sev 25)\"),\n(new_exposures | where severity == 20 | summarize v=count() | extend Category=\"High\
        \ (Sev 20)\"),\n(new_exposures | summarize v=dcount(email) | extend Category=\"Unique Users Affected\"),\n(new_exposures | where isnotempty(infected_machine_id) | summarize v=dcount(infected_machine_id)\
        \ | extend Category=\"Infected Devices\"),\n(mde_actions | summarize v=count() | extend Category=\"MDE Isolations Performed\"),\n(ca_actions | summarize v=count() | extend Category=\"CA Resets\
        \ Performed\"),\n(new_exposures | where severity >= 20 and email !in~ (ca_actions | distinct UserEmail) | summarize v=dcount(email) | extend Category=\"Unremediated High-Sev\")\n| project Category,\
        \ Value=v"
  - Name: DetectPermissionGaps
    DisplayName: '[Data] Detect missing permissions for playbooks'
    Description: Internal data retrieval skill. Checks if SpyCloud playbooks have been executing successfully by identifying permission gaps, failed actions, and missing remediation for high-severity
      exposures.
    Settings:
      Target: Sentinel
      TenantId: '{{TenantId}}'
      SubscriptionId: '{{SubscriptionId}}'
      ResourceGroupName: '{{ResourceGroupName}}'
      WorkspaceName: '{{WorkspaceName}}'
      Template: "let exposed_sev20 = SpyCloudBreachWatchlist_CL | where TimeGenerated > ago(7d) and severity >= 20 | distinct email;\nlet mde_acted = Spycloud_MDE_Logs_CL | where TimeGenerated > ago(7d)\
        \ | distinct HostName;\nlet ca_acted = SpyCloud_ConditionalAccessLogs_CL | where TimeGenerated > ago(7d) | distinct UserEmail;\nunion isfuzzy=true\n(exposed_sev20 | where email !in~ (ca_acted)\
        \ | summarize Unremediated=count() | extend Check=\"Users sev20+ without CA reset\", Status=iff(Unremediated > 0, \"GAP\", \"OK\")),\n(Spycloud_MDE_Logs_CL | where TimeGenerated > ago(7d) and\
        \ IsolationStatus == false | summarize Failures=count() | extend Check=\"MDE isolation failures\", Status=iff(Failures > 0, \"CHECK\", \"OK\")),\n(SpyCloud_ConditionalAccessLogs_CL | where TimeGenerated\
        \ > ago(7d) and ForcedPasswordResetOnNextSignIn == false | summarize Failures=count() | extend Check=\"CA reset failures\", Status=iff(Failures > 0, \"CHECK\", \"OK\"))\n| project Check, Status"
AgentDefinitions:
- Name: SpyCloudThreatIntelAgent
  DisplayName: SpyCloud Darknet & Identity Threat Exposure Intelligence Agent
  Description: >
    Interactive investigation agent for SpyCloud darknet & identity threat exposure intelligence.
    Investigate email addresses for credential compromise, device hostnames for infostealer forensics,
    malware families for threat hunting, or request an organization-wide exposure overview. The agent
    orchestrates 34 KQL skills across 6 Sentinel tables (156 columns), 12 specialized sub-agents
    (UEBA, Fusion, TI Enrichment, Session Cookie/MFA Bypass, Lateral Movement, Data Exfiltration,
    Executive Summary, Watchlist Management, Ransomware Assessment, Identity Risk Scoring,
    Supply Chain Exposure, Dark Web Monitoring), GPT-4.1 analysis, and produces rich investigation
    reports with data tables, timelines, severity indicators, remediation gap analysis, compliance
    impact, and contextual follow-up questions for continued pivoting. Supports all breach categories
    including infostealers, combo lists, phishing, exfiltration, and scraping. Compatible with
    SpyCloud KQL Plugin (85 skills) and SpyCloud API Plugin (12 skills) for complete coverage.
  Publisher: SpyCloud
  Product: ThreatIntelligence
  Category: Threat Intelligence
  Version: 6.1.0
  Icon: https://raw.githubusercontent.com/iammrherb/SPYCLOUD-SENTINEL/main/docs/images/SpyCloud-icon-SC_2.png
  RequiredSkillsets:
  - SpyCloud.ThreatIntelligence.SentinelAgent
  AgentSingleInstanceConstraint: None
  SupportedAuthTypes:
  - None
  Settings:
  - Name: TenantId
    Label: Azure Tenant ID
    Description: Your Azure Tenant ID
    HintText: Enter your Azure Tenant ID
    SettingType: String
    Required: true
  - Name: SubscriptionId
    Label: Azure Subscription ID
    Description: Your Azure Subscription ID
    HintText: Enter your Azure Subscription ID
    SettingType: String
    Required: true
  - Name: ResourceGroupName
    Label: Resource Group Name
    Description: Resource Group containing your Sentinel workspace
    HintText: Enter Resource Group name
    SettingType: String
    Required: true
  - Name: WorkspaceName
    Label: Sentinel Workspace Name
    Description: Name of the Log Analytics workspace with SpyCloud data
    HintText: Enter workspace name
    SettingType: String
    Required: true
  - Name: SpyCloudApiKey
    Label: SpyCloud API Key
    Description: SpyCloud API key for direct API access via companion API Plugin (optional)
    HintText: Enter SpyCloud API key for API Plugin integration
    SettingType: String
    Required: false
  Triggers:
  - Name: Default
    DefaultPollPeriodSeconds: 0
    ProcessSkill: SpyCloud.ThreatIntelligence.SentinelAgent.SpyCloudInvestigationAgent
  PromptSkill: SpyCloud.ThreatIntelligence.SentinelAgent.SpyCloudInvestigationAgent
