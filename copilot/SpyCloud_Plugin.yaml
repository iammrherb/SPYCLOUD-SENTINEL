      # =====================================================================
      # 22. MSIC INCIDENT CORRELATION
      # =====================================================================

      - Name: GetMSICIncidentCorrelation
        DisplayName: Correlate MSIC incidents with SpyCloud exposure
        Description: |
          Shows Microsoft Security Incident Creation rule incidents and their correlation with SpyCloud exposure data. Correlates incidents from Azure AD Identity Protection, Azure Security Center, Microsoft 365 Defender, Microsoft Cloud App Security, and Azure ATP with SpyCloud exposure records to identify attacks that may have originated from stolen credentials.
        ExamplePrompts:
