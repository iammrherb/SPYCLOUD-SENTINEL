      # =====================================================================
      # 17. SESSION COOKIE THEFT AND TOKEN REPLAY HUNTING
      # =====================================================================

      - Name: HuntStolenSessionCookies
        DisplayName: Hunt stolen session cookies bypassing MFA
        Description: |
          Identifies users with stolen session cookies from SpyCloud who have recent sign-ins potentially bypassing MFA via token replay. Detects post-authentication attacks where stolen cookies or session tokens allow attackers to impersonate users without triggering MFA challenges.
        ExamplePrompts:
          - Hunt for stolen session cookie abuse
          - Find users bypassing MFA with stolen tokens
          - Detect token replay attacks from SpyCloud data
          - Which users with stolen cookies have suspicious sign-ins
          - Hunt for session hijacking from infostealer infections
        Settings:
          Target: Sentinel
          TenantId: '{{TenantId}}'
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroupName: '{{ResourceGroupName}}'
          WorkspaceName: '{{WorkspaceName}}'
          Template: |-
            let stolen = SpyCloudBreachWatchlist_CL | where TimeGenerated > ago(14d) and severity >= 20 | where isnotempty(infected_machine_id) | distinct email; SigninLogs | where TimeGenerated > ago(7d) and ResultType == 0 | where AuthenticationRequirement == "singleFactorAuthentication" | where UserPrincipalName in~ (stolen) | summarize Sessions=count(), UniqueIPs=dcount(IPAddress), Countries=dcount(LocationDetails.countryOrRegion) by UserPrincipalName | where UniqueIPs > 1

      # =====================================================================
      # 18. LATERAL MOVEMENT DETECTION
      # =====================================================================

      - Name: HuntLateralMovementFromExposedAccounts
        DisplayName: Detect lateral movement from exposed accounts
        Description: |
          Detects lateral movement patterns from accounts with SpyCloud credential exposure, focusing on remote interactive and network logon types. Identifies compromised accounts accessing multiple targets via RDP, SMB, or network logons indicating potential lateral movement activity.
        ExamplePrompts:
          - Detect lateral movement from SpyCloud exposed accounts
          - Hunt for RDP and network logons from compromised users
          - Which exposed accounts are moving laterally
          - Find lateral movement from infostealer-compromised accounts
          - Show multi-target access from SpyCloud exposed users
        Settings:
          Target: Sentinel
          TenantId: '{{TenantId}}'
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroupName: '{{ResourceGroupName}}'
          WorkspaceName: '{{WorkspaceName}}'
          Template: |-
            let compromised = SpyCloudBreachWatchlist_CL | where TimeGenerated > ago(14d) and severity >= 20 | distinct email; IdentityLogonEvents | where TimeGenerated > ago(7d) | where AccountUpn in~ (compromised) | where LogonType in ("RemoteInteractive", "Network") | summarize UniqueTargets=dcount(DestinationDeviceName), Logons=count() by AccountUpn, DeviceName | where UniqueTargets > 2

      # =====================================================================
      # 19. DATA EXFILTRATION DETECTION
      # =====================================================================

      - Name: HuntDataExfiltrationFromExposedUsers
        DisplayName: Detect data exfiltration from exposed users
        Description: |
          Detects mass file downloads and data exfiltration from cloud apps by users whose credentials were exposed in SpyCloud data. Identifies potential data theft by monitoring for unusual download volumes from compromised accounts across Microsoft 365, SharePoint, OneDrive, and other cloud applications.
        ExamplePrompts:
          - Hunt for data exfiltration from SpyCloud exposed users
          - Detect mass downloads by compromised users
          - Find file theft from infostealer-compromised accounts
          - Which exposed users are downloading excessive files
          - Show cloud data exfiltration by SpyCloud exposed users
        Settings:
          Target: Sentinel
          TenantId: '{{TenantId}}'
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroupName: '{{ResourceGroupName}}'
          WorkspaceName: '{{WorkspaceName}}'
          Template: |-
            let exposed = SpyCloudBreachWatchlist_CL | where TimeGenerated > ago(14d) and severity >= 20 | distinct email; CloudAppEvents | where TimeGenerated > ago(7d) | where ActionType in ("FileDownloaded", "FileSyncDownloadedFull") | join kind=inner (IdentityInfo | distinct AccountUPN, AccountObjectId) on AccountObjectId | where AccountUPN in~ (exposed) | summarize Downloads=count(), UniqueFiles=dcount(ObjectName) by AccountUPN | where Downloads > 50

      # =====================================================================
      # 20. MALWARE FAMILY TRACKING
      # =====================================================================

      - Name: TrackMalwareFamilyTrends
        DisplayName: Track infostealer malware family trends
        Description: |
          Tracks infostealer malware family trends from SpyCloud data showing which malware families target your organization. Identifies RedLine, Raccoon, Vidar, LummaC2, StealC, and other infostealer families by analyzing infection paths and provides victim and device counts per family.
        ExamplePrompts:
          - What malware families are targeting our organization
          - Show infostealer malware family trends from SpyCloud
          - Track which infostealers are most prevalent
          - Break down SpyCloud infections by malware family
          - Which malware families have the most victims
        Inputs:
          - Name: Lookback
            Description: Time range to look back for malware trends (e.g., 30d, 60d, 90d). Default is 30d.
            Required: false
            DefaultValue: '30d'
        Settings:
          Target: Sentinel
          TenantId: '{{TenantId}}'
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroupName: '{{ResourceGroupName}}'
          WorkspaceName: '{{WorkspaceName}}'
          Template: |-
            SpyCloudBreachWatchlist_CL | where TimeGenerated > ago({{Lookback}}) and severity >= 20 | where isnotempty(infected_path) | extend malware_family = case(infected_path contains "redline", "RedLine", infected_path contains "raccoon", "Raccoon", infected_path contains "vidar", "Vidar", infected_path contains "lumma", "LummaC2", infected_path contains "stealc", "StealC", "Unknown") | summarize Victims=dcount(email), Devices=dcount(infected_machine_id) by malware_family | order by Victims desc

