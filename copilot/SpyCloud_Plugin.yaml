      - Name: GetCapabilityMatrix
        DisplayName: Show full SpyCloud capability matrix and coverage map
        Description: |
          Displays the complete SpyCloud Sentinel capability matrix including all deployed resources, skill counts, sub-agent inventory, connector coverage, playbook status, analytics rule counts, and feature availability by subscription tier. Use this for onboarding new team members or assessing solution completeness.
        ExamplePrompts:
          - Show me everything SpyCloud can do
          - What capabilities are available
          - Give me the full feature matrix
          - Show the capability inventory
          - What is deployed and available
          - Onboard me to SpyCloud Sentinel
        Settings:
          Target: Sentinel
          TenantId: '{{TenantId}}'
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroupName: '{{ResourceGroupName}}'
          WorkspaceName: '{{WorkspaceName}}'
          Template: |-
            union isfuzzy=true
            (SpyCloudBreachWatchlist_CL | summarize Records=count(), UniqueUsers=dcount(email), MaxSev=max(severity), Latest=max(TimeGenerated) | extend Component="Breach Watchlist Data", Type="Data Table", Status=iff(Records>0,"Active","Empty")),
            (SpyCloudBreachCatalog_CL | summarize Records=count(), UniqueUsers=dcount(source_id), MaxSev=0, Latest=max(TimeGenerated) | extend Component="Breach Catalog", Type="Data Table", Status=iff(Records>0,"Active","Empty")),
            (SpyCloudCompassData_CL | summarize Records=count(), UniqueUsers=dcount(email), MaxSev=max(severity), Latest=max(TimeGenerated) | extend Component="Compass Data (Enterprise+)", Type="Data Table", Status=iff(Records>0,"Active","Not Available")),
            (SpyCloudCompassDevices_CL | summarize Records=count(), UniqueUsers=0, MaxSev=0, Latest=max(TimeGenerated) | extend Component="Compass Devices (Enterprise+)", Type="Data Table", Status=iff(Records>0,"Active","Not Available")),
            (Spycloud_MDE_Logs_CL | summarize Records=count(), UniqueUsers=dcount(DeviceId), MaxSev=0, Latest=max(TimeGenerated) | extend Component="MDE Remediation Log", Type="Automation", Status=iff(Records>0,"Active","Pending")),
            (SpyCloud_ConditionalAccessLogs_CL | summarize Records=count(), UniqueUsers=dcount(UserEmail), MaxSev=0, Latest=max(TimeGenerated) | extend Component="CA Remediation Log", Type="Automation", Status=iff(Records>0,"Active","Pending")),
            (SecurityIncident | where Title has "SpyCloud" | summarize Records=count(), UniqueUsers=0, MaxSev=0, Latest=max(TimeGenerated) | extend Component="SpyCloud Incidents", Type="Detection", Status=iff(Records>0,"Active","No Incidents")),
            (SentinelHealth | where SentinelResourceName has "SpyCloud" | summarize Records=count(), UniqueUsers=0, MaxSev=0, Latest=max(TimeGenerated) | extend Component="Automation Health", Type="Health", Status=iff(Records>0,"Active","Not Monitored"))
            | project Component, Type, Status, Records, Latest
