# ═══════════════════════════════════════════════════════════════════════
# SpyCloud Identity Exposure Intelligence for Sentinel — Logic App Plugin for Security Copilot
# ═══════════════════════════════════════════════════════════════════════
# Version:  2.0.0
# Date:     2026-03-19
# Purpose:  Exposes SpyCloud Logic App playbooks as invokable skills
#           within Security Copilot agents and prompts. Enables the
#           SCORCH agent to trigger real remediation actions directly.
# Spec:     https://learn.microsoft.com/en-us/copilot/security/developer/plugin-logic-apps
# ═══════════════════════════════════════════════════════════════════════

Descriptor:
  Name: SpyCloud.LogicApps.Remediation
  DisplayName: SpyCloud Remediation Actions (Logic Apps)
  Description: >-
    Invokable Security Copilot skills backed by SpyCloud Logic App playbooks.
    Enables the SCORCH agent and analysts to trigger real remediation actions
    directly from Security Copilot — enrichment lookups, device isolation,
    password resets, session revocation, Teams/Slack notifications, and
    ServiceNow ticket creation. Each skill maps to a deployed Logic App
    with an HTTP Request trigger.
  Settings:
    - Name: SubscriptionId
      Description: Azure Subscription ID containing the Logic Apps
      HintText: Enter your Azure Subscription ID
      SettingType: string
      Required: true
    - Name: ResourceGroup
      Description: Resource Group containing the SpyCloud Logic Apps
      HintText: Enter the Resource Group name
      SettingType: string
      Required: true
  SupportedAuthTypes:
    - AAD

SkillGroups:

  # ─── ENRICHMENT LOGIC APPS (call SpyCloud API + write to Sentinel) ───

  - Format: LogicApp
    Skills:
      - Name: EnrichEmailExposure
        DisplayName: "Enrich incident with SpyCloud email exposure data"
        Description: >-
          Triggers the SpyCloud-Enrich-Email Logic App to query all breach 
          records for an email address via the SpyCloud API, then writes a 
          structured enrichment comment to the Sentinel incident. Returns 
          total exposures, severity distribution, plaintext password count, 
          target domains, breach sources, and infection timestamps.
        DescriptionForModel: >-
          Use this skill when the analyst wants to enrich a Sentinel incident 
          with SpyCloud exposure data for a specific email address. This 
          calls the live SpyCloud API and writes results back to the incident.
        Inputs:
          - Name: email
            Description: Email address to enrich
            Required: true
          - Name: incidentId
            Description: Sentinel incident ARM ID to add the enrichment comment to
            Required: false
        Settings:
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroup: '{{ResourceGroup}}'
          WorkflowName: SpyCloud-Enrich-Email
          TriggerName: manual

      - Name: EnrichDomainExposure
        DisplayName: "Enrich incident with SpyCloud domain exposure data"
        Description: >-
          Triggers the SpyCloud-Enrich-Domain Logic App to query all breach 
          records for a corporate domain. Returns total exposed users, severity 
          breakdown, top accounts, breach source list, and organizational posture.
        Inputs:
          - Name: domain
            Description: Domain to enrich
            Required: true
          - Name: incidentId
            Description: Sentinel incident ARM ID
            Required: false
        Settings:
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroup: '{{ResourceGroup}}'
          WorkflowName: SpyCloud-Enrich-Domain
          TriggerName: manual

      - Name: EnrichIPExposure
        DisplayName: "Enrich incident with SpyCloud IP exposure data"
        Description: >-
          Triggers the SpyCloud-Enrich-IP Logic App to query breach records 
          associated with an IP address. Returns infected devices, affected 
          users, malware families, infection dates.
        Inputs:
          - Name: ip
            Description: IP address to enrich
            Required: true
          - Name: incidentId
            Description: Sentinel incident ARM ID
            Required: false
        Settings:
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroup: '{{ResourceGroup}}'
          WorkflowName: SpyCloud-Enrich-IP
          TriggerName: manual

      - Name: EnrichCatalogContext
        DisplayName: "Enrich incident with breach source context"
        Description: >-
          Triggers the SpyCloud-Enrich-Catalog Logic App to retrieve full 
          breach source metadata — title, description, confidence, record 
          count, acquisition date, malware family.
        Inputs:
          - Name: sourceId
            Description: SpyCloud breach source ID
            Required: true
          - Name: incidentId
            Description: Sentinel incident ARM ID
            Required: false
        Settings:
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroup: '{{ResourceGroup}}'
          WorkflowName: SpyCloud-Enrich-Catalog
          TriggerName: manual

  # ─── RESPONSE LOGIC APPS (take remediation action) ───────────────

      - Name: IsolateDeviceInMDE
        DisplayName: "Isolate infected device in Microsoft Defender"
        Description: >-
          Triggers the SpyCloud-MDE-Remediation Logic App to isolate an 
          infected device in Microsoft Defender for Endpoint. Supports 
          full or selective isolation based on severity. Also tags the 
          device and submits IOCs.
        DescriptionForModel: >-
          Use this skill when the analyst confirms a device needs to be 
          isolated in MDE after SpyCloud infostealer findings. Requires 
          MDE P2 license and Machine.Isolate permission.
        Inputs:
          - Name: deviceId
            Description: MDE device ID or SpyCloud infected_machine_id
            Required: true
          - Name: isolationType
            Description: "full or selective (default: full for sev 25, selective for sev 20)"
            Required: false
          - Name: incidentId
            Description: Sentinel incident ARM ID
            Required: false
        Settings:
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroup: '{{ResourceGroup}}'
          WorkflowName: SpyCloud-MDE-Remediation
          TriggerName: manual

      - Name: ResetUserPasswordViaCA
        DisplayName: "Force password reset and revoke sessions via Entra ID"
        Description: >-
          Triggers the SpyCloud-CA-Remediation Logic App to force a 
          password reset on next sign-in, revoke all active sessions, 
          and optionally add the user to a Conditional Access security 
          group for restricted access.
        DescriptionForModel: >-
          Use this skill when the analyst confirms a user's credentials 
          are compromised and needs password reset + session revocation.
          Requires Entra ID P1+ and Graph API User.ReadWrite.All.
        Inputs:
          - Name: userEmail
            Description: Email/UPN of the user to remediate
            Required: true
          - Name: disableAccount
            Description: "Also disable the account (for critical severity)"
            Required: false
          - Name: incidentId
            Description: Sentinel incident ARM ID
            Required: false
        Settings:
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroup: '{{ResourceGroup}}'
          WorkflowName: SpyCloud-CA-Remediation
          TriggerName: manual

      - Name: SendSOCNotification
        DisplayName: "Send SpyCloud alert to Teams/Slack SOC channel"
        Description: >-
          Triggers the SpyCloud-CredResponse Logic App to send a formatted 
          alert notification to the configured Teams webhook and/or Slack 
          webhook with exposure details and recommended actions.
        Inputs:
          - Name: alertSummary
            Description: Brief summary of the exposure for the notification
            Required: true
          - Name: severity
            Description: "Alert severity: Critical, High, Medium, Low"
            Required: true
          - Name: affectedEntity
            Description: Email, device, or domain affected
            Required: true
        Settings:
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroup: '{{ResourceGroup}}'
          WorkflowName: SpyCloud-CredResponse
          TriggerName: manual

  # ─── COPILOT-TRIGGERED INVESTIGATION LOGIC APPS ─────────────────

      - Name: RunFullInvestigation
        DisplayName: "Run full SpyCloud investigation playbook"
        Description: >-
          Triggers the comprehensive investigation Logic App that calls 
          multiple SpyCloud API endpoints (email, catalog, exposure stats, 
          compass, SIP), cross-references with Sentinel data, and produces 
          a complete investigation report written as incident comments.
          Adapts based on available API keys (graceful degradation).
        DescriptionForModel: >-
          Use this skill for a comprehensive automated investigation that 
          combines live SpyCloud API calls with Sentinel KQL queries into 
          a complete dossier. Takes 2-5 minutes to complete.
        Inputs:
          - Name: email
            Description: Email address to investigate
            Required: true
          - Name: incidentId
            Description: Sentinel incident ARM ID to enrich
            Required: false
        Settings:
          SubscriptionId: '{{SubscriptionId}}'
          ResourceGroup: '{{ResourceGroup}}'
          WorkflowName: SpyCloud-FullInvestigation
          TriggerName: manual

